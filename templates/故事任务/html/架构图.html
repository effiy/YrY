<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{TITLE}} · 架构图</title>
<style>
:root{--bg:#020617;--surface:#0f172a;--border:#1e293b;--text:#e2e8f0;--muted:#64748b;--cyan:#22d3ee;--emerald:#34d399;--violet:#a78bfa;--amber:#fbbf24;--blue:#3B82F6;--rose:#fb7185}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding:24px}
.container{max-width:1000px;margin:0 auto}
h1{font-size:1.5rem;margin-bottom:4px}h1 span{color:var(--cyan)}
.sub{color:var(--muted);font-size:.82rem;margin-bottom:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;margin-bottom:16px}
.card h2{font-size:.95rem;margin-bottom:16px;color:var(--cyan)}
.diagram{background:rgba(0,0,0,.3);border-radius:8px;padding:24px;overflow-x:auto;font-family:monospace;font-size:.74rem;line-height:1.8;color:var(--muted);white-space:pre}
.layer{margin-bottom:20px;border-left:3px solid var(--cyan);padding-left:16px}
.layer h3{font-size:.82rem;color:var(--violet);margin-bottom:8px}
.item{display:inline-block;background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.15);border-radius:6px;padding:4px 10px;margin:3px 6px 3px 0;font-size:.72rem;font-family:monospace}
.item.core{border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.08);color:var(--violet)}
.item.exec{border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.08);color:var(--blue)}
.item.review{border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.08);color:var(--emerald)}
.item.risk{border-color:rgba(251,113,133,.3);background:rgba(251,113,133,.08);color:var(--rose)}
.flow-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:12px 0;font-size:.76rem}
.flow-node{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-weight:600}
.flow-arrow{color:var(--muted)}
.decision{font-size:.78rem;color:var(--muted);line-height:1.8}
.decision li{margin:4px 0}
a.back{color:var(--muted);text-decoration:none;font-size:.78rem;display:inline-block;margin-bottom:16px}
a.back:hover{color:var(--cyan)}
</style>
</head>
<body>
<div class="container">
<a href="../场景-{{N}}-{{SLUG}}.md" class="back">← 返回场景文档</a>
<h1><span>📐</span> {{TITLE}} · 架构图</h1>
<p class="sub">{{DESCRIPTION}}</p>

<div class="card">
  <h2>模块拓扑</h2>
  <div class="layer"><h3>输入 / 触发</h3>{{TRIGGER_ITEMS}}</div>
  <div class="layer"><h3>核心执行</h3>{{CORE_ITEMS}}</div>
  <div class="layer"><h3>门禁 / 审查</h3>{{REVIEW_ITEMS}}</div>
  <div class="layer"><h3>产出 / 交付</h3>{{OUTPUT_ITEMS}}</div>
</div>

<div class="card">
  <h2>数据流</h2>
  <div class="flow-row">{{FLOW_NODES}}</div>
  <p style="color:var(--muted);font-size:.74rem;margin-top:12px">{{FLOW_DESCRIPTION}}</p>
</div>

<div class="card">
  <h2>关键决策点</h2>
  <ul class="decision">{{DECISION_POINTS}}</ul>
</div>

<div class="card">
  <h2>涉及模块</h2>
  {{MODULE_TABLE}}
</div>
</div>
</body>
</html>
