<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{TITLE}} · 计划清单</title>
<style>
:root{--bg:#020617;--surface:#0f172a;--border:#1e293b;--text:#e2e8f0;--muted:#64748b;--cyan:#22d3ee;--emerald:#34d399;--amber:#fbbf24;--rose:#fb7185;--violet:#a78bfa;--blue:#3B82F6}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding:24px}
.container{max-width:960px;margin:0 auto}
h1{font-size:1.5rem;margin-bottom:4px}h1 span{color:var(--cyan)}
.sub{color:var(--muted);font-size:.82rem;margin-bottom:24px}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 18px;text-align:center;min-width:80px}
.stat .sv{font-size:1.4rem;font-weight:700;color:var(--cyan)}
.stat .sv.done{color:var(--emerald)}.stat .sv.warn{color:var(--amber)}
.stat .sl{font-size:.64rem;color:var(--muted);text-transform:uppercase;margin-top:2px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.card h2{font-size:.95rem;margin-bottom:14px;color:var(--cyan)}
.task{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.03);font-size:.78rem}
.task:last-child{border-bottom:none}
.task .check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.6rem;margin-top:2px}
.task .check.done{border-color:var(--emerald);background:rgba(52,211,153,.1);color:var(--emerald)}
.task .check.wip{border-color:var(--amber);background:rgba(251,191,36,.1);color:var(--amber)}
.task .body{flex:1}
.task .title{font-weight:600;margin-bottom:2px}
.task .detail{color:var(--muted);font-size:.7rem}
.task .est{color:var(--muted);font-size:.68rem;white-space:nowrap;margin-left:auto}
.file-ref{font-family:monospace;font-size:.68rem;color:var(--blue);background:rgba(59,130,246,.08);padding:1px 6px;border-radius:3px}
a.back{color:var(--muted);text-decoration:none;font-size:.78rem;display:inline-block;margin-bottom:16px}
a.back:hover{color:var(--cyan)}
</style>
</head>
<body>
<div class="container">
<a href="../场景-{{N}}-{{SLUG}}.md" class="back">← 返回场景文档</a>
<h1><span>📋</span> {{TITLE}} · 计划清单</h1>
<p class="sub">planner 生成 · 每步 2-5 分钟可完成 · 零占位符</p>

<div class="stats">
  <div class="stat"><div class="sv">{{TOTAL}}</div><div class="sl">总任务</div></div>
  <div class="stat"><div class="sv done">{{DONE}}</div><div class="sl">✅ 完成</div></div>
  <div class="stat"><div class="sv warn">{{WIP}}</div><div class="sl">⏳ 进行中</div></div>
  <div class="stat"><div class="sv">{{TODO}}</div><div class="sl">📝 待开始</div></div>
</div>

<div class="card">
  <h2>📁 文件改动清单</h2>
  {{FILE_TASKS}}
</div>

<div class="card">
  <h2>⚡ 实施步骤</h2>
  {{STEP_TASKS}}
</div>

<div class="card">
  <h2>✅ 验证清单</h2>
  {{VERIFY_TASKS}}
</div>
</div>
</body>
</html>
