<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{TITLE}} · 知识图谱</title>
<style>
:root{--bg:#020617;--surface:#0f172a;--border:#1e293b;--text:#e2e8f0;--muted:#64748b;--cyan:#22d3ee;--emerald:#34d399;--violet:#a78bfa;--amber:#fbbf24;--blue:#3B82F6}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding:24px}
.container{max-width:960px;margin:0 auto}
h1{font-size:1.5rem;margin-bottom:4px}h1 span{color:var(--cyan)}
.sub{color:var(--muted);font-size:.82rem;margin-bottom:24px}
.stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;text-align:center;min-width:80px}
.stat .sv{font-size:1.3rem;font-weight:700;color:var(--cyan)}
.stat .sl{font-size:.64rem;color:var(--muted);text-transform:uppercase;margin-top:2px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.card h2{font-size:.95rem;margin-bottom:12px;color:var(--cyan)}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.68rem;margin:2px 4px 2px 0}
.tag.cyan{background:rgba(34,211,238,.1);color:var(--cyan)}
.tag.green{background:rgba(52,211,153,.1);color:var(--emerald)}
.tag.amber{background:rgba(251,191,36,.1);color:var(--amber)}
.tag.blue{background:rgba(59,130,246,.1);color:var(--blue)}
.file-item{padding:8px 12px;border-left:2px solid var(--border);margin:6px 0;font-size:.78rem}
.file-item .type{color:var(--cyan);font-weight:600}
.file-item .path{color:var(--muted);font-family:monospace;font-size:.72rem}
.file-item .desc{color:var(--text);margin-top:2px}
.node-list{display:flex;flex-wrap:wrap;gap:6px}
.node-chip{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:.7rem;font-family:monospace;color:var(--muted)}
a.back{color:var(--muted);text-decoration:none;font-size:.78rem;display:inline-block;margin-bottom:16px}
a.back:hover{color:var(--cyan)}
</style>
</head>
<body>
<div class="container">
<a href="../场景-{{N}}-{{SLUG}}.md" class="back">← 返回场景文档</a>
<h1><span>🔗</span> {{TITLE}} · 知识图谱</h1>
<p class="sub">{{DESCRIPTION}}</p>

<div class="stats">
  <div class="stat"><div class="sv">{{SOURCE_COUNT}}</div><div class="sl">源文件</div></div>
  <div class="stat"><div class="sv">{{NODE_COUNT}}</div><div class="sl">图谱节点</div></div>
  <div class="stat"><div class="sv">{{EDGE_COUNT}}</div><div class="sl">关系边</div></div>
</div>

<div class="card">
  <h2>📁 源文件</h2>
  {{SOURCE_FILES}}
</div>

<div class="card">
  <h2>🔗 图谱节点</h2>
  <div class="node-list">{{GRAPH_NODES}}</div>
</div>

<div class="card">
  <h2>📊 关系边</h2>
  {{GRAPH_EDGES}}
</div>
</div>
</body>
</html>
