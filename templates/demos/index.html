<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{PROJECT_NAME}} Demos · 演示中心</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/yry-cdn-lib@1.0.0/theme.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/yry-cdn-lib@1.0.0/shared.css">
<style>
:root{--bg:var(--yry-bg);--bg-card:var(--yry-bg-card);--accent:var(--yry-accent);--cyan:var(--yry-cyan);--pass:var(--yry-pass);--text:var(--yry-text);--text2:var(--yry-text2);--text3:var(--yry-text3);--shadow:var(--yry-shadow);--radius:var(--yry-radius);--border:var(--yry-border)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;line-height:1.6;min-height:100vh}
.container{max-width:1120px;margin:0 auto;padding:48px 24px 80px}
.header{text-align:center;margin-bottom:32px;animation:yry-fadeInUp .5s ease both}
.header h1{font-size:2.1rem;font-weight:700}.header h1 .accent{color:var(--accent)}
.header .sub{color:var(--text2);font-size:.9rem}
.cross-nav{display:flex;gap:4px;justify-content:center;align-items:center;margin-bottom:40px;flex-wrap:wrap}
.cross-link{color:var(--text3);text-decoration:none;font-size:.74rem;padding:3px 10px;border-radius:4px;transition:all .15s}
.cross-link:hover{color:var(--accent);background:rgba(255,193,7,.06)}.cross-link.on{color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:14px}
.card{background:var(--bg-card);border:var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);transition:all .15s;text-decoration:none;color:inherit;display:block;cursor:pointer}
.card:hover{transform:translateY(-2px);box-shadow:var(--yry-shadow-lg);border-color:rgba(255,193,7,.2)}
.card .c-icon{font-size:1.5rem;margin-bottom:8px;display:block}
.card .c-title{font-weight:700;font-size:.95rem;margin-bottom:4px}
.card .c-desc{font-size:.8rem;color:var(--text2)}
.card .c-tag{background:rgba(255,193,7,.1);color:var(--accent);padding:2px 8px;border-radius:10px;font-size:.68rem;display:inline-block;margin-top:8px}
@media(max-width:640px){.grid{grid-template-columns:1fr}.container{padding:24px 12px 60px}}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1><span class="accent">{{PROJECT_NAME}}</span> Demos</h1><p class="sub">{{PROJECT_DESCRIPTION}}</p></div>
<div class="cross-nav">{{NAV_LINKS}}</div>
<div class="grid">{{DEMO_CARDS}}</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/yry-cdn-lib@1.0.0/shared.js"></script>
</body>
</html>
