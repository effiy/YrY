<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{SKILL_NAME}} demo</title>
<style>
:root{--bg:rgba(22,22,32,1);--bg-card:linear-gradient(159deg,rgba(38,38,52,1) 0%,rgba(34,34,46,1) 100%);--bg-flat:rgba(34,34,46,1);--accent:#FFC107;--cyan:#22d3ee;--pass:#22c55e;--fail:#ef4444;--text:rgba(250,250,252,1);--text2:rgba(160,160,164,1);--text3:rgba(110,110,114,1);--shadow:0 4px 20px rgba(0,0,0,0.3);--radius:12px;--border:1px solid rgba(255,255,255,0.06)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes stepIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;line-height:1.6}
.container{max-width:960px;margin:0 auto;padding:40px 24px 80px}
.back{color:var(--text3);text-decoration:none;font-size:.82rem;display:inline-flex;align-items:center;gap:6px;margin-bottom:16px;transition:color .15s}.back:hover{color:var(--accent)}
.nav-row{display:flex;gap:8px;align-items:center;margin-bottom:24px;flex-wrap:wrap}
.nav-row .pn{background:var(--bg-flat);border:var(--border);border-radius:6px;color:var(--text2);padding:5px 12px;font-size:.76rem;text-decoration:none;transition:all .15s}
.nav-row .pn:hover{border-color:rgba(255,193,7,.35);color:var(--accent)}
h1{font-size:1.8rem;margin-bottom:4px}h1 span{color:var(--accent)}
.sub{color:var(--text2);font-size:.9rem;margin-bottom:28px}
.tabs{display:flex;gap:0;border-bottom:var(--border);margin-bottom:28px;animation:fadeInDown .5s .1s ease both}
.tab{padding:8px 18px;cursor:pointer;font-size:.82rem;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s;user-select:none}
.tab:hover{color:var(--text2)}.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.panel{display:none;animation:fadeInUp .4s ease both}.panel.on{display:block}
.section{margin-bottom:32px}.section h2{font-size:1.05rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section h2 .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.cmd-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px}
.cmd-card{background:var(--bg-card);border:var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);transition:all .15s}
.cmd-card:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,0,0,.35)}
.cmd-card .name{font-weight:700;font-size:.88rem;color:var(--accent);font-family:monospace}
.cmd-card .desc{font-size:.76rem;color:var(--text2);margin:4px 0 8px}
pre{background:rgba(0,0,0,.3);border-radius:6px;padding:10px 36px 10px 14px;font-size:.74rem;color:var(--cyan);overflow-x:auto;font-family:'SF Mono',monospace;position:relative;cursor:pointer}
pre .cb{position:absolute;top:6px;right:6px;background:var(--bg-flat);border:var(--border);border-radius:4px;color:var(--text3);font-size:.62rem;padding:2px 7px;cursor:pointer;opacity:0;transition:opacity .15s;font-family:inherit}
pre:hover .cb{opacity:1}pre .cb.done{color:var(--pass)}
.walkthrough{counter-reset:step}
.walkthrough .step{counter-increment:step;display:flex;gap:14px;padding:16px 0;border-bottom:1px solid rgba(255,255,255,.03);animation:stepIn .3s ease both}
.walkthrough .step::before{content:counter(step);width:28px;height:28px;border-radius:50%;background:rgba(255,193,7,.12);color:var(--accent);font-size:.78rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.walkthrough .step .sb{flex:1}.walkthrough .step .st{font-weight:600;font-size:.88rem}.walkthrough .step .sd{font-size:.76rem;color:var(--text2);margin:3px 0 6px}
.file-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px}
.file-item{background:var(--bg-flat);border:var(--border);border-radius:6px;padding:8px 12px;font-size:.74rem;font-family:monospace;color:var(--text2)}
.stat-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.stat-mini{background:var(--bg-card);border:var(--border);border-radius:var(--radius);padding:12px 16px;text-align:center;box-shadow:var(--shadow);min-width:70px}
.stat-mini .sv{font-size:1.3rem;font-weight:700}.stat-mini .sv.g{color:var(--pass)}.stat-mini .sv.y{color:var(--accent)}.stat-mini .sl{font-size:.64rem;color:var(--text3);text-transform:uppercase}
.links-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.links-row a{font-size:.76rem;color:var(--text2);text-decoration:none;background:var(--bg-flat);border:var(--border);border-radius:6px;padding:6px 12px;transition:all .15s}
.links-row a:hover{border-color:rgba(255,193,7,.35);color:var(--accent)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg-flat);border:1px solid rgba(255,193,7,.3);border-radius:8px;color:var(--text);padding:10px 20px;font-size:.82rem;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:640px){.container{padding:20px 12px 60px}h1{font-size:1.4rem}.cmd-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<a href="./" class="back">← 演示中心</a>
<div class="nav-row">{{PREV_NEXT_NAV}}</div>
<h1>{{ICON}} <span>{{SKILL_NAME}}</span> · {{SKILL_TITLE}}</h1>
<p class="sub">{{SKILL_DESC}}</p>

<div class="tabs">{{TAB_ITEMS}}</div>

<div class="panel on" id="panelWalkthrough">
<div class="walkthrough">{{WALKTHROUGH_STEPS}}</div>
</div>

<div class="panel" id="panelOverview">
<div class="section"><h2><span class="dot"></span>{{OVERVIEW_TITLE}}</h2>
{{OVERVIEW_CONTENT}}
</div>
</div>

<div class="panel" id="panelCommands">
<div class="cmd-grid">{{COMMAND_CARDS}}</div>
</div>

<div class="panel" id="panelFiles">
<div class="file-list">{{FILE_ITEMS}}</div>
<div class="links-row">{{FILE_LINKS}}</div>
</div>

<div class="panel" id="panelTests">
<div class="stat-row" id="testStats"></div>
<div class="section"><h2><span class="dot"></span>测试覆盖</h2>{{TEST_COVERAGE}}</div>
<div class="links-row">{{TEST_LINKS}}</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
document.querySelector('.tabs').addEventListener('click',e=>{const t=e.target.closest('.tab');if(!t)return;switchPanel(t.dataset.panel)});
function switchPanel(n){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.panel===n));document.querySelectorAll('.panel').forEach(p=>{const on=p.id==='panel'+n.charAt(0).toUpperCase()+n.slice(1);p.classList.toggle('on',on)});if(n==='tests')loadStats()}
document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT')return;const m={'1':'walkthrough','2':'overview','3':'commands','4':'files','5':'tests'};if(m[e.key]){e.preventDefault();switchPanel(m[e.key])}});
function copyCmd(btn){const cmd=btn.parentElement.textContent.replace(/[📋✅]/g,'').trim();navigator.clipboard.writeText(cmd).then(()=>{btn.textContent='✅';btn.classList.add('done');setTimeout(()=>{btn.textContent='📋';btn.classList.remove('done')},1500)}).catch(()=>toast('复制失败'))}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800)}
let tc=null;async function loadStats(){if(tc){render(tc);return}try{const r=await(await fetch('../tests/results.json')).json();tc=r;render(r)}catch(e){document.getElementById('testStats').innerHTML='<div style="color:var(--text3);font-size:.82rem">测试结果不可用</div>'}}
function render(r){const s=r.summary||{};document.getElementById('testStats').innerHTML=`<div class="stat-mini"><div class="sv">${s.total||0}</div><div class="sl">总计</div></div><div class="stat-mini"><div class="sv g">${s.passed||0}</div><div class="sl">✅ 通过</div></div><div class="stat-mini"><div class="sv" style="color:var(--fail)">${s.failed||0}</div><div class="sl">❌ 失败</div></div><div class="stat-mini"><div class="sv y">{{TEST_COUNT}}</div><div class="sl">{{SKILL_NAME}} 测试</div></div>`}
</script>
</body>
</html>
