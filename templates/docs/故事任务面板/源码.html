<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{SCENE_SHORT}} · 源码</title>
<link rel="stylesheet" href="{{CDN_PREFIX}}/cdn/shared.css">
<link rel="stylesheet" href="{{CDN_PREFIX}}/cdn/theme.css">
<style>
.container{max-width:1120px;margin:0 auto;padding:48px 24px 80px}
.header{text-align:center;margin-bottom:32px;animation:fadeInDown .5s ease both}
.header h1{font-size:2.1rem;font-weight:700}.header h1 .accent{color:var(--yry-accent)}
.header .sub{color:var(--yry-text2);font-size:.9rem}
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px}
.file-card{background:var(--yry-bg-card);border:var(--yry-border);border-radius:var(--yry-radius);padding:14px 16px;box-shadow:var(--yry-shadow);transition:transform .15s,box-shadow .15s}
.file-card:hover{transform:translateY(-1px);box-shadow:var(--yry-shadow-lg)}
.file-card .fn{font-weight:600;font-size:.84rem;color:var(--yry-accent);font-family:monospace;word-break:break-all}
.file-card .meta{font-size:.72rem;color:var(--yry-text3);margin-top:4px}
.file-card .tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.file-card .tag{padding:2px 8px;border-radius:10px;font-size:.66rem;font-weight:600}
.tag.src{background:rgba(34,211,238,.1);color:var(--yry-cyan)}
.tag.test{background:rgba(34,197,94,.1);color:var(--yry-pass)}
.tag.rule{background:rgba(192,132,252,.1);color:#c084fc}
.tag.agent{background:rgba(251,191,36,.1);color:var(--yry-warn)}
.source-ref{display:block;padding:8px 12px;margin:4px 0;border-radius:6px;background:rgba(34,211,238,.05);border:1px solid rgba(34,211,238,.1);color:var(--yry-cyan);text-decoration:none;font-size:.82rem;transition:all .15s}
.source-ref:hover{background:rgba(34,211,238,.12);border-color:rgba(34,211,238,.25)}
.source-ref .path{color:var(--yry-text2);font-family:'JetBrains Mono',monospace}.source-ref .arrow{color:var(--yry-accent);margin:0 6px}
.card{background:var(--yry-bg-card);border:var(--yry-border);border-radius:var(--yry-radius);padding:20px 24px;box-shadow:var(--yry-shadow);margin-bottom:16px}
.card h2{font-size:1.1rem;color:var(--yry-text);margin-bottom:12px}
</style>
</head>
<body>
<div class="container">

<nav class="breadcrumb"><a href="{{DOCS_INDEX}}">文档中心</a><span class="bc-sep">/</span><span class="bc-current">{{STORY_NAME}} · {{STORY_DESC}}</span><span class="bc-sep">/</span><span class="bc-current">{{SCENE_SHORT}}</span><span class="bc-sep">/</span><span class="bc-current">源码</span></nav>

<div class="cross-nav">
  <a href="计划清单.html" class="cross-link">清单</a><span class="cross-sep">·</span>
  <a href="架构图.html" class="cross-link">架构</a><span class="cross-sep">·</span>
  <a href="知识图谱.html" class="cross-link">图谱</a><span class="cross-sep">·</span>
  <a href="测试面板.html" class="cross-link">测试</a><span class="cross-sep">·</span>
  <a href="演示.html" class="cross-link">演示</a><span class="cross-sep">·</span>
  <a href="审查.html" class="cross-link">审查</a><span class="cross-sep">·</span>
  <span class="cross-link on">源码</span>
</div>

<div class="header">
  <h1>{{SCENE_SHORT}}<span class="accent"> · 源码</span></h1>
  <p class="sub">源文件清单 — 按分类展示 · 回溯链 · 覆盖状态</p>
</div>

{{#each SOURCE_CATEGORIES}}
<div class="card"><h2>{{CATEGORY_NAME}}</h2>
{{#each FILES}}
<a class="source-ref" href="{{FILE_PATH}}"><span class="path">{{FILE_PATH}}</span><span class="arrow">→</span>{{FILE_DESC}}</a>
{{/each}}
</div>
{{/each}}

</div></body></html>
