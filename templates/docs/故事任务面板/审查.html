<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{SCENE_NAME}} — 审查报告</title>
<link rel="stylesheet" href="{{CDN_PREFIX}}/cdn/shared.css">
<link rel="stylesheet" href="{{CDN_PREFIX}}/cdn/theme.css">
<style>
.container{max-width:1120px;margin:0 auto;padding:48px 24px 80px}
.header{text-align:center;margin-bottom:28px;animation:fadeInDown .5s ease both}
.header h1{font-size:1.8rem;font-weight:700}.header h1 .accent{color:var(--yry-accent)}
.header .sub{color:var(--yry-text2);font-size:.9rem;margin-top:4px}

/* Stats */
.stats-grid{display:flex;gap:12px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;animation:fadeInDown .5s .1s ease both}
.stat-card{background:var(--yry-bg-card);border:var(--yry-border);border-radius:var(--yry-radius);padding:16px 20px;text-align:center;box-shadow:var(--yry-shadow);min-width:80px;transition:transform .15s,box-shadow .15s;cursor:pointer}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--yry-shadow-lg)}
.stat-card .val{font-size:1.6rem;font-weight:700;line-height:1.1}
.stat-card .val.health{color:var(--yry-pass)}.stat-card .val.warn-h{color:var(--yry-warn)}.stat-card .lbl{font-size:.68rem;color:var(--yry-text3);margin-top:2px;letter-spacing:.5px}
.bar-wrap{margin-bottom:28px;animation:fadeInDown .5s .12s ease both}

/* Review content */
h2{font-size:1.1rem;font-weight:600;margin:32px 0 14px;color:var(--yry-text)}
h2:first-of-type{margin-top:0}
table{width:100%;border-collapse:collapse;margin:12px 0 20px;font-size:.84rem}
th{background:rgba(255,193,7,.08);color:var(--yry-accent);padding:10px 14px;text-align:left;font-weight:600;border-bottom:2px solid rgba(255,193,7,.15)}
td{padding:10px 14px;color:var(--yry-text2);border-bottom:1px solid rgba(148,163,184,.08)}
.pass{color:var(--yry-pass);font-weight:600}.warn{color:var(--yry-warn);font-weight:600}.fail{color:var(--yry-fail);font-weight:600}
.card{background:var(--yry-bg-card);border:var(--yry-border);border-radius:var(--yry-radius);padding:20px 24px;box-shadow:var(--yry-shadow);margin-bottom:16px}
.card p{color:var(--yry-text2);font-size:.85rem;line-height:1.8}
</style>
</head>
<body>
<div class="container">

<nav class="breadcrumb"><a href="{{DOCS_INDEX}}">文档中心</a><span class="bc-sep">/</span><span class="bc-current">{{STORY_NAME}} · {{STORY_DESC}}</span><span class="bc-sep">/</span><span class="bc-current">{{SCENE_SHORT}}</span><span class="bc-sep">/</span><span class="bc-current">审查</span></nav>

<div class="cross-nav">
  <a href="计划清单.html" class="cross-link">清单</a><span class="cross-sep">·</span>
  <a href="架构图.html" class="cross-link">架构</a><span class="cross-sep">·</span>
  <a href="知识图谱.html" class="cross-link">图谱</a><span class="cross-sep">·</span>
  <a href="测试面板.html" class="cross-link">测试</a><span class="cross-sep">·</span>
  <a href="演示.html" class="cross-link">演示</a><span class="cross-sep">·</span>
  <span class="cross-link on">审查</span><span class="cross-sep">·</span>
  <a href="源码.html" class="cross-link">源码</a>
</div>

<div class="header">
  <h1>{{SCENE_SHORT}}<span class="accent"> · 审查报告</span></h1>
  <p class="sub">{{PAGE_TYPE}} — 维度评分 · 案例 · 改进建议</p>
</div>

<!-- ── Review content: dimension scores, good/bad cases, suggestions ── -->

<div class="card"><h2>审查摘要</h2>
<table><tr><th>维度</th><th>状态</th><th>说明</th></tr>
<tr><td>{{DIM_1}}</td><td class="pass">通过</td><td>{{DIM_1_NOTE}}</td></tr>
<tr><td>{{DIM_2}}</td><td class="pass">通过</td><td>{{DIM_2_NOTE}}</td></tr>
<tr><td>{{DIM_3}}</td><td class="warn">观察</td><td>{{DIM_3_NOTE}}</td></tr>
</table></div>

<div class="card"><h2>审查结论</h2>
<p>{{REVIEW_CONCLUSION}}</p></div>

</div></body></html>
