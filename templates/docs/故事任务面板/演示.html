<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>{{SCENE_NAME}} — 演示</title>
<style>
:root{--bg:rgba(22,22,32,1);--bg-card:linear-gradient(159deg,rgba(38,38,52,1) 0%,rgba(34,34,46,1) 100%);--accent:#FFC107;--cyan:#22d3ee;--text:rgba(250,250,252,1);--text2:rgba(160,160,164,1);--text3:rgba(110,110,114,1);--shadow:0 4px 20px rgba(0,0,0,0.3);--radius:12px;--border:1px solid rgba(255,255,255,0.06)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;line-height:1.6;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:48px 24px 80px}
.header{text-align:center;margin-bottom:28px;animation:fadeInDown .5s ease both}
.header h1{font-size:2rem;font-weight:700}.header h1 .accent{color:var(--accent)}
.header .sub{color:var(--text2);font-size:.85rem}

/* ── Breadcrumb ─────────────────────────── */
.breadcrumb{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem;font-size:0.76rem}
.breadcrumb a{color:#7aa2f7;text-decoration:none;transition:color 0.15s}
.breadcrumb a:hover{color:#fbbf24;text-decoration:underline}
.breadcrumb .bc-sep{color:#53576c;opacity:0.5;user-select:none}
.breadcrumb .bc-current{color:#94a3b8;font-weight:500}

/* ── Cross-Nav ─────────────────────────── */
.cross-nav{display:flex;gap:4px;justify-content:center;align-items:center;margin-bottom:32px;flex-wrap:wrap;animation:fadeInDown .5s .1s ease both}
.cross-link{color:var(--cyan);text-decoration:none;font-size:0.76rem;padding:3px 10px;border-radius:4px;transition:color 0.15s,background 0.15s}
.cross-link:hover{color:var(--accent);background:rgba(255,193,7,.06);text-decoration:underline}
.cross-link.on{color:var(--accent);font-weight:600}
.cross-sep{color:var(--text3);font-size:0.5rem;opacity:0.35;user-select:none}

.steps{animation:fadeInUp .4s .15s ease both}
.step{background:var(--bg-card);border:var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:14px;box-shadow:var(--shadow)}
.step .step-num{font-size:.64rem;color:var(--accent);font-weight:600;margin-bottom:4px}
.step .step-title{font-size:1rem;font-weight:700;margin-bottom:6px}
.step .step-desc{font-size:.82rem;color:var(--text2);line-height:1.6}
.step .step-code{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:12px 16px;margin-top:10px;font-family:'SF Mono','Fira Code',monospace;font-size:.76rem;color:var(--text2);overflow-x:auto;white-space:pre-wrap}
.step .step-note{font-size:.72rem;color:var(--text3);margin-top:8px;padding:6px 10px;background:rgba(255,193,7,.04);border-left:2px solid var(--accent);border-radius:0 4px 4px 0}

.result{border:1px solid rgba(34,197,94,.2);background:rgba(34,197,94,.03)}
.result .step-num{color:#22c55e}

.footer{text-align:center;color:var(--text3);font-size:.72rem;margin-top:40px;padding-top:20px;border-top:var(--border)}
@media(max-width:640px){.container{padding:20px 12px 60px}}
</style></head><body><div class="container">
<nav class="breadcrumb"><a href="{{DOCS_INDEX}}">📄 文档中心</a><span class="bc-sep">/</span><span class="bc-current">{{STORY_NAME}} · {{STORY_DESC}}</span><span class="bc-sep">/</span><span class="bc-current">{{SCENE_NAME}}</span><span class="bc-sep">/</span><span class="bc-current">💡 演示</span></nav>
<div class="cross-nav"><a href="计划清单.html" class="cross-link">📋 清单</a><span class="cross-sep">·</span><a href="架构图.html" class="cross-link">📐 架构</a><span class="cross-sep">·</span><a href="知识图谱.html" class="cross-link">🔗 图谱</a><span class="cross-sep">·</span><a href="测试面板.html" class="cross-link">🧪 测试</a><span class="cross-sep">·</span><span class="cross-link on">💡 演示</span></div>
<div class="header"><h1>💡 <span class="accent">{{DEMO_TITLE}}</span></h1><p class="sub">{{DEMO_SUBTITLE}}</p></div>
<div class="steps">{{DEMO_STEPS}}</div>
<div class="footer">YrY {{VERSION}} · {{STORY_NAME}} · {{SCENE_SHORT}} · 演示</div>
</div></body></html>
