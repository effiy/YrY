<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>{{SCENE_SHORT}} · 知识图谱</title>
<link rel="stylesheet" href="{{CDN_PREFIX}}/cdn/shared.css">
<link rel="stylesheet" href="{{CDN_PREFIX}}/cdn/theme-mono.css">
<link rel="stylesheet" href="{{CDN_PREFIX}}/cdn/fonts.css">
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<style>
.container{max-width:1400px;margin:0 auto;padding:2rem}
.breadcrumb{margin-bottom:1rem;font-size:.75rem;color:var(--yry-text3)}
.breadcrumb a{color:var(--yry-cyan);text-decoration:none}.breadcrumb a:hover{color:var(--yry-accent)}
.cross-nav{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.cross-nav a,.cross-nav span{color:var(--yry-text2);text-decoration:none;font-size:.75rem;padding:.25rem .625rem;border-radius:.25rem;transition:all .2s}
.cross-nav a:hover{color:var(--yry-cyan);background:rgba(34,211,238,.08)}.cross-nav .on{color:var(--yry-accent);background:rgba(255,193,7,.1)}
.header-row{display:flex;align-items:center;gap:1rem;margin-bottom:.5rem}
.pulse-dot{width:12px;height:12px;background:var(--yry-cyan);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
h1{font-size:1.25rem;font-weight:700}.accent{color:var(--yry-accent)}
.subtitle{color:var(--yry-text2);font-size:.8rem;margin-top:.25rem}
.graph-container{background:rgba(15,23,42,.5);border-radius:1rem;border:1px solid #1e293b;padding:1rem;margin-bottom:1.5rem}
#cy{width:100%;height:500px;border-radius:.5rem}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;margin-bottom:1.5rem}
.card{background:rgba(15,23,42,.5);border-radius:.75rem;border:1px solid #1e293b;padding:1.25rem}
.card h3{font-size:.85rem;color:var(--yry-accent);margin-bottom:.75rem}
.card p,.card li{font-size:.78rem;color:var(--yry-text2);line-height:1.6}.card ul{list-style:none;padding:0}.card li::before{content:'→ ';color:var(--yry-cyan)}
</style></head><body>
<div class="container">

<nav class="breadcrumb"><a href="{{DOCS_INDEX}}">文档中心</a> / <a href="../故事任务.md">{{STORY_NAME}}</a> / {{SCENE_SHORT}} / 知识图谱</nav>

<div class="cross-nav">
  <a href="计划清单.html">清单</a><span>·</span><a href="架构图.html">架构</a><span>·</span><span class="on">图谱</span><span>·</span>
  <a href="测试面板.html">测试</a><span>·</span><a href="演示.html">演示</a><span>·</span><a href="审查.html">审查</a><span>·</span><a href="源码.html">源码</a>
</div>

<div class="header-row"><div class="pulse-dot"></div><h1>{{SCENE_SHORT}}<span class="accent"> · 知识图谱</span></h1></div>
<p class="subtitle">{{KG_SUBTITLE}}</p>

<div class="graph-container"><div id="cy"></div></div>

<div class="cards">
{{#each KG_CARDS}}
<div class="card"><h3>{{TITLE}}</h3><ul>{{#each ITEMS}}<li>{{TEXT}}</li>{{/each}}</ul></div>
{{/each}}
</div>

<script>
var cy = cytoscape({
  container: document.getElementById('cy'),
  style: [
    {selector:'node',style:{label:'data(label)',color:'#e2e8f0','font-size':'10px','font-family':'JetBrains Mono,monospace','text-valign':'center','text-halign':'center','text-wrap':'wrap','text-max-width':'130px'}},
    {selector:'edge',style:{width:1.5,'line-color':'#334155','target-arrow-color':'#334155','target-arrow-shape':'triangle','curve-style':'bezier','opacity':0.7}},
    {selector:'.domain',style:{background:'#c084fc','border-color':'#a855f7','border-width':2}},
    {selector:'.structure',style:{background:'#3b82f6','border-color':'#2563eb','border-width':2}},
    {selector:'.content',style:{background:'#22d3ee','border-color':'#06b6d4','border-width':2}},
    {selector:'.entry',style:{background:'#f87171','border-color':'#ef4444','border-width':2}},
    {selector:'.gate',style:{background:'#fbbf24','border-color':'#f59e0b','border-width':2}}
  ],
  elements: {{KG_ELEMENTS}},
  layout: {name:'breadthfirst',directed:true,spacingFactor:1.15}
});
</script>
</div></body></html>
