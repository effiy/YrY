<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PROJECT_NAME}} 文档中心</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/yry-cdn-lib@1.1.0/theme.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/yry-cdn-lib@1.1.0/shared.css">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { background:var(--yry-bg); color:var(--yry-text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif; line-height:1.6; min-height:100vh; }
.container { max-width:1040px; margin:0 auto; padding:48px 24px 80px; }

.header { text-align:center; margin-bottom:40px; animation:yry-fadeInDown .5s ease both; }
.header h1 { font-size:2.2rem; font-weight:700; }
.header h1 .accent { color:var(--yry-accent); }
.header .sub { color:var(--yry-text2); font-size:.92rem; margin-top:6px; }
.header .meta { color:var(--yry-text3); font-size:.76rem; margin-top:8px; }

.stories-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; margin-bottom:48px; }
.story-card { background:var(--yry-bg-card); border:var(--yry-border); border-radius:var(--yry-radius); padding:22px 24px; box-shadow:var(--yry-shadow); transition:transform .15s,box-shadow .15s,border-color .15s; text-decoration:none; color:inherit; display:block; animation:yry-fadeInUp .4s ease both; }
.story-card:hover { transform:translateY(-3px); box-shadow:var(--yry-shadow-lg); border-color:rgba(255,193,7,.2); }
.story-card .sc-name { font-size:1.15rem; font-weight:700; color:var(--yry-accent); margin-bottom:6px; }
.story-card .sc-desc { font-size:.84rem; color:var(--yry-text2); line-height:1.5; margin-bottom:10px; }
.story-card .sc-meta { display:flex; gap:12px; flex-wrap:wrap; font-size:.72rem; color:var(--yry-text3); }
.story-card .sc-meta span { display:flex; align-items:center; gap:4px; }
.story-card .sc-badge { font-size:.68rem; padding:2px 8px; border-radius:10px; font-weight:600; }
.story-card .sc-badge.active { background:rgba(34,197,94,.12); color:var(--yry-pass); }
.story-card .sc-badge.draft { background:rgba(251,191,36,.12); color:var(--yry-warn); }

.empty-state { text-align:center; padding:80px 20px; animation:yry-fadeInUp .5s ease both; }
.empty-state .icon { font-size:3.5rem; margin-bottom:16px; }
.empty-state h3 { font-size:1.2rem; color:var(--yry-text2); margin-bottom:8px; }
.empty-state p { font-size:.88rem; color:var(--yry-text3); max-width:480px; margin:0 auto; line-height:1.6; }
.empty-state code { background:var(--yry-bg-flat); padding:5px 10px; border-radius:6px; font-size:.78rem; color:var(--yry-cyan); margin-top:6px; display:inline-block; }

.footer-note { text-align:center; color:var(--yry-text3); font-size:.74rem; margin-top:48px; padding-top:24px; border-top:1px solid rgba(255,255,255,0.06); }
.footer-note a { color:var(--yry-accent); text-decoration:none; }
.footer-note a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📄 <span class="accent">{{PROJECT_NAME}}</span> · 文档中心</h1>
    <p class="sub">故事驱动的 SDLC 编排系统 · 每个故事自包含需求→文档→代码→交付的全生命周期</p>
    <p class="meta">{{VERSION}} · {{DATE}} · 🌿 {{BRANCH}}</p>
  </div>

  <div class="stories-grid" id="storiesGrid">
    <!-- Story cards injected by pipeline -->
    <div class="empty-state">
      <div class="icon">📭</div>
      <h3>暂无故事</h3>
      <p>运行 <code>/rui story create {{STORY_NAME}}</code> 创建第一个故事，或运行 <code>/rui init</code> 初始化项目基线。</p>
    </div>
  </div>

  <div class="footer-note">
    {{PROJECT_NAME}} v{{VERSION}} · 故事驱动的 SDLC 编排系统 · <a href="../CLAUDE.md">CLAUDE.md</a> · <a href="../README.md">README.md</a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/yry-cdn-lib@1.1.0/shared.js"></script>
</body>
</html>
