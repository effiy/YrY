<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PROJECT_NAME}} 文档中心</title>
  <style>
    :root {
      --bg-content: rgba(22,22,32,1);
      --bg-card: linear-gradient(159deg, rgba(38,38,52,1) 0%, rgba(34,34,46,1) 100%);
      --color-accent: #FFC107;
      --color-accent-2: #22d3ee;
      --text-primary: rgba(250,250,252,1);
      --text-secondary: rgba(160,160,164,1);
      --text-muted: rgba(110,110,114,1);
      --shadow-card: 0 4px 20px rgba(0,0,0,0.3);
      --shadow-hover: 0 12px 32px rgba(0,0,0,0.45);
      --radius-card: 12px;
      --border-subtle: 1px solid rgba(255,255,255,0.06);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg-content); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif; line-height: 1.6; min-height: 100vh; }
    .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

    /* ── Breadcrumb ─────────────────────────── */
    .breadcrumb {
      display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
      margin-bottom: 1.25rem; font-size: 0.76rem;
      animation: fadeInDown 0.4s ease both;
    }
    .breadcrumb a { color: #7aa2f7; text-decoration: none; transition: color 0.15s; }
    .breadcrumb a:hover { color: #fbbf24; text-decoration: underline; }
    .breadcrumb .bc-sep { color: #53576c; opacity: 0.5; user-select: none; }
    .breadcrumb .bc-current { color: #94a3b8; font-weight: 500; }

    .header { text-align: center; margin-bottom: 32px; animation: fadeInDown 0.5s ease both; }
    .header h1 { font-size: 2.2rem; font-weight: 700; }
    .header h1 .accent { color: var(--color-accent); }
    .header p { color: var(--text-secondary); margin-top: 8px; font-size: 0.92rem; }

    .stats { display: flex; gap: 14px; justify-content: center; margin-bottom: 40px; flex-wrap: wrap; animation: fadeInDown 0.5s 0.1s ease both; }
    .stat {
      background: var(--bg-card); border: var(--border-subtle);
      border-radius: var(--radius-card); padding: 16px 24px; text-align: center;
      box-shadow: var(--shadow-card); min-width: 100px;
      text-decoration: none; color: inherit; display: block;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      cursor: pointer; position: relative;
    }
    .stat:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); border-color: rgba(255,193,7,0.35); }
    .stat .num { font-size: 1.7rem; font-weight: 700; color: var(--color-accent); }
    .stat .num.green { color: var(--color-accent-2); }
    .stat .label { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

    /* ── Cross-Nav ─────────────────────────── */
    .cross-nav { display: flex; gap: 4px; justify-content: center; align-items: center; margin-bottom: 40px; flex-wrap: wrap; animation: fadeInDown 0.5s 0.15s ease both; }
    .cross-link { color: var(--color-accent-2); text-decoration: none; font-size: 0.76rem; padding: 3px 10px; border-radius: 4px; transition: color 0.15s, background 0.15s; }
    .cross-link:hover { color: var(--color-accent); background: rgba(255,193,7,0.06); text-decoration: underline; }

    .story-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 16px; margin-bottom: 32px; animation: fadeInUp 0.4s 0.2s ease both; }
    .story-card { background: var(--bg-card); border: var(--border-subtle); border-radius: var(--radius-card); padding: 24px; box-shadow: var(--shadow-card); transition: transform 0.15s, box-shadow 0.15s; }
    .story-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
    .story-card .sc-icon { font-size: 1.5rem; margin-bottom: 4px; }
    .story-card .sc-name { font-weight: 700; font-size: 1.05rem; }
    .story-card .sc-desc { font-size: 0.8rem; color: var(--text-secondary); margin: 8px 0 14px; line-height: 1.5; }
    .sc-scenes { display: flex; flex-wrap: wrap; gap: 6px; }
    .scene-tag { font-size: 0.72rem; color: var(--color-accent-2); text-decoration: none; background: rgba(34,211,238,0.06); border: 1px solid rgba(34,211,238,0.15); padding: 4px 12px; border-radius: 5px; transition: all 0.15s; }
    .scene-tag:hover { border-color: var(--color-accent-2); background: rgba(34,211,238,0.12); color: var(--color-accent); text-decoration: underline; }

    footer { text-align: center; color: var(--text-muted); font-size: 0.74rem; margin-top: 48px; padding-top: 24px; border-top: var(--border-subtle); }
    footer a { color: var(--color-accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 640px) { .story-grid { grid-template-columns: 1fr; } .container { padding: 20px 12px 60px; } }
  </style>
</head>
<body>
<div class="container">

  <nav class="breadcrumb">
    <a href="../index.html">📄 文档中心</a>
  </nav>

  <div class="header">
    <h1><span class="accent">{{PROJECT_NAME}}</span> 文档中心</h1>
    <p>{{PROJECT_DESCRIPTION}}</p>
  </div>

  <div class="stats">
    {{STAT_CARDS}}
  </div>

  <div class="cross-nav">
    {{NAV_LINKS}}
  </div>

  <div class="story-grid">
    {{STORY_CARDS}}
  </div>

  <footer>
    {{PROJECT_NAME}} v{{VERSION}} · {{FOOTER_TEXT}}
  </footer>

</div>
</body>
</html>
