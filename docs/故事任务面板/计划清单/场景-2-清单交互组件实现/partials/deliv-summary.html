<div class="deliv-summary" id="delivSummary">
  <div class="ds-head">
    <div class="ds-title">📦 交付物总览 · 14 步验收</div>
    <div class="ds-meta">类型分布: <code>HTML·MD·CSS·Test</code> · 点击过滤可快速定位 · <span id="ds-status">已全部就绪 ✓</span></div>
  </div>
  <div class="ds-kpi-row">
    <div class="ds-kpi total"><b id="ds-total">0</b><span>总项数</span></div>
    <div class="ds-kpi"><b id="ds-pass">0</b><span>✅ 已验收</span></div>
    <div class="ds-kpi fail"><b id="ds-fail">0</b><span>⚠ 待补</span></div>
    <div class="ds-kpi"><b id="ds-html">0</b><span>🌐 HTML</span></div>
    <div class="ds-kpi"><b id="ds-other">0</b><span>📑 其他</span></div>
  </div>
  <div class="ds-progress" title="交付物验收率"><div class="ds-progress-fill" id="ds-bar" style="width:100%"></div></div>
  <div class="ds-progress-label"><span>验收进度</span><b id="ds-pct">100%</b></div>

  <div class="deliv-filter">
    <span class="df-label">🔍 类型过滤:</span>
    <span class="df-btn on" data-filter="all">全部 <span class="df-count" id="dfc-all">0</span></span>
    <span class="df-btn" data-filter="html">🌐 HTML <span class="df-count" id="dfc-html">0</span></span>
    <span class="df-btn" data-filter="md">📑 Markdown <span class="df-count" id="dfc-md">0</span></span>
    <span class="df-btn" data-filter="css">🎨 CSS <span class="df-count" id="dfc-css">0</span></span>
    <span class="df-btn" data-filter="test">🧪 Test <span class="df-count" id="dfc-test">0</span></span>
    <span class="df-btn" data-filter="other">📦 其他 <span class="df-count" id="dfc-other">0</span></span>
    <span class="df-actions">
      <span class="df-action" id="df-expand">📂 全部展开</span>
      <span class="df-action" id="df-collapse">📁 全部折叠</span>
      <span class="df-action" id="df-copyall">📋 复制全部路径</span>
    </span>
  </div>
</div>
