/* ═══ shared-b.css — Common styles for all Category B documents ═══ */

:root {
  --yry-bg: rgba(22,22,32,1);
  --yry-bg-card: linear-gradient(159deg, rgba(38,38,52,1) 0%, rgba(34,34,46,1) 100%);
  --yry-bg-flat: rgba(34,34,46,1);
  --yry-bg-raised: rgba(42,42,56,1);
  --yry-accent: #FFC107;
  --yry-cyan: #22d3ee;
  --yry-pass: #22c55e;
  --yry-fail: #ef4444;
  --yry-warn: #f59e0b;
  --yry-skip: #6b7280;
  --yry-text: rgba(250,250,252,1);
  --yry-text2: rgba(160,160,164,1);
  --yry-text3: rgba(110,110,114,1);
  --yry-shadow: 0 4px 20px rgba(0,0,0,0.3);
  --yry-shadow-lg: 0 12px 32px rgba(0,0,0,0.45);
  --yry-radius: 12px;
  --yry-border: 1px solid rgba(255,255,255,0.06);
}

@keyframes yry-fadeInUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes yry-fadeInDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--yry-bg);
  color: var(--yry-text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  line-height: 1.6;
  min-height: 100vh;
}

.yry-container { max-width: 1120px; margin: 0 auto; padding: 48px 24px 80px; }

.yry-header { text-align: center; margin-bottom: 24px; animation: yry-fadeInDown .5s ease both; }
.yry-header h1 { font-size: 2.1rem; font-weight: 700; }
.yry-header h1 .yry-accent { color: var(--yry-accent); }
.yry-header .yry-sub { color: var(--yry-text2); font-size: .9rem; }

.yry-stats { display: flex; gap: 14px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; animation: yry-fadeInDown .5s .1s ease both; }
.yry-stat { background: var(--yry-bg-card); border: var(--yry-border); border-radius: var(--yry-radius); padding: 18px 22px; text-align: center; box-shadow: var(--yry-shadow); min-width: 90px; }
.yry-stat .yry-val { font-size: 1.8rem; font-weight: 700; line-height: 1.1; }
.yry-stat .yry-val.t { color: var(--yry-text); }
.yry-stat .yry-val.p { color: var(--yry-pass); }
.yry-stat .yry-val.f { color: var(--yry-fail); }
.yry-stat .yry-val.s { color: var(--yry-skip); }
.yry-stat .yry-val.d { color: var(--yry-cyan); font-size: 1.25rem; }
.yry-stat .yry-lbl { font-size: .72rem; color: var(--yry-text3); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }

.yry-bar-wrap { margin-bottom: 24px; }
.yry-bar-outer { height: 8px; border-radius: 4px; overflow: hidden; display: flex; background: rgba(255,255,255,.04); }
.yry-bar-outer .yry-seg { height: 100%; transition: width .5s ease; min-width: 2px; }
.yry-bar-outer .yry-seg.p { background: var(--yry-pass); }
.yry-bar-outer .yry-seg.f { background: var(--yry-fail); }
.yry-bar-outer .yry-seg.s { background: var(--yry-skip); }

.yry-breadcrumb { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; font-size: 0.76rem; }
.yry-breadcrumb a { color: #7aa2f7; text-decoration: none; }
.yry-breadcrumb a:hover { color: #fbbf24; }
.yry-breadcrumb .yry-bc-sep { color: #53576c; opacity: 0.5; user-select: none; }
.yry-breadcrumb .yry-bc-current { color: #94a3b8; font-weight: 500; }

.yry-cross-nav { display: flex; gap: 4px; justify-content: center; align-items: center; margin-bottom: 24px; flex-wrap: wrap; animation: yry-fadeInDown .5s .15s ease both; }
.yry-cross-nav .yry-cross-link { color: var(--yry-cyan); text-decoration: none; font-size: .74rem; padding: 3px 10px; border-radius: 4px; }
.yry-cross-nav .yry-cross-link:hover { color: var(--yry-accent); background: rgba(255,193,7,.06); }
.yry-cross-nav .yry-cross-link.on { color: var(--yry-accent); font-weight: 600; }
.yry-cross-nav .yry-cross-sep { color: var(--yry-text3); font-size: .5rem; opacity: .35; user-select: none; }

.yry-tabs { display: flex; gap: 0; border-bottom: var(--yry-border); margin-bottom: 0; }
.yry-tab { padding: 10px 20px; cursor: pointer; font-size: .84rem; color: var(--yry-text3); border-bottom: 2px solid transparent; transition: all .15s; user-select: none; }
.yry-tab:hover { color: var(--yry-text2); }
.yry-tab.on { color: var(--yry-accent); border-bottom-color: var(--yry-accent); }

.yry-panel { display: none; animation: yry-fadeInUp .4s ease both; padding-top: 28px; }
.yry-panel.on { display: block; }

.yry-card { background: var(--yry-bg-card); border: var(--yry-border); border-radius: var(--yry-radius); padding: 24px; box-shadow: var(--yry-shadow); margin-bottom: 20px; }

.yry-suite { background: var(--yry-bg-card); border: var(--yry-border); border-radius: var(--yry-radius); overflow: hidden; margin-bottom: 20px; }
.yry-suite summary { padding: 18px 24px; cursor: pointer; font-weight: 600; color: var(--yry-accent); user-select: none; }
.yry-suite .yry-suite-body { padding: 0 24px 18px; }

.yry-btn { padding: 8px 16px; border-radius: 6px; border: var(--yry-border); background: var(--yry-bg-raised); color: var(--yry-text2); cursor: pointer; font-size: .8rem; transition: all .15s; }
.yry-btn:hover { background: var(--yry-accent); color: #000; border-color: var(--yry-accent); }

.yry-footer { text-align: center; color: var(--yry-text3); font-size: .74rem; margin-top: 48px; padding-top: 20px; border-top: var(--yry-border); }
</style>
