<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<link rel="stylesheet" href="../../../../cdn/fonts.css">

<link rel="stylesheet" href="../../../../cdn/theme-mono.css">
<style>body{font-family:'JetBrains Mono',monospace;background:#020617;min-height:100vh;padding:2rem;color:white}</style>
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace;background:#020617;min-height:100vh;padding:2rem;color:white}
.container{max-width:1400px;margin:0 auto}
.header{margin-bottom:1.5rem}
.header-row{display:flex;align-items:center;gap:1rem;margin-bottom:.5rem}
.pulse-dot{width:12px;height:12px;background:#22d3ee;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
h1{font-size:1.5rem;font-weight:700}
.subtitle{color:#94a3b8;font-size:.875rem;margin-left:1.75rem}
.toolbar{display:flex;gap:.5rem;margin-left:auto;flex-shrink:0;align-items:center}
.toolbar-toggle{background:transparent;border:none;color:#475569;cursor:pointer;font-size:1.25rem;padding:.25rem .5rem;border-radius:.375rem}
.toolbar-toggle:hover{color:#94a3b8;background:rgba(30,41,59,.5)}
.toolbar-actions{display:none;gap:.5rem}
.toolbar.expanded .toolbar-actions{display:flex}
.toolbar-actions button{background:rgba(30,41,59,.8);border:1px solid #334155;color:#94a3b8;padding:.375rem .75rem;border-radius:.375rem;font-family:inherit;font-size:.75rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.toolbar-actions button:hover{background:rgba(51,65,85,.8);color:white;border-color:#475569}
.graph-container{background:rgba(15,23,42,.5);border-radius:1rem;border:1px solid #1e293b;padding:1rem;margin-bottom:1.5rem}
#cy{width:100%;height:550px;border-radius:.5rem}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;margin-bottom:1.5rem}
.card{background:rgba(15,23,42,.5);border-radius:.75rem;border:1px solid #1e293b;padding:1.25rem}
.card-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem}
.card-dot{width:8px;height:8px;border-radius:50%}
.card-dot.scene{background:#8B5CF6}.card-dot.check{background:#EC4899}.card-dot.source{background:#3B82F6}.card-dot.domain{background:#22d3ee}
.card h3{font-size:.875rem;font-weight:600}
.card ul{list-style:none;color:#94a3b8;font-size:.75rem}
.card li{margin-bottom:.375rem}
.legend{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:.75rem;padding:.75rem;background:rgba(15,23,42,.5);border-radius:.5rem;border:1px solid #1e293b;font-size:.75rem;color:#94a3b8}
.legend-item{display:flex;align-items:center;gap:.375rem}
.legend-dot{width:12px;height:12px;border-radius:50%;border:2px solid}
.legend-dot.scene{background:rgba(139,92,246,.3);border-color:#8B5CF6}
.legend-dot.check{background:rgba(236,72,153,.3);border-color:#EC4899}
.legend-dot.source{background:rgba(59,130,246,.3);border-color:#3B82F6}
.legend-dot.domain{background:rgba(34,211,238,.3);border-color:#22d3ee}
.breadcrumb{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem;font-size:0.76rem}
.breadcrumb a{color:#7aa2f7;text-decoration:none}
.breadcrumb a:hover{color:#fbbf24}
.breadcrumb .bc-sep{color:#53576c;opacity:0.5;user-select:none}
.breadcrumb .bc-current{color:#94a3b8;font-weight:500}
.cross-nav{display:flex;gap:4px;justify-content:center;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;animation:fadeInDown .5s .15s ease both}
.cross-link{color:#7aa2f7;text-decoration:none;font-size:0.76rem;padding:3px 10px;border-radius:4px}
.cross-link:hover{color:#fbbf24;background:rgba(251,191,36,0.06)}
.cross-link.on{color:#fbbf24;font-weight:600;cursor:default}
.cross-sep{color:#475569;font-size:0.5rem;opacity:0.35;user-select:none}
.footer{text-align:center;color:#475569;font-size:.75rem;margin-top:1rem}
@media print{body{background:#020617;padding:1rem}.toolbar{display:none!important}}
</style>
</head>
<body>
<div class="container" id="report-container">
<nav class="yry-breadcrumb"><a href="../../../../docs/index.html">📄 文档中心</a><span class="yry-bc-sep">/</span><span class="yry-bc-current">自改进 · 故事任务</span><span class="yry-bc-sep">/</span><span class="yry-bc-current">场景 4 · 效果评估与闭环</span><span class="yry-bc-sep">/</span><span class="yry-bc-current">🔗 知识图谱</span></nav>
<div class="yry-cross-nav"><a class="yry-cross-link" href="计划清单.html">📋 清单</a><span class="yry-cross-sep">·</span><a class="yry-cross-link" href="架构图.html">📐 架构</a><span class="yry-cross-sep">·</span><span class="yry-cross-link on">🔗 图谱</span><span class="yry-cross-sep">·</span><a class="yry-cross-link" href="源码.html">📄 源码</a><span class="yry-cross-sep">·</span><a class="yry-cross-link" href="测试面板.html">🧪 测试</a><span class="yry-cross-sep">·</span><a class="yry-cross-link" href="演示.html">💡 演示</a><span class="yry-cross-sep">·</span><a class="yry-cross-link" href="审查.html">📝 审查</a></div>

<div class="header">
  <div class="header-row">
    <div class="pulse-dot"></div>
    <h1>🔗 效果评估与闭环 · 知识图谱</h1>
    <div class="toolbar">
      <div class="toolbar-actions">
        <button onclick="copyAsImage(this)">📋 Copy</button>
        <button onclick="downloadPNG(this)">🖼 PNG</button>
        <button onclick="downloadPDF(this)">📄 PDF</button>
      </div>
      <button class="toolbar-toggle" onclick="this.parentElement.classList.toggle('expanded')">⋯</button>
    </div>
  </div>
  <p class="subtitle">自改进 · 场景 4 · vv5.1.0</p>
</div>

<div class="legend">
  <span style="color:#94a3b8;font-weight:600;">节点:</span>
  <span class="legend-item"><span class="legend-dot scene"></span>场景</span>
  <span class="legend-item"><span class="legend-dot check"></span>检查/功能</span>
  <span class="legend-item"><span class="legend-dot source"></span>源文件</span>
  <span class="legend-item"><span class="legend-dot domain"></span>概念域</span>
  <span style="margin-left:1rem;color:#94a3b8;font-weight:600;">操作:</span>
  <span style="color:#64748b;">🖱 拖拽 · 滚轮缩放 · 点击节点高亮邻域</span>
</div>

<div class="graph-container"><div id="cy"></div></div>

<div class="cards">
  <div class="card">
    <div class="card-header"><div class="card-dot scene"></div><h3>场景</h3></div>
    <ul><li><b>效果评估与闭环</b> — 场景 4</li></ul>
  </div>
  <div class="placeholder">数据待填充 — 运行 /rui code 生成</div>
</div>

<div class="footer">YrY vv5.1.0 · 2026-06-10</div>
</div>
<script src="../../../../cdn/shared.js"></script>
<script>
(function(){
  if(typeof cytoscape==='undefined'){document.getElementById('cy').innerHTML='<p style="color:#475569;text-align:center;padding:2rem;">Cytoscape.js 未加载 — 知识图谱数据待生成</p>';return}
  var cy=cytoscape({container:document.getElementById('cy'),style:[{selector:'node',style:{label:'data(label)',color:'white','font-size':'10px','font-family':'JetBrains Mono,monospace','text-valign':'center','text-halign':'center','background-color':'#1e293b',border:'2px solid #475569'}}],elements:{nodes:[{data:{id:'placeholder',label:'数据待填充'}}],edges:[]},layout:{name:'grid'}});
  document.querySelector('.toolbar-actions button:nth-child(1)').onclick=function(){navigator.clipboard.writeText(JSON.stringify(cy.json())).then(()=>{this.textContent='✅ Copied';setTimeout(()=>this.textContent='📋 Copy',1500)})};
  document.querySelector('.toolbar-actions button:nth-child(2)').onclick=function(){if(typeof html2canvas==='undefined')return;html2canvas(document.getElementById('cy'),{backgroundColor:'#020617'}).then(c=>{var a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='自改进-scene4-kg.png';a.click()})};
})();
</script>
</body>
</html>
