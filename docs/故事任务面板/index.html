<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YrY 故事任务面板</title>
  <meta name="description" content="YrY 故事任务面板 — 6 故事 · 32 场景 · 故事驱动 SDLC 编排 · 每场景 7 件标准交付物">
  <link rel="stylesheet" href="../../cdn/theme/index.css">
  <link rel="stylesheet" href="../../cdn/shared/index.css">
  <link rel="stylesheet" href="../../cdn/yry-inline-helpers/index.css">
  <link rel="stylesheet" href="../../cdn/yry-breadcrumb/index.css">
  <link rel="stylesheet" href="../../cdn/yry-scene-header/index.css">
  <link rel="stylesheet" href="../../cdn/yry-stats-grid/index.css">
  <link rel="stylesheet" href="../../cdn/yry-cross-nav/index.css">
  <link rel="stylesheet" href="../../cdn/yry-footer-note/index.css">
  <link rel="stylesheet" href="../../cdn/yry-story-card-list/index.css">
  <style>
    body { padding: 32px 24px 60px; max-width: 1100px; margin: 0 auto; line-height: 1.7; }
  </style>
</head>
<body>
  <yry-breadcrumb id="breadcrumb-app"></yry-breadcrumb>
  <yry-scene-header id="scene-header-app"></yry-scene-header>
  <yry-stats-grid id="stats-grid-app"></yry-stats-grid>
  <yry-cross-nav id="cross-nav-app"></yry-cross-nav>

  <!-- ═══ 故事卡片列表 (yry-story-card-list 组件渲染) ═══ -->
  <yry-story-card-list id="scl-app"></yry-story-card-list>

  <yry-footer-note version="5.4.0"></yry-footer-note>

  <script src="../../cdn/shared/index.js"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="../../cdn/yry-breadcrumb/index.js"></script>
  <script src="../../cdn/yry-scene-header/index.js"></script>
  <script src="../../cdn/yry-stats-grid/index.js"></script>
  <script src="../../cdn/yry-cross-nav/index.js"></script>
  <script src="../../cdn/yry-footer-note/index.js"></script>
  <script src="../../cdn/yry-story-card-list/index.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var bc = document.getElementById('breadcrumb-app');
      if (bc) bc.items = [{ label: 'YrY', href: '../../', icon: '📚' }, { label: '文档中心', href: '../index.html' }, { label: '故事任务面板' }];

      var sh = document.getElementById('scene-header-app');
      if (sh) {
        sh.icon = '📋'; sh.titlePrefix = 'YrY '; sh.accent = '故事任务面板';
        sh.meta = '📌 v5.4.0 · 📋 6 故事 · 🎬 32 场景 · 📦 7 件/场景';
        sh.desc = '故事驱动的 SDLC 编排系统 — 6 故事 (CDN·首页·清单·测试·架构·自改进) → 32 场景 (每场景 7 件标准交付物: 清单·架构·图谱·测试·源码·演示·审查)。';
      }

      var sg = document.getElementById('stats-grid-app');
      if (sg) sg.items = [
        { value: '6', label: '故事', sub: 'CDN资源库 · 文档首页 · 清单组件 · 测试面板 · 架构图 · 自改进' },
        { value: '32', label: '场景', sub: '5+4+4+6+8+5 · 每场景 7 件标准交付物' },
        { value: '7', label: '交付物/场景', sub: '计划清单 · 架构图 · 知识图谱 · 测试面板 · 源码 · 演示 · 审查' },
        { value: '5', label: '组件线', sub: 'CDN · Home · Checklist · Test · Arch · SelfImprove' }
      ];

      var cn = document.getElementById('cross-nav-app');
      if (cn) {
        cn.basePath = '';
        cn.active = '';
        cn.pages = [
          { id: '文档中心', icon: '📚', href: '../index.html' },
          { id: 'CDN 共享库', icon: '🌐', href: '../../cdn/index.html' },
          { id: '自检中心', icon: '🧪', href: '../../tests/index.html' },
          { id: '健康报告', icon: '🩺', href: '../健康报告/index.html' },
          { id: 'CLAUDE.md', icon: '📜', href: '../../CLAUDE.md' },
          { id: 'README.md', icon: '📖', href: '../../README.md' }
        ];
      }

      /* ── 故事卡片列表数据 ── */
      var LINK_LABELS = ['清单', '架构', '图谱', '测试', '源码', '演示', '审查'];
      var LINK_FILES = ['计划清单.html', '架构图.html', '知识图谱.html', '测试面板.html', '源码.html', '演示.html', '审查.html'];

      function buildLinks(baseDir) {
        return LINK_LABELS.map(function(label, i) {
          return { label: label, href: baseDir + '/' + LINK_FILES[i] };
        });
      }

      function buildScene(baseDir, slug, name, desc) {
        var dir = baseDir + '/场景-' + slug;
        return {
          name: name,
          href: dir + '/index.md',
          desc: desc,
          links: buildLinks(dir)
        };
      }

      var STORIES = [
        {
          badge: 'CDN', badgeVariant: 'cdn',
          title: 'Story 1: CDN 共享前端资源库',
          desc: 'YrY 共享前端资源 — 双主题系统 (Mono + System)、107 组件、9 JS 工具 API、54 Vue 3 自定义元素。55+ 页面统一引用，消除内联重复代码 40-60%。',
          meta: [{ text: '📁 cdn/故事任务面板/' }, { text: '🎬 5 场景' }],
          baseDir: '../../cdn/故事任务面板',
          scenes: [
            { slug: '1-cdn资源加载与页面渲染', name: '场景 1 · CDN 资源加载与页面渲染', desc: 'CDN 架构设计、资源加载策略、性能优化' },
            { slug: '2-双主题系统设计', name: '场景 2 · 双主题系统设计', desc: 'Mono + System 双主题、14 设计令牌、CSS 变量体系' },
            { slug: '3-组件库与JS工具API', name: '场景 3 · 组件库与 JS 工具 API', desc: '22 CSS 组件 + 9 JS 工具 API + 54 Vue 自定义元素' },
            { slug: '4-存量页面迁移', name: '场景 4 · 存量页面迁移', desc: '55+ 页面从内联样式迁移到 CDN 组件引用' },
            { slug: '5-npm包发布与版本管理', name: '场景 5 · npm 包发布与版本管理', desc: 'jsDelivr CDN 分发、语义化版本、自动发布流水线' }
          ]
        },
        {
          badge: 'Home', badgeVariant: 'home',
          title: 'Story 2: 文档中心首页',
          desc: 'YrY 文档中心首页 — 八维加权评分仪表板 · 技能架构七层展示 · Agent 与治理面板。从手工维护升级为项目数据驱动的自动生成页面。',
          meta: [{ text: '📁 cdn/yry-home/' }, { text: '🎬 4 场景' }],
          baseDir: '../../cdn/yry-home',
          scenes: [
            { slug: '1-数据采集与六层聚合', name: '场景 1 · 数据采集与六层聚合', desc: '项目资产扫描、统计数据收集、六层结构建模' },
            { slug: '2-实时面板与交互组件', name: '场景 2 · 实时面板与交互组件', desc: '实时评分报告、Tab 导航、面板组件集成' },
            { slug: '3-交叉导航与可访问性', name: '场景 3 · 交叉导航与可访问性', desc: '全站链接拓扑验证、死链自动检测、响应式适配' },
            { slug: '4-自动化生成管线', name: '场景 4 · 自动化生成管线', desc: 'rui-html 集成、增量更新、数据源变更触发重新生成' }
          ]
        },
        {
          badge: 'Check', badgeVariant: 'checklist',
          title: 'Story 3: 清单组件',
          desc: 'YrY 清单组件 — 模板架构与 CSS 设计系统 · 交互组件实现 · 验证报告与健康面板集成 · 批量生成与自循环机制。',
          meta: [{ text: '📁 cdn/yry-checklist/' }, { text: '🎬 4 场景' }],
          baseDir: '../../cdn/yry-checklist',
          scenes: [
            { slug: '1-模板架构与CSS设计系统', name: '场景 1 · 模板架构与 CSS 设计系统', desc: '清单模板架构、CSS 设计系统、样式变量体系' },
            { slug: '2-清单交互组件实现', name: '场景 2 · 清单交互组件实现', desc: 'Vue 3 自定义元素、勾选状态管理、进度计算' },
            { slug: '3-验证报告与健康面板集成', name: '场景 3 · 验证报告与健康面板集成', desc: '验证结果展示、健康面板数据联动、实时更新' },
            { slug: '4-批量生成与自循环机制', name: '场景 4 · 批量生成与自循环机制', desc: '批量生成管线、自循环触发、Cron 调度集成' }
          ]
        },
        {
          badge: 'Test', badgeVariant: 'test',
          title: 'Story 4: 测试面板',
          desc: 'YrY 测试面板 — 6 场景贯穿全生命周期测试流程。init 全量自检 · commit 增量自检 · 文档一致性校验 · 安全回归 · 集成回归 · 第三方服务自检。',
          meta: [{ text: '📁 cdn/yry-test/' }, { text: '🎬 6 场景' }],
          baseDir: '../../cdn/yry-test',
          scenes: [
            { slug: '1-init后全量自检', name: '场景 1 · init 后全量自检', desc: '项目初始化后的全量测试自检流程' },
            { slug: '2-commit前增量自检', name: '场景 2 · commit 前增量自检', desc: '提交前的增量变更测试自检' },
            { slug: '3-文档代码一致性校验', name: '场景 3 · 文档代码一致性校验', desc: '文档与代码的一致性验证' },
            { slug: '4-安全面回归自检', name: '场景 4 · 安全面回归自检', desc: '安全相关的全面回归测试' },
            { slug: '5-跨故事集成回归自检', name: '场景 5 · 跨故事集成回归自检', desc: '跨故事的集成回归测试' },
            { slug: '6-第三方框架与服务自检', name: '场景 6 · 第三方框架与服务自检', desc: '第三方依赖和外部服务的可达性检查' }
          ]
        },
        {
          badge: 'Arch', badgeVariant: 'arch',
          title: 'Story 5: 架构图组件',
          desc: 'YrY 架构图组件 — 8 场景覆盖新人上手到架构健康度量。自包含 HTML+SVG 深色主题 · Mermaid 统一配色 · 知识图谱三层 schema。',
          meta: [{ text: '📁 cdn/yry-arch/' }, { text: '🎬 8 场景' }],
          baseDir: '../../cdn/yry-arch',
          scenes: [
            { slug: '1-新人上手', name: '场景 1 · 新人上手', desc: '架构图快速入门、组件关系理解、导航路径' },
            { slug: '2-模块定位', name: '场景 2 · 模块定位', desc: '模块依赖关系、接口边界、分层架构' },
            { slug: '3-数据流追踪', name: '场景 3 · 数据流追踪', desc: '数据流向、事件传递、状态管理' },
            { slug: '4-依赖变更影响', name: '场景 4 · 依赖变更影响', desc: '依赖变更影响分析、版本兼容性' },
            { slug: '5-信任边界与安全面', name: '场景 5 · 信任边界与安全面', desc: '安全边界、认证流程、权限模型' },
            { slug: '6-架构断言脚本化校验', name: '场景 6 · 架构断言脚本化校验', desc: '架构合规自动验证、10 维度检查、arch-check' },
            { slug: '7-架构漂移持续监测', name: '场景 7 · 架构漂移持续监测', desc: '架构漂移检测、趋势追踪、自动告警' },
            { slug: '8-架构健康度量仪表板', name: '场景 8 · 架构健康度量仪表板', desc: '架构健康仪表板、AQI 评分、趋势可视化' }
          ]
        },
        {
          badge: 'Self', badgeVariant: 'self',
          title: 'Story 6: 自改进面板',
          desc: 'YrY 自改进闭环 — 5 场景覆盖观察→诊断→改进→评估→经验技能化全流程。D0-D8 九级诊断引擎 · E1-E4 效果评估 · 记忆压缩注入。',
          meta: [{ text: '📁 cdn/yry-selfimprove-panel/' }, { text: '🎬 5 场景' }],
          baseDir: '../../cdn/yry-selfimprove-panel',
          scenes: [
            { slug: '1-数据采集与观察', name: '场景 1 · 数据采集与观察', desc: '健康趋势数据采集、多维度观察、基线建立' },
            { slug: '2-诊断引擎', name: '场景 2 · 诊断引擎', desc: 'D0-D8 九级诊断触发、根因分析、严重度评级' },
            { slug: '3-提案生成与路由', name: '场景 3 · 提案生成与路由', desc: '改进提案自动生成、优先级排序、路由分发' },
            { slug: '4-效果评估与闭环', name: '场景 4 · 效果评估与闭环', desc: 'E1-E4 效果评估、改进闭环、反馈修正' },
            { slug: '5-经验技能化与记忆注入', name: '场景 5 · 经验技能化与记忆注入', desc: '经验沉淀为技能、记忆压缩、上下文注入' }
          ]
        }
      ];

      /* 展开场景: 将 slug 转为完整 scene 对象 */
      var stories = STORIES.map(function(story) {
        return {
          badge: story.badge,
          badgeVariant: story.badgeVariant,
          title: story.title,
          desc: story.desc,
          meta: story.meta,
          scenes: story.scenes.map(function(s) {
            return buildScene(story.baseDir, s.slug, s.name, s.desc);
          })
        };
      });

      var summary = [
        { value: '6', label: '故事' },
        { value: '32', label: '场景' },
        { value: '7', label: '交付物/场景' },
        { value: '5', label: '组件线' }
      ];

      var sclEl = document.getElementById('scl-app');
      if (sclEl) {
        sclEl.summary = summary;
        sclEl.stories = stories;
      }
    });
  </script>
</body>
</html>
