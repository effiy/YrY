.diagram-container svg{width:100%;min-width:900px;display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;margin-bottom:1.5rem}
.card{background:rgba(15,23,42,.5);border-radius:.75rem;border:1px solid #1e293b;padding:1.25rem}

/* ── Breadcrumb ─────────────────────────── */
.breadcrumb{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem;font-size:0.76rem}
.breadcrumb a{color:#7aa2f7;text-decoration:none;transition:color 0.15s}
.breadcrumb a:hover{color:#fbbf24;text-decoration:underline}
.breadcrumb .bc-sep{color:#53576c;opacity:0.5;user-select:none}

/* ── Cross-Nav ─────────────────────────── */
.cross-nav{display:flex;gap:4px;justify-content:center;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap}
.cross-link{color:#7aa2f7;text-decoration:none;font-size:0.76rem;padding:3px 10px;border-radius:4px;transition:color 0.15s,background 0.15s}
.cross-link:hover{color:#fbbf24;background:rgba(251,191,36,0.06)}
.cross-link.on{color:#fbbf24;font-weight:600;cursor:default}
.cross-sep{color:#475569;font-size:0.5rem;opacity:0.35;user-select:none}

.footer{text-align:center;color:#475569;font-size:.75rem;margin-top:1rem}
@media print{body{background:#020617;padding:1rem}.toolbar{display:none!important}}
</style></head><body><div class="container" id="rc">

<div class="header"><div class="header-row"><div class="pulse-dot"></div><h1>场景-2 · 包安装与版本管理 — 架构图</h1>

</div><p class="subtitle">安装/更新/列表命令流向：包名解析 → 前置校验 → npm CLI → 版本确认</p></div>
<div class="diagram-container"><svg viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg"><defs><marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#22d3ee"/></marker><linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/></linearGradient></defs><rect width="800" height="280" fill="url(#bgGrad)" rx="12"/><text x="400" y="25" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="JetBrains Mono">包安装与版本管理流</text>
<rect x="20" y="50" width="100" height="40" rx="8" fill="#1e293b" stroke="#334155"/><text x="70" y="74" text-anchor="middle" fill="#fbbf24" font-size="11" font-family="JetBrains Mono">pkg@version</text>

<script>
async function copyAsImage(b){const o=b.textContent;try{const e=document.getElementById("rc"),r=e.getBoundingClientRect(),p=32,c=await html2canvas(document.body,{backgroundColor:"#020617",scale:2,ignoreElements:x=>x.classList&&x.classList.contains("toolbar"),x:r.left+window.scrollX-p,y:r.top+window.scrollY-p,width:r.width+p*2,height:r.height+p*2}),bl=await new Promise(r=>c.toBlob(r,"image/png"));await navigator.clipboard.write([new ClipboardItem({"image/png":bl})]);b.textContent="✓ Copied!"}catch(e){b.textContent="✗ Failed"}setTimeout(()=>b.textContent=o,2000)}
async function downloadPNG(b){const o=b.textContent;b.textContent="⏳...";try{const e=document.getElementById("rc"),r=e.getBoundingClientRect(),p=32,c=await html2canvas(document.body,{backgroundColor:"#020617",scale:2,ignoreElements:x=>x.classList&&x.classList.contains("toolbar"),x:r.left+window.scrollX-p,y:r.top+window.scrollY-p,width:r.width+p*2,height:r.height+p*2}),a=document.createElement("a");a.download="场景-2-包安装与版本管理.png";a.href=c.toDataURL("image/png");a.click();b.textContent="✓ Done!"}catch(e){b.textContent="✗ Failed"}setTimeout(()=>b.textContent=o,2000)}
async function downloadPDF(b){const o=b.textContent;b.textContent="⏳...";try{const e=document.getElementById("rc"),r=e.getBoundingClientRect(),p=32,c=await html2canvas(document.body,{backgroundColor:"#020617",scale:2,ignoreElements:x=>x.classList&&x.classList.contains("toolbar"),x:r.left+window.scrollX-p,y:r.top+window.scrollY-p,width:r.width+p*2,height:r.height+p*2});const{jsPDF}=window.jspdf;const d=new jsPDF({orientation:c.width>c.height?"l":"p",unit:"px",format:[c.width/2,c.height/2]});d.addImage(c.toDataURL("image/png"),"PNG",0,0,c.width/2,c.height/2);d.save("场景-2-包安装与版本管理.pdf");b.textContent="✓ Done!"}catch(e){b.textContent="✗ Failed"}setTimeout(()=>b.textContent=o,2000)}
</script></body></html>
