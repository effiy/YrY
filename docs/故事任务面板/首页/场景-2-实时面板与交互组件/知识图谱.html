<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>实时面板 — 知识图谱</title><link rel="stylesheet" href="../../../../cdn/fonts.css">
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#020617;--card:rgba(15,23,42,.5);--border:#1e293b;--text:#fff;--text2:#94a3b8;--text3:#64748b;--cyan:#22d3ee;--emerald:#34d399;--violet:#a78bfa}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);min-height:100vh;padding:2rem;color:var(--text);background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(34,211,238,.08),transparent);background-attachment:fixed}
.container{max-width:1240px;margin:0 auto}.header{margin-bottom:1.25rem}
.header-row{display:flex;align-items:center;gap:1rem;margin-bottom:.5rem}
.pulse-dot{width:12px;height:12px;background:var(--cyan);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
h1{font-size:1.5rem;font-weight:700}.subtitle{color:var(--text2);font-size:.85rem;margin-left:1.75rem}
.breadcrumb{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:1rem;font-size:0.76rem}
.breadcrumb a{color:#7aa2f7;text-decoration:none}.breadcrumb a:hover{color:#fbbf24}
.breadcrumb .bc-sep{color:#53576c;opacity:0.5}.breadcrumb .bc-current{color:var(--text2);font-weight:500}
.cross-nav{display:flex;gap:4px;justify-content:center;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap}
.cross-link{color:#7aa2f7;text-decoration:none;font-size:0.76rem;padding:3px 10px;border-radius:4px}
.cross-link:hover{color:#fbbf24}.cross-link.on{color:#fbbf24;font-weight:600}
.cross-sep{color:#475569;font-size:0.5rem;opacity:0.35}
.graph-container{background:var(--card);border-radius:1rem;border:1px solid var(--border);padding:1rem;margin-bottom:1.25rem}
#cy{width:100%;height:450px;border-radius:.5rem}
.legend{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:.75rem;padding:.75rem;background:var(--card);border-radius:.5rem;border:1px solid var(--border);font-size:.75rem;color:var(--text2)}
.footer{text-align:center;color:var(--text3);font-size:.72rem;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border)}
</style></head><body><div class="container">
<nav class="breadcrumb"><a href="../../../index.html">📄 文档中心</a><span class="bc-sep">/</span><span class="bc-current">yry-index · 场景 2 · 🔗 知识图谱</span></nav>
<nav class="cross-nav"><a class="cross-link" href="计划清单.html">📋 清单</a><span class="cross-sep">·</span><a class="cross-link" href="架构图.html">📐 架构</a><span class="cross-sep">·</span><span class="cross-link on">🔗 图谱</span><span class="cross-sep">·</span><a class="cross-link" href="源码.html">📄 源码</a><span class="cross-sep">·</span><a class="cross-link" href="测试面板.html">🧪 测试</a><span class="cross-sep">·</span><a class="cross-link" href="演示.html">💡 演示</a><span class="cross-sep">·</span><a class="cross-link" href="审查.html">📝 审计</a></nav>
<div class="header"><div class="header-row"><div class="pulse-dot"></div><h1>实时面板与交互组件 — 知识图谱</h1></div><p class="subtitle">Panel hub · 4 面板 · 5 数据源 · PanelHub API</p></div>
<div class="legend"><span>🟣 Panel · 🟢 数据源 · 🔵 API</span><span style="margin-left:1rem;color:var(--text3)">🖱 拖拽缩放 · 点击高亮</span></div>
<div class="graph-container"><div id="cy"></div></div>
<div class="footer">YrY v5.3.0 · yry-index · 场景-2 · 知识图谱 v1.0.0</div>
</div>
<script>
const cy=cytoscape({container:document.getElementById('cy'),style:[
{selector:'node',style:{'label':'data(label)','font-family':'JetBrains Mono,monospace','font-size':'9px','color':'#e2e8f0','text-valign':'center','text-halign':'center','text-wrap':'wrap','text-max-width':'85px','border-width':2,'width':52,'height':52,'background-opacity':0.9}},
{selector:'node[type="panel"]',style:{'background-color':'rgba(139,92,246,.35)','border-color':'#8B5CF6','width':60,'height':60,'font-size':'10px','font-weight':'700','shape':'round-rectangle'}},
{selector:'node[type="source"]',style:{'background-color':'rgba(52,211,153,.3)','border-color':'#34d399'}},
{selector:'node[type="api"]',style:{'background-color':'rgba(59,130,246,.3)','border-color':'#3B82F6','width':56,'height':56}},
{selector:'edge',style:{'width':1.2,'line-color':'#334155','target-arrow-shape':'triangle','arrow-scale':0.8,'curve-style':'bezier','opacity':0.6}},
{selector:'edge[type="reads"]',style:{'line-color':'#34d399','width':1.2,'opacity':0.7}},
{selector:'edge[type="calls"]',style:{'line-color':'#3B82F6','width':1.2,'opacity':0.7}},
{selector:'node:selected',style:{'border-width':3,'border-color':'#fff','z-index':999}}
],
elements:{nodes:[
{data:{id:'ph',label:'Panel\nHub',type:'panel'}},
{data:{id:'cron',label:'⏰\n调度',type:'panel'}},
{data:{id:'notify',label:'🔔\n通知',type:'panel'}},
{data:{id:'self',label:'🧬\n自改进',type:'panel'}},
{data:{id:'faq',label:'❓\nFAQ',type:'panel'}},
{data:{id:'stasks',label:'scheduled_\ntasks.json',type:'source'}},
{data:{id:'health',label:'健康报告\nHTML',type:'source'}},
{data:{id:'trend',label:'health-\ntrend.jsonl',type:'source'}},
{data:{id:'api',label:'PanelHub\n.open()',type:'api'}}
],
edges:[
{data:{id:'e1',source:'ph',target:'cron',type:'reads'}},
{data:{id:'e2',source:'ph',target:'notify',type:'reads'}},
{data:{id:'e3',source:'ph',target:'self',type:'reads'}},
{data:{id:'e4',source:'ph',target:'faq',type:'reads'}},
{data:{id:'e5',source:'cron',target:'stasks',type:'reads'}},
{data:{id:'e6',source:'notify',target:'health',type:'reads'}},
{data:{id:'e7',source:'self',target:'trend',type:'reads'}},
{data:{id:'e8',source:'cron',target:'api',type:'calls'}},
{data:{id:'e9',source:'notify',target:'api',type:'calls'}},
{data:{id:'e10',source:'self',target:'api',type:'calls'}},
{data:{id:'e11',source:'faq',target:'api',type:'calls'}}
]
},
layout:{name:'breadthfirst',directed:true,spacingFactor:1.2,animate:false},
wheelSensitivity:0.3
});
cy.on('tap','node',function(e){const n=e.target;cy.elements().removeStyle('opacity');const nb=n.closedNeighborhood().add(n);cy.elements().difference(nb).style('opacity','0.15')});
cy.on('tap',function(e){if(e.target===cy)cy.elements().removeStyle('opacity')});
</script>
</body>
</html>
