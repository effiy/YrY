<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>数据采集与六层聚合 — 知识图谱</title>
<link rel="stylesheet" href="../../../../cdn/fonts.css">
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#020617;--card:rgba(15,23,42,.5);--card2:rgba(15,23,42,.8);--border:#1e293b;--border2:#334155;--text:#fff;--text2:#94a3b8;--text3:#64748b;--cyan:#22d3ee;--emerald:#34d399;--violet:#a78bfa;--amber:#fbbf24;--rose:#fb7185;--blue:#3B82F6}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);min-height:100vh;padding:2rem;color:var(--text);background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(34,211,238,.08),transparent);background-attachment:fixed}
.container{max-width:1240px;margin:0 auto}
.header{margin-bottom:1.25rem;animation:fadeInDown .5s ease both}
.header-row{display:flex;align-items:center;gap:1rem;margin-bottom:.5rem;flex-wrap:wrap}
.pulse-dot{width:12px;height:12px;background:var(--cyan);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
h1{font-size:1.5rem;font-weight:700}.subtitle{color:var(--text2);font-size:.85rem;margin-left:1.75rem}
.breadcrumb{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:1rem;font-size:0.76rem}
.breadcrumb a{color:#7aa2f7;text-decoration:none}.breadcrumb a:hover{color:var(--amber)}
.breadcrumb .bc-sep{color:#53576c;opacity:0.5}.breadcrumb .bc-current{color:var(--text2);font-weight:500}
.cross-nav{display:flex;gap:4px;justify-content:center;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap}
.cross-link{color:#7aa2f7;text-decoration:none;font-size:0.76rem;padding:3px 10px;border-radius:4px}
.cross-link:hover{color:var(--amber)}.cross-link.on{color:var(--amber);font-weight:600}
.cross-sep{color:#475569;font-size:0.5rem;opacity:0.35}
.graph-container{background:var(--card);border-radius:1rem;border:1px solid var(--border);padding:1rem;margin-bottom:1.25rem}
#cy{width:100%;height:480px;border-radius:.5rem}
.legend{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:.75rem;padding:.75rem;background:var(--card);border-radius:.5rem;border:1px solid var(--border);font-size:.75rem;color:var(--text2);align-items:center}
.legend-dot{width:12px;height:12px;border-radius:50%;border:2px solid;display:inline-block;margin-right:.25rem}
.footer{text-align:center;color:var(--text3);font-size:.72rem;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border)}
</style></head><body><div class="container">

<div class="header"><div class="header-row"><div class="pulse-dot"></div><h1>数据采集与六层聚合 — 知识图谱</h1></div><p class="subtitle">5 数据源 → 5 步采集流程 → 6 层页面结构</p></div>

<div class="legend">
<span style="color:var(--text2);font-weight:600;">节点:</span>
<span class="legend-dot" style="background:rgba(236,72,153,.3);border-color:#EC4899"></span>Domain
<span class="legend-dot" style="background:rgba(52,211,153,.3);border-color:#34d399"></span>Flow
<span class="legend-dot" style="background:rgba(59,130,246,.3);border-color:#3B82F6"></span>Step
<span class="legend-dot" style="background:rgba(139,92,246,.3);border-color:#8B5CF6"></span>Scene
<span style="margin-left:1rem;color:var(--text3)">🖱 拖拽 · 滚轮缩放 · 点击邻域高亮</span>
</div>

<div class="graph-container"><div id="cy"></div></div>
<div class="footer">YrY v5.3.0 · yry-index · 场景-1 · 知识图谱 v1.0.0</div>
</div>
<script>
const cy=cytoscape({container:document.getElementById('cy'),style:[
{selector:'node',style:{'label':'data(label)','font-family':'JetBrains Mono,monospace','font-size':'9px','color':'#e2e8f0','text-valign':'center','text-halign':'center','text-wrap':'wrap','text-max-width':'90px','border-width':2,'width':52,'height':52,'background-opacity':0.9}},
{selector:'node[type="scene"]',style:{'background-color':'rgba(139,92,246,.35)','border-color':'#8B5CF6','width':66,'height':66,'font-size':'10px','font-weight':'700','shape':'round-rectangle'}},
{selector:'node[type="skill"]',style:{'background-color':'rgba(34,211,238,.35)','border-color':'#22d3ee'}},
{selector:'node[type="domain"]',style:{'background-color':'rgba(236,72,153,.3)','border-color':'#EC4899','width':60,'height':60,'font-size':'10px','font-weight':'600','shape':'rectangle'}},
{selector:'node[type="flow"]',style:{'background-color':'rgba(52,211,153,.3)','border-color':'#34d399','width':56,'height':56,'font-weight':'600'}},
{selector:'node[type="step"]',style:{'background-color':'rgba(59,130,246,.3)','border-color':'#3B82F6'}},
{selector:'node[type="layer"]',style:{'background-color':'rgba(251,191,36,.25)','border-color':'#fbbf24','shape':'round-rectangle','width':56,'height':56,'font-size':'8px'}},
{selector:'edge',style:{'width':1.2,'line-color':'#334155','target-arrow-color':'#334155','target-arrow-shape':'triangle','arrow-scale':0.8,'curve-style':'bezier','opacity':0.6}},
{selector:'edge[type="contains"]',style:{'line-color':'#8B5CF6','width':1.5,'opacity':0.7}},
{selector:'edge[type="defines"]',style:{'line-color':'#22d3ee','width':1.2,'opacity':0.6}},
{selector:'edge[type="references"]',style:{'line-color':'#3B82F6','width':1,'opacity':0.5,'line-style':'dashed'}},
{selector:'node:selected',style:{'border-width':3,'border-color':'#fff','width':'70px','height':'70px','z-index':999}}
],
elements:{nodes:[
{data:{id:'s1',label:'场景-1\n数据采集',type:'scene'}},
{data:{id:'d-assets',label:'项目资产\n5类规约源',type:'domain'}},
{data:{id:'d-model',label:'六层模型\nL1→L6',type:'domain'}},
{data:{id:'f-collect',label:'采集流程\n5步管线',type:'flow'}},
{data:{id:'st-scan',label:'FP1\n扫描目录',type:'step'}},
{data:{id:'st-parse',label:'FP4\n解析元数据',type:'step'}},
{data:{id:'st-count',label:'FP2\n统计计数',type:'step'}},
{data:{id:'st-model',label:'FP3\n六层建模',type:'step'}},
{data:{id:'st-verify',label:'FP5\n交叉验证',type:'step'}},
{data:{id:'l1',label:'L1\n依赖/框架',type:'layer'}},
{data:{id:'l2',label:'L2\n技能',type:'layer'}},
{data:{id:'l3',label:'L3\n故事',type:'layer'}},
{data:{id:'l4',label:'L4\n场景',type:'layer'}},
{data:{id:'l5',label:'L5\nAgent/规则',type:'layer'}},
{data:{id:'l6',label:'L6\n参考入口',type:'layer'}}
],
edges:[
{data:{id:'e1',source:'s1',target:'d-assets',type:'references'}},
{data:{id:'e2',source:'s1',target:'d-model',type:'references'}},
{data:{id:'e3',source:'s1',target:'f-collect',type:'contains'}},
{data:{id:'e4',source:'f-collect',target:'st-scan',type:'defines'}},
{data:{id:'e5',source:'f-collect',target:'st-parse',type:'defines'}},
{data:{id:'e6',source:'f-collect',target:'st-count',type:'defines'}},
{data:{id:'e7',source:'f-collect',target:'st-model',type:'defines'}},
{data:{id:'e8',source:'f-collect',target:'st-verify',type:'defines'}},
{data:{id:'e9',source:'st-model',target:'l1',type:'references'}},
{data:{id:'e10',source:'st-model',target:'l2',type:'references'}},
{data:{id:'e11',source:'st-model',target:'l3',type:'references'}},
{data:{id:'e12',source:'st-model',target:'l4',type:'references'}},
{data:{id:'e13',source:'st-model',target:'l5',type:'references'}},
{data:{id:'e14',source:'st-model',target:'l6',type:'references'}}
]
},
layout:{name:'breadthfirst',directed:true,spacingFactor:1.15,animate:false},
wheelSensitivity:0.3
});
cy.on('tap','node',function(evt){const node=evt.target;cy.elements().removeStyle('opacity');const nb=node.closedNeighborhood().add(node);cy.elements().difference(nb).style('opacity','0.15')});
cy.on('tap',function(evt){if(evt.target===cy)cy.elements().removeStyle('opacity')});
</script>
</body>
</html>
