  <div class="yry-diagram-wrap">
    <svg viewBox="0 0 1100 720" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
        </marker>
        <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
        </marker>
        <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
        </marker>
        <linearGradient id="grad-sys" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#2a1a3a"/>
          <stop offset="100%" stop-color="#1a2a3a"/>
        </linearGradient>
        <linearGradient id="grad-mono" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#1a2a4a"/>
          <stop offset="100%" stop-color="#0a1a3a"/>
        </linearGradient>
        <linearGradient id="grad-base" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#1a2a3a"/>
          <stop offset="100%" stop-color="#1a2a3a"/>
        </linearGradient>
      </defs>

      <!-- User Entry -->
      <rect x="430" y="10" width="240" height="44" rx="8" fill="#1a1a2a" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="550" y="38" text-anchor="middle" fill="#a9b1d6" font-size="12" font-weight="600">👤 用户打开页面</text>

      <line x1="550" y1="54" x2="550" y2="84" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Type Decision -->
      <polygon points="550,85 680,130 550,175 420,130" fill="#2a1a2a" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="550" y="135" text-anchor="middle" fill="#a9b1d6" font-size="11">页面类型?</text>

      <!-- Cat A path -->
      <line x1="420" y1="130" x2="180" y2="220" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
      <text x="280" y="160" text-anchor="middle" fill="#22d3ee" font-size="10">Category A</text>

      <!-- Cat B path -->
      <line x1="680" y1="130" x2="920" y2="220" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
      <text x="820" y="160" text-anchor="middle" fill="#fbbf24" font-size="10">Category B</text>

      <!-- Step 1: Google Fonts (Cat A only) -->
      <rect x="40" y="230" width="280" height="56" rx="8" fill="#1a2a2a" stroke="#f59e0b" stroke-width="1"/>
      <text x="180" y="252" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">① Google Fonts (仅 Cat A)</text>
      <text x="180" y="272" text-anchor="middle" fill="#64748b" font-size="9">fonts.googleapis.com</text>
      <text x="180" y="284" text-anchor="middle" fill="#64748b" font-size="9">JetBrains Mono woff2</text>

      <line x1="180" y1="286" x2="180" y2="340" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Step 2: shared.css -->
      <rect x="380" y="350" width="340" height="72" rx="8" fill="url(#grad-base)" stroke="#3d59a1" stroke-width="1.5"/>
      <text x="550" y="372" text-anchor="middle" fill="#a9b1d6" font-size="12" font-weight="600">② shared.css 加载</text>
      <text x="550" y="390" text-anchor="middle" fill="#64748b" font-size="9">CSS Reset · 6 动画 · 面包屑</text>
      <text x="550" y="404" text-anchor="middle" fill="#64748b" font-size="9">cross-nav · Toolbar · Toast · 工具类</text>

      <!-- Line from Cat A to shared.css -->
      <line x1="180" y1="230" x2="180" y2="290" stroke="#475569" stroke-width="0.5"/>
      <line x1="180" y1="290" x2="380" y2="386" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

      <line x1="550" y1="422" x2="550" y2="466" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Step 3: Theme CSS -->
      <rect x="40" y="476" width="280" height="72" rx="8" fill="url(#grad-mono)" stroke="#22d3ee" stroke-width="1"/>
      <text x="180" y="498" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="600">③a theme-mono.css</text>
      <text x="180" y="516" text-anchor="middle" fill="#64748b" font-size="9">深蓝黑底 + 等宽字体</text>
      <text x="180" y="530" text-anchor="middle" fill="#64748b" font-size="9">图表容器 · 图例 · 脉冲点 · 卡片</text>

      <rect x="780" y="476" width="280" height="72" rx="8" fill="url(#grad-sys)" stroke="#fbbf24" stroke-width="1"/>
      <text x="920" y="498" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">③b theme.css</text>
      <text x="920" y="516" text-anchor="middle" fill="#64748b" font-size="9">深紫黑底 + 系统字体</text>
      <text x="920" y="530" text-anchor="middle" fill="#64748b" font-size="9">14 设计令牌 · 14 组件样式</text>

      <line x1="550" y1="466" x2="180" y2="476" stroke="#22d3ee" stroke-width="0.5" stroke-dasharray="4" marker-end="url(#arrow-cyan)"/>
      <line x1="550" y1="466" x2="920" y2="476" stroke="#fbbf24" stroke-width="0.5" stroke-dasharray="4" marker-end="url(#arrow-amber)"/>

      <line x1="180" y1="548" x2="180" y2="590" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
      <line x1="920" y1="548" x2="920" y2="590" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Step 4: shared.js -->
      <rect x="380" y="600" width="340" height="56" rx="8" fill="#1a3a2a" stroke="#22c55e" stroke-width="1.5"/>
      <text x="550" y="622" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="600">④ shared.js 加载</text>
      <text x="550" y="640" text-anchor="middle" fill="#64748b" font-size="9">IIFE → window.YrY 就绪 · 9 个公共 API</text>

      <line x1="180" y1="590" x2="380" y2="628" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
      <line x1="920" y1="590" x2="720" y2="628" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

      <!-- Step 5: Interactive -->
      <line x1="550" y1="656" x2="550" y2="690" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)"/>
      <rect x="430" y="692" width="240" height="22" rx="6" fill="#1a3a1a" stroke="#22c55e" stroke-width="1"/>
      <text x="550" y="708" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">⑤ 页面可交互 ✅</text>
