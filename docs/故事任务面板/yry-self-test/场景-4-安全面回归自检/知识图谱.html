<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>🛡️ 安全面回归自检 · 知识图谱</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace;background:#020617;min-height:100vh;padding:2rem;color:white}
.container{max-width:1400px;margin:0 auto}
.header{margin-bottom:1.5rem}
.header-row{display:flex;align-items:center;gap:1rem;margin-bottom:.5rem}
.pulse-dot{width:12px;height:12px;background:#22d3ee;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
h1{font-size:1.5rem;font-weight:700}
.subtitle{color:#94a3b8;font-size:.875rem;margin-left:1.75rem}
.toolbar{display:flex;gap:.5rem;margin-left:auto;flex-shrink:0;align-items:center}
.toolbar-toggle{background:transparent;border:none;color:#475569;cursor:pointer;font-size:1.25rem;padding:.25rem .5rem;border-radius:.375rem}
.toolbar-toggle:hover{color:#94a3b8;background:rgba(30,41,59,.5)}
.toolbar-actions{display:none;gap:.5rem}
.toolbar.expanded .toolbar-actions{display:flex}
.toolbar-actions button{background:rgba(30,41,59,.8);border:1px solid #334155;color:#94a3b8;padding:.375rem .75rem;border-radius:.375rem;font-family:inherit;font-size:.75rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.toolbar-actions button:hover{background:rgba(51,65,85,.8);color:white;border-color:#475569}
.graph-container{background:rgba(15,23,42,.5);border-radius:1rem;border:1px solid #1e293b;padding:1rem;margin-bottom:1.5rem}
#cy{width:100%;height:500px;border-radius:.5rem}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;margin-bottom:1.5rem}
.card{background:rgba(15,23,42,.5);border-radius:.75rem;border:1px solid #1e293b;padding:1.25rem}
.card-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.75rem}
.card-dot{width:8px;height:8px;border-radius:50%}
.card-dot.scene{background:#8B5CF6}
.card h3{font-size:.875rem;font-weight:600}
.card ul{list-style:none;color:#94a3b8;font-size:.75rem}
.card li{margin-bottom:.375rem}
.legend{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:.75rem;padding:.75rem;background:rgba(15,23,42,.5);border-radius:.5rem;border:1px solid #1e293b;font-size:.75rem;color:#94a3b8}
.legend-item{display:flex;align-items:center;gap:.375rem}
.legend-dot{width:12px;height:12px;border-radius:50%;border:2px solid}
.legend-dot.scene{background:rgba(139,92,246,.3);border-color:#8B5CF6}
.footer{text-align:center;color:#475569;font-size:.75rem;margin-top:1rem}
@media print{body{background:#020617;padding:1rem}.toolbar{display:none!important}}

/* ── Breadcrumb ─────────────────────────── */
.breadcrumb {
  display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
  margin-bottom: 1.25rem; font-size: 0.76rem;
}
.breadcrumb a {
  color: #7aa2f7; text-decoration: none; transition: color 0.15s;
}
.breadcrumb a:hover { color: #fbbf24; text-decoration: underline; }
.breadcrumb .bc-sep { color: #53576c; opacity: 0.5; user-select: none; }
.breadcrumb .bc-current { color: #94a3b8; font-weight: 500; }
.cross-nav{display:flex;gap:4px;justify-content:center;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap}
.cross-link{color:#7aa2f7;text-decoration:none;font-size:0.76rem;padding:3px 10px;border-radius:4px;transition:color 0.15s,background 0.15s}
.cross-link:hover{color:#fbbf24;background:rgba(251,191,36,0.06)}
.cross-link.on{color:#fbbf24;font-weight:600;cursor:default}
.cross-sep{color:#475569;font-size:0.5rem;opacity:0.35;user-select:none}
</style></head><body><div class="container" id="report-container">
<nav class="breadcrumb"><a href="../../../index.html">📄 文档中心</a><span class="bc-sep">/</span><span class="bc-current">yry-self-test · 自主测试方案</span><span class="bc-sep">/</span><span class="bc-current">场景 4 · 安全面回归自检</span><span class="bc-sep">/</span><span class="bc-current">🔗 知识图谱</span></nav>
<div class="cross-nav"><a href="计划清单.html" class="cross-link">📋 清单</a><span class="cross-sep">·</span><a href="架构图.html" class="cross-link">📐 架构</a><span class="cross-sep">·</span><span class="cross-link on">🔗 图谱</span><span class="cross-sep">·</span><a href="测试面板.html" class="cross-link">🧪 测试</a><span class="cross-sep">·</span><a href="演示.html" class="cross-link">💡 演示</a></div>
<div class="header"><div class="header-row"><div class="pulse-dot"></div><h1>🛡️ 安全面回归自检 · 知识图谱</h1>
<div class="toolbar"><div class="toolbar-actions">
<button onclick="copyAsImage(this)">📋 Copy</button>
<button onclick="downloadPNG(this)">🖼️ PNG</button>
<button onclick="downloadPDF(this)">📄 PDF</button>
</div><button class="toolbar-toggle" onclick="this.parentElement.classList.toggle('expanded')" title="Export">⋯</button></div>
</div><p class="subtitle">yry-self-test · 场景-4 · 认证·密钥·输入校验·规约完整性</p></div>

<div class="legend">
<span style="color:#94a3b8;font-weight:600;">节点:</span>
<span class="legend-item"><span class="legend-dot scene"></span>场景</span>
<span style="margin-left:1rem;color:#94a3b8;font-weight:600;">操作:</span>
<span style="color:#64748b;">🖱 拖拽 · 滚轮缩放 · 点击节点高亮邻域</span>
</div>

<div class="graph-container"><div id="cy"></div></div>

<div class="cards">
<div class="card"><div class="card-header"><div class="card-dot scene"></div><h3>场景状态</h3></div><ul><li>源文件数据待补充 — 暂无关联源码文件</li><li>图谱节点待补充 — 暂无领域/流程/步骤节点</li></ul></div>
</div>

<p class="footer">YrY v1.1.0 · yry-self-test · 场景-4: 安全面回归自检 · 知识图谱 v2.0.0</p>
</div>
<script>
const cy=cytoscape({container:document.getElementById('cy'),style:[
{selector:'node',style:{'label':'data(label)','font-family':'JetBrains Mono,monospace','font-size':'10px','color':'#e2e8f0','text-valign':'center','text-halign':'center','text-wrap':'wrap','text-max-width':'90px','border-width':2,'width':66,'height':66,'background-opacity':0.9}},
{selector:'node[type="scene"]',style:{'background-color':'rgba(139,92,246,.35)','border-color':'#8B5CF6','font-size':'11px','font-weight':'700','shape':'round-rectangle'}},
{selector:'node:selected',style:{'border-width':3,'border-color':'#fff','z-index':999}}
],
elements:{nodes:[
{data:{id:'s4',label:'场景-4\n安全面\n回归自检',type:'scene'}}
],edges:[]},
layout:{name:'breadthfirst',directed:true,spacingFactor:1.6,padding:30},
wheelSensitivity:0.3,minZoom:0.3,maxZoom:3});

cy.on('tap','node',function(evt){const node=evt.target;const hood=node.closedNeighborhood();cy.elements().style('opacity',0.15);hood.style('opacity',1);node.style('opacity',1)});
cy.on('tap',function(evt){if(evt.target===cy)cy.elements().style('opacity',0.85)});

async function copyAsImage(btn){const orig=btn.textContent;try{const el=document.getElementById('report-container'),r=el.getBoundingClientRect(),pad=32,canvas=await html2canvas(document.body,{backgroundColor:'#020617',scale:2,useCORS:true,ignoreElements:e=>e.classList&&e.classList.contains('toolbar'),x:r.left+window.scrollX-pad,y:r.top+window.scrollY-pad,width:r.width+pad*2,height:r.height+pad*2}),blob=await new Promise(r=>canvas.toBlob(r,'image/png'));await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);btn.textContent='✓ Copied!'}catch(e){btn.textContent='✗ Failed'}setTimeout(()=>btn.textContent=orig,2000)}
async function downloadPNG(btn){const orig=btn.textContent;btn.textContent='⏳...';try{const el=document.getElementById('report-container'),r=el.getBoundingClientRect(),pad=32,canvas=await html2canvas(document.body,{backgroundColor:'#020617',scale:2,useCORS:true,ignoreElements:e=>e.classList&&e.classList.contains('toolbar'),x:r.left+window.scrollX-pad,y:r.top+window.scrollY-pad,width:r.width+pad*2,height:r.height+pad*2}),link=document.createElement('a');link.download='知识图谱-安全面回归自检.png';link.href=canvas.toDataURL('image/png');link.click();btn.textContent='✓ Done!'}catch(e){btn.textContent='✗ Failed'}setTimeout(()=>btn.textContent=orig,2000)}
async function downloadPDF(btn){const orig=btn.textContent;btn.textContent='⏳...';try{const el=document.getElementById('report-container'),r=el.getBoundingClientRect(),pad=32,canvas=await html2canvas(document.body,{backgroundColor:'#020617',scale:2,useCORS:true,ignoreElements:e=>e.classList&&e.classList.contains('toolbar'),x:r.left+window.scrollX-pad,y:r.top+window.scrollY-pad,width:r.width+pad*2,height:r.height+pad*2}),imgData=canvas.toDataURL('image/png');const{jsPDF}=window.jspdf,orientation=canvas.width>canvas.height?'landscape':'portrait',pdf=new jsPDF({orientation,unit:'px',format:[canvas.width,canvas.height],hotfixes:['px_scaling']});pdf.addImage(imgData,'PNG',0,0,canvas.width,canvas.height);pdf.save('知识图谱-安全面回归自检.pdf');btn.textContent='✓ Done!'}catch(e){btn.textContent='✗ Failed'}setTimeout(()=>btn.textContent=orig,2000)}
</script></body></html>
