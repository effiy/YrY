<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🔧 场景-1-init后全量自检 · 交互示例</title>
<style>
:root{--bg:#020617;--surface:#0f172a;--border:#1e293b;--text:#e2e8f0;--muted:#64748b;--cyan:#22d3ee;--emerald:#34d399;--amber:#fbbf24;--rose:#fb7185}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding:24px}
.container{max-width:960px;margin:0 auto}
h1{font-size:1.5rem;margin-bottom:4px}h1 span{color:var(--cyan)}
.sub{color:var(--muted);font-size:.82rem;margin-bottom:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.card h2{font-size:.95rem;margin-bottom:14px;color:var(--cyan)}
pre{background:rgba(0,0,0,.4);border-radius:6px;padding:14px 40px 14px 18px;font-size:.76rem;color:var(--cyan);overflow-x:auto;font-family:'SF Mono',monospace;position:relative;cursor:pointer;margin:8px 0}
pre .cb{position:absolute;top:8px;right:8px;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:.64rem;padding:3px 8px;cursor:pointer;opacity:0;transition:opacity .15s;font-family:inherit}
pre:hover .cb{opacity:1}
pre .cb.done{color:var(--emerald)}
.step{counter-increment:step;display:flex;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.step::before{content:counter(step);width:26px;height:26px;border-radius:50%;background:rgba(34,211,238,.12);color:var(--cyan);font-size:.74rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step .sb{flex:1}.step .st{font-weight:600;font-size:.85rem}.step .sd{font-size:.74rem;color:var(--muted);margin:3px 0 6px}
a.back{color:var(--muted);text-decoration:none;font-size:.78rem;display:inline-block;margin-bottom:16px}
a.back:hover{color:var(--cyan)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--cyan);border-radius:8px;color:var(--text);padding:10px 20px;font-size:.82rem;z-index:300;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="container">
<a href="../场景-1-init后全量自检/知识图谱.html" class="back">← 场景知识图谱</a>
<h1><span>🔧</span> 🔧 场景-1-init后全量自检 · 交互示例</h1>
<p class="sub">init 命令执行后的全量自检：文件存在性、结构完整性、契约一致性</p>

<div class="card">
  <h2>🚶 操作步骤</h2>
  <div style="counter-reset:step">
    <div class="step"><div class="sb"><div class="st">执行 init</div><div class="sd">初始化项目基线，生成 CLAUDE.md/README.md 骨架</div><pre>/rui init<span class="cb">📋</span></pre></div></div>
<div class="step"><div class="sb"><div class="st">查看自检结果</div><div class="sd">自检自动触发，输出诊断报告和修复建议</div></div></div>
<div class="step"><div class="sb"><div class="st">处理 D0 阻断</div><div class="sd">D0 缺陷必须立即修复，否则无法继续</div></div></div>
<div class="step"><div class="sb"><div class="st">确认完成</div><div class="sd">所有 P0 清零后，init 流程完成</div></div></div>

  </div>
</div>

<div class="card">
  <h2>💡 预期输出</h2>
  <pre style="color:var(--emerald)">自检通过: 6/8</pre>
<pre style="color:var(--emerald)">D0 阻断: 0</pre>
<pre style="color:var(--emerald)">建议改进: 3 项</pre>

</div>

<div class="toast" id="toast"></div>
</div>
<script>
document.querySelectorAll('pre .cb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const cmd=btn.parentElement.textContent.replace(/📋|✅/g,'').trim();
    navigator.clipboard.writeText(cmd).then(()=>{
      btn.textContent='✅';btn.classList.add('done');
      setTimeout(()=>{btn.textContent='📋';btn.classList.remove('done')},1500)
    }).catch(()=>{
      const t=document.getElementById('toast');
      t.textContent='复制失败';t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),1800)
    })
  })
});
</script>
</body>
</html>
