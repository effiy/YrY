<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <!-- ═══ 第三方依赖 + 框架层 ═══ -->
  <link rel="stylesheet" href="../cdn/theme/index.css">
  <title>YrY 文档中心</title>
  <meta name="description" content="YrY 故事驱动 SDLC 编排系统 — 七层结构:20 技能 → 依赖/框架 → lib 内部共享库 → 7 故事 → 37 场景 → Agent 角色与规则 → 参考入口">
  <link rel="stylesheet" href="../cdn/yry-home/index.css">
  <!-- ═══ CDN 组件样式(在 yry-home.css 之后加载,确保组件样式优先) ═══ -->
  <link rel="stylesheet" href="../cdn/yry-breadcrumb/index.css">
  <link rel="stylesheet" href="../cdn/yry-scene-header/index.css">
  <link rel="stylesheet" href="../cdn/yry-stats-grid/index.css">
  <link rel="stylesheet" href="../cdn/yry-cross-nav/index.css">
  <link rel="stylesheet" href="../cdn/yry-panel-hub/index.css">
  <link rel="stylesheet" href="../cdn/yry-tag-chip/index.css">
  <link rel="stylesheet" href="../cdn/yry-item-card/index.css">
  <link rel="stylesheet" href="../cdn/yry-card-grid/index.css">
  <link rel="stylesheet" href="../cdn/yry-layer/index.css">
  <link rel="stylesheet" href="../cdn/yry-sub-title/index.css">
  <link rel="stylesheet" href="../cdn/yry-story-card/index.css">
  <link rel="stylesheet" href="../cdn/yry-scene-card/index.css">
  <link rel="stylesheet" href="../cdn/yry-doc-layer/index.css">
  <link rel="stylesheet" href="../cdn/yry-layer-agents/index.css">
  <link rel="stylesheet" href="../cdn/yry-layer-rules/index.css">
  <link rel="stylesheet" href="../cdn/yry-layer-refs/index.css">
  <!-- ═══ 面板组件样式 ═══ -->
  <link rel="stylesheet" href="../cdn/yry-cron-panel/index.css">
  <link rel="stylesheet" href="../cdn/yry-faq-panel/index.css">
  <link rel="stylesheet" href="../cdn/yry-notify-panel/index.css">
  <link rel="stylesheet" href="../cdn/yry-selfimprove-panel/index.css">
  <link rel="stylesheet" href="../cdn/yry-layer-info-panel/index.css">
  <link rel="stylesheet" href="../cdn/yry-back-top/index.css">
  <link rel="stylesheet" href="../cdn/yry-footer-note/index.css">
  <link rel="stylesheet" href="../cdn/yry-item-cards/index.css">
  <link rel="stylesheet" href="../cdn/yry-docs-binding/index.css">
  <link rel="stylesheet" href="../cdn/yry-card-report/index.css">
  <!-- ═══ Tab 组件样式 ═══ -->
  <link rel="stylesheet" href="../cdn/yry-tabs-panel/index.css">
  <!-- ═══ CDN 聚合中心卡片组件(已重构为 Vue CE) ═══ -->
  <link rel="stylesheet" href="../cdn/yry-cdn-agg-card/index.css">
  <link rel="stylesheet" href="../cdn/yry-cdn-agg-grid/index.css">
  <!-- ═══ 页面级样式 (评分方法 / 实时评分报告,从内联 <style> 迁出) ═══ -->
  <link rel="stylesheet" href="../cdn/yry-dashboard-report/index.css">
  <!-- ═══ Toast 通知组件 (Vue 3 懒加载挂载,自动创建 #yry-toast-host) ═══ -->
  <link rel="stylesheet" href="../cdn/yry-toast/index.css">
  <!-- ═══ 滚动进度条组件 (Vue 3 自定义元素,从内联 .yry-progress-bar 迁出) ═══ -->
  <link rel="stylesheet" href="../cdn/yry-progress-bar/index.css">
  <!-- ═══ 仪表板快速锚点组件 (Vue 3 自定义元素,从内联 <nav class="sr-quicknav"> 迁出) ═══ -->
  <link rel="stylesheet" href="../cdn/yry-dashboard-quicknav/index.css">
</head>
<body>
  <!-- ── Scroll Progress (YryProgressBar) ─ 跟随阅读位置 · 全屏宽吸顶 ─ -->
  <yry-progress-bar id="scroll-progress-app"></yry-progress-bar>
  <div class="container">
    <!-- ── Breadcrumb (YryBreadcrumb) ──────────── -->
    <yry-breadcrumb id="breadcrumb-app"></yry-breadcrumb>

    <!-- ── Header (YrySceneHeader) ──────────────── -->
    <yry-scene-header id="scene-header-app"></yry-scene-header>

    <!-- ── Stats (YryStatsGrid) ────────────────── -->
    <yry-stats-grid id="stats-grid-app"></yry-stats-grid>

    <!-- ── Cross Nav (YryCrossNav) ──────────────── -->
    <div id="cross-nav-app"></div>

    <!-- ── Panel hub (YryPanelHub) ──────────────── -->
    <yry-panel-hub id="panel-hub-app"></yry-panel-hub>

    <!-- ═══ Tab 导航 ═══ -->
    <div class="yry-tabs" id="main-tabs">
      <span class="yry-tab on" data-panel="dashboard">📊 评分仪表板</span>
      <span class="yry-tab" data-panel="architecture">🏗 技能架构</span>
      <span class="yry-tab" data-panel="governance">🤖 Agent与治理</span>
    </div>

    <!-- ═══ Tab 1: 评分仪表板 ═══ -->
    <div class="yry-panel on" id="panelDashboard">

    <!-- ═══ 仪表板快速锚点 (Vue 3 自定义元素 <yry-dashboard-quicknav>) ═══ -->
    <yry-dashboard-quicknav id="sr-quicknav" aria-label="评分仪表板快速导航"></yry-dashboard-quicknav>

    <!-- ═══ 最新报告快照 (2026-06-22) ═══ -->
    <yry-report-section id="sm-snapshot"></yry-report-section>

    <!-- ═══ CDN 资源与文档中心 ═══ -->
    <yry-report-section id="sec-cdn-resources"></yry-report-section>

    <!-- ═══ 20 技能市场 ═══ -->
    <yry-report-section id="sec-skills-market"></yry-report-section>

    <!-- ═══ 治理规则与共享库 ═══ -->
    <yry-report-section id="sec-rules-lib"></yry-report-section>

    </div>

    <!-- ═══ Tab 2: 技能架构 ═══ -->
    <div class="yry-panel" id="panelArchitecture">

    <!-- ===== Layer 1-4: YryDocLayer 动态渲染 (数据源: window.YRY_DOCS_DATA 或 yry-docs-binding 内置 DOCS_LAYERS) ===== -->
    <div id="layer-skills-app"></div>
    <div id="layer-deps-app"></div>
    <div id="layer-lib-app"></div>
    <div id="layer-story-app"></div>
    <div id="layer-scene-app"></div>

    </div><!-- /.yry-panel #panelArchitecture -->

    <!-- ═══ Tab 3: Agent与治理 ═══ -->
    <div class="yry-panel" id="panelGovernance">

    <hr>

    <!-- ===== Layer 5+6+R: 复合组件 (子元素数据由 yry-item-cards 自动注入) ===== -->
    <yry-layer-agents></yry-layer-agents>

    <hr>

    <yry-layer-rules></yry-layer-rules>

    <hr>

    <yry-layer-refs></yry-layer-refs>

    </div><!-- /.yry-panel #panelGovernance -->

    <yry-footer-note version="5.4.0"></yry-footer-note>
  </div>

  <!-- ═══ 面板组件 (Vue 3 custom elements, 同步注入 DOM) ═══ -->
  <yry-cron-panel></yry-cron-panel>
  <yry-faq-panel></yry-faq-panel>
  <yry-notify-panel></yry-notify-panel>
  <yry-selfimprove-panel></yry-selfimprove-panel>
  <yry-layer-info-panel></yry-layer-info-panel>

  <!-- ═══ 无渲染组件(纯数据注入) ═══ -->
  <yry-item-cards></yry-item-cards>

  <!-- ═══ 文档数据绑定控制器 (空渲染,自动在 mounted 钩子中执行所有绑定/拉取/事件) ═══ -->
  <yry-docs-binding></yry-docs-binding>

  <!-- ═══ JS 脚本 (Vue 3 + CDN 组件,均为 custom element) ═══ -->
  <script src="../cdn/shared/index.js"></script>

  <!-- Vue 3 (必须最早加载,为后续所有 Vue 组件提供依赖) -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <!-- YrYVueCE 共享加载器 (Vue 3 之后,CDN 组件之前;负责 fetch 模板 + defineCustomElement 注册) -->
  <script src="../cdn/shared/vue-ce-loader.js"></script>

  <!-- 基础展示组件 (供 breadcrumb/header/stats/cross-nav 挂载) -->
  <script src="../cdn/yry-breadcrumb/index.js"></script>
  <script src="../cdn/yry-scene-header/index.js"></script>
  <script src="../cdn/yry-stats-grid/index.js"></script>
  <script src="../cdn/yry-cross-nav/index.js"></script>

  <!-- PanelHub 控制器 (必须早于依赖 PanelHub 的面板组件加载,提供 window.PanelHub) -->
  <script src="../cdn/yry-panel-hub/index.js"></script>

  <!-- 卡片相关组件 -->
  <script src="../cdn/yry-tag-chip/index.js"></script>
  <script src="../cdn/yry-item-card/index.js"></script>
  <script src="../cdn/yry-card-grid/index.js"></script>

  <!-- CDN 聚合中心卡片组件 (聚合中心 7 张页卡由其渲染到 light DOM,已浏览追踪脚本可继续命中 .cdn-agg-card) -->
  <script src="../cdn/yry-cdn-agg-card/index.js"></script>
  <script src="../cdn/yry-cdn-agg-grid/index.js"></script>

  <!-- 评分报告链接 chip + section 容器 (供 score-report 区块使用) -->
  <script src="../cdn/yry-report-link/index.js"></script>
  <script src="../cdn/yry-report-section/index.js"></script>

  <!-- ═══ sm-snapshot 占位符由 docs-report-data.js 填充(原内联 stub 已删除) ═══ -->

  <!-- ═══ CDN 聚合中心 7 张卡片数据 (从内联迁出) ═══ -->
  <script src="./js/docs-agg-data.js"></script>

  <!-- 布局组件 (供 layer-* 复合组件依赖) -->
  <script src="../cdn/yry-layer/index.js"></script>
  <script src="../cdn/yry-sub-title/index.js"></script>

  <!-- Layer 5+6 复合组件 (依赖上方的 layer/sub-title/card-grid) -->
  <script src="../cdn/yry-layer-agents/index.js"></script>
  <script src="../cdn/yry-layer-rules/index.js"></script>
  <script src="../cdn/yry-layer-refs/index.js"></script>

  <!-- Layer 1-4 渲染组件 (story-card / scene-card / doc-layer) -->
  <script src="../cdn/yry-story-card/index.js"></script>
  <script src="../cdn/yry-scene-card/index.js"></script>
  <script src="../cdn/yry-doc-layer/index.js"></script>

  <!-- 面板组件 (依赖 window.PanelHub) -->
  <script src="../cdn/yry-cron-panel/index.js"></script>
  <script src="../cdn/yry-faq-panel/index.js"></script>
  <script src="../cdn/yry-notify-panel/index.js"></script>
  <script src="../cdn/yry-selfimprove-panel/index.js"></script>
  <script src="../cdn/yry-layer-info-panel/index.js"></script>
  <script src="../cdn/yry-footer-note/index.js"></script>

  <!-- 静态资产卡片数据注入器 (替代旧版 js/yry-item-cards.js) -->
  <script src="../cdn/yry-item-cards/index.js"></script>

  <!-- 文档数据绑定控制器 (替代旧版 js/docs-data.js + js/panel-hub.js + js/cron-panel.js + js/faq-panel.js + js/layer-info.js + js/selfimprove-panel.js) -->
  <script src="../cdn/yry-docs-binding/index.js"></script>
  <!-- 卡片分析报告模态框 (ydb-score-badge 点击触发) -->
  <script src="../cdn/yry-card-report/index.js"></script>

  <!-- 自初始化组件 (零配置, 加载即生效) -->
  <script src="../cdn/yry-back-top/index.js"></script>

  <!-- ═══ 评分报告数据填充脚本 (从内联迁出至独立文件) ═══ -->
  <script src="../cdn/yry-dashboard-report/index.js"></script>
  <!-- ═══ Toast 通知 (Vue 3 懒加载挂载,首次调用时自动创建 #yry-toast-host) ═══ -->
  <script src="../cdn/yry-toast/index.js"></script>
  <!-- ═══ 滚动进度条 (Vue 3 自定义元素,替代内联 .yry-progress-bar) ═══ -->
  <script src="../cdn/yry-progress-bar/index.js"></script>
  <!-- ═══ 仪表板快速锚点 (Vue 3 自定义元素,替代内联 <nav class="sr-quicknav">) ═══ -->
  <script src="../cdn/yry-dashboard-quicknav/index.js"></script>

  <!-- ═══ Tab 初始化 ═══ -->
  <script>YrY.initTabs('#main-tabs');</script>

  <!-- ═══ UX 增强脚本 (滚动进度 · 淡入 · 卡片升级 · 键盘快捷 · 32 特性,从内联迁出) ═══ -->
  <script src="./js/docs-ux-enhance.js"></script>

  <!-- ═══ yry-report-section 数据注入 (9 个 section · 从内联迁出) ═══ -->
  <script src="./js/docs-report-data.js"></script>

</body>
</html>
