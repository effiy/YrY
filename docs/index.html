  <script type="module">
    // CDN 聚合中心 KPI 条：并行拉取四数据源，显示实时计数 + 每卡片最后更新时间
    (async () => {
      const kpiEl = document.getElementById('cdnAggKpis');
      if (!kpiEl) return;
      const fmt = b => b < 1024 ? b + 'B' : b < 1024*1024 ? (b/1024).toFixed(1)+'KB' : (b/1024/1024).toFixed(2)+'MB';
      const relTime = lm => {
        if (!lm) return null;
        const t = new Date(lm).getTime();
        if (isNaN(t)) return null;
        const diff = Date.now() - t;
        if (diff < 0) return '刚刚';
        const m = Math.floor(diff / 60000);
        if (m < 1) return '刚刚';
        if (m < 60) return m + ' 分钟前';
        const h = Math.floor(m / 60);
        if (h < 24) return h + ' 小时前';
        const d = Math.floor(h / 24);
        return d + ' 天前';
      };
      const stampCard = (hrefSuffix, lm, fallbackTs) => {
        const card = [...document.querySelectorAll('.cdn-agg-card')].find(a => (a.getAttribute('href') || '').endsWith(hrefSuffix));
        if (!card) return;
        const ts = lm || fallbackTs;
        const rel = relTime(ts);
        if (!rel) return;
        let badge = card.querySelector('.cdn-freshness');
        if (!badge) {
          badge = document.createElement('div');
          badge.className = 'cdn-freshness';
          badge.style.cssText = 'margin-top:6px;font-size:.62rem;color:var(--yry-text3,#6b7280);display:flex;align-items:center;gap:4px';
          /* v2 card 结构: <a class="cdn-agg-card"> → top/body/chips/<footer class="cdn-agg-foot">。
             .cdn-agg-foot 自身是 flex + space-between(放 datas + cta 两端对齐),
             若把 freshness 塞进 foot 会挤成三列,破坏 footer 视觉。
             改为插到 foot 之前(card 的 flex-column 子节点),
             foot 的两端对齐保持干净。 */
          const foot = card.querySelector('.cdn-agg-foot');
          if (foot && foot.parentNode === card) {
            card.insertBefore(badge, foot);
          } else if (foot) {
            /* 兜底:foot 不在 card 内(防御性),则 append 到 card 末尾 */
            card.appendChild(badge);
          } else {
            /* 无 foot(旧版 v1 card)→ 沿用 cta 前插入 */
            const directCta = card.querySelector(':scope > .cdn-agg-cta');
            if (directCta) card.insertBefore(badge, directCta);
            else card.appendChild(badge);
          }
        }
        badge.innerHTML = `<span class="yry-d-78">●</span> 数据新鲜 · <span title="${new Date(ts).toLocaleString('zh-CN')}">${rel}</span>`;
      };
      const chip = (icon, label, value, color) =>
        `<div class="yry-d-2">
           <span class="yry-d-68">${icon}</span>
           <span class="yry-d-40">${label}</span>
           <b class="yry-d-29">${value}</b>
         </div>`;

      /* 等待 <yry-cdn-agg-grid> 完成首次挂载,确保 stampCard 能命中 .cdn-agg-card DOM 节点 */
      await new Promise(resolve => {
        if (window.YryCdnAggGrid && document.querySelector('.cdn-agg-card')) return resolve();
        document.addEventListener('yry-cdn-agg-grid-ready:mounted', resolve, { once: true });
      });

      kpiEl.innerHTML = '<span class="yry-d-39">⏳ 加载实时计数…</span>';
      try {
        const base = '../cdn/';
        const grab = async (url) => {
          try {
            const r = await fetch(url);
            if (!r.ok) return { data: null, lm: null };
            const lm = r.headers.get('last-modified');
            const data = await r.json();
            return { data, lm };
          } catch { return { data: null, lm: null }; }
        };
        const [manifest, deps, tests, summary] = await Promise.allSettled([
          grab(base + 'components-manifest/index.json'),
          grab(base + 'deps-graph.json'),
          grab(base + 'tests-result.json'),
          grab(base + 'cdn-summary/index.json')
        ]);
        const kpis = [];
        if (manifest.status === 'fulfilled') {
          const { data: m, lm } = manifest.value;
          if (m) {
            const st = m.stats || {};
            let bytes = 0;
            (m.components || []).forEach(c => ['html','js','css'].forEach(e => { if (c.files?.[e]?.exists) bytes += c.files[e].size; }));
            kpis.push(chip('📋', '清单', `${st.total || 0} 组件 · ${fmt(bytes)}`));
            kpis.push(chip('🏗', '架构', `${st.vue || 0} Vue · ${st.vanilla || 0} Vanilla`));
            kpis.push(chip('📜', '源码', `${st.complete || 0}/${st.total || 0} 完整`));
            const withDemo = (m.components || []).filter(c => c.files?.html?.exists).length;
            const demoMissing = (st.total || 0) - withDemo;
            kpis.push(chip('🎬', '演示', `${withDemo} 含 demo${demoMissing > 0 ? ` · ⚠ ${demoMissing} 待补` : ''}`));
            ['checklist.html', 'architecture.html', 'source.html', 'demo.html'].forEach(h => stampCard(h, lm, m?.generatedAt));
          }
        }
        if (deps.status === 'fulfilled' && deps.value?.data) {
          const s = deps.value.data.stats || {};
          kpis.push(chip('🕸', '图谱', `${s.nodes || 0} 节点 · ${s.edges || 0} 边`));
          stampCard('graph.html', deps.value.lm, deps.value.data?._meta?.generatedAt);
          // 数据驱动矫正 graph 卡片硬编码数字（孤立 = nodes - 边中出现的不同节点，graph.html 同口径）
          const edgeNodes = new Set();
          (deps.value.data.edges || []).forEach(e => { edgeNodes.add(e.from); edgeNodes.add(e.to); });
          const isoLive = (s.nodes || 0) - edgeNodes.size;
          const card = document.querySelector('a.cdn-agg-card[href="graph.html"]');
          if (card) {
            card.innerHTML = card.innerHTML.split('59 孤立节点').join(isoLive + ' 孤立节点');
            card.innerHTML = card.innerHTML.split('43 孤立节点').join(isoLive + ' 孤立节点');
          }
        }
        if (tests.status === 'fulfilled' && tests.value?.data) {
          const t = tests.value.data;
          kpis.push(chip('🧪', '测试', `${t.numPassedTests || 0}/${t.numTotalTests || 0} 通过`));
          stampCard('tests.html', tests.value.lm, t?.startTime);
        }
        if (summary.status === 'fulfilled' && summary.value?.data) {
          const latest = summary.value.data.latest || {};
          kpis.push(chip('⚠️', '审查', `${latest.composite || '—'} / ${latest.grade || '—'}`));
          stampCard('review.html', summary.value.lm, latest?.date);
        }
        kpiEl.innerHTML = kpis.join('') || '<span class="yry-d-39">无数据</span>';
      } catch (e) {
        kpiEl.innerHTML = `<span class="yry-d-50">❌ ${e.message}</span>`;
      }
    })();
  </script>

  <script type="module">
    // CDN 聚合卡片已浏览追踪 — localStorage 记录访问过的聚合页
    // 注: <yry-cdn-agg-card> 是 Vue CE,渲染到 light DOM;需等待 grid :mounted 事件确保 DOM 存在
    (() => {
      const KEY = 'yry-cdn-agg-visited';
      const track = () => {
        let visited = [];
        try { visited = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch { visited = []; }
        const normalize = href => (href || '').split('/').pop();
        const visitedNorm = visited.map(normalize);
        document.querySelectorAll('.cdn-agg-card').forEach(card => {
          const href = card.getAttribute('href') || '';
          const norm = normalize(href);
          if (visitedNorm.includes(norm)) card.setAttribute('data-visited', '1');
          card.addEventListener('click', () => {
            if (!norm || visitedNorm.includes(norm)) return;
            visited.push(href);
            visitedNorm.push(norm);
            try { localStorage.setItem(KEY, JSON.stringify(visited)); } catch {}
            card.setAttribute('data-visited', '1');
          }, { once: true });
        });
      };
      if (window.YryCdnAggGrid) {
        document.addEventListener('yry-cdn-agg-grid-ready:mounted', track, { once: true });
      } else {
        document.addEventListener('yry-cdn-agg-grid-ready', () => {
          document.addEventListener('yry-cdn-agg-grid-ready:mounted', track, { once: true });
        }, { once: true });
      }
    })();
  </script>

  <script type="module">
    // 数字键 1-7 快速跳转聚合页 · 0/Esc 返回 docs 首页 · ? 显示快捷键帮助
    (() => {
      const FILES = ['checklist.html', 'architecture.html', 'graph.html', 'tests.html', 'source.html', 'demo.html', 'review.html'];
      const LABELS = ['📋 清单', '🏗 架构', '🕸 图谱', '🧪 测试', '📜 源码', '🎬 演示', '⚠️ 审查'];
      const BASE = '../cdn/';
      let overlay = null;
      const showHelp = () => {
        if (overlay) { overlay.remove(); overlay = null; return; }
        overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
        const box = document.createElement('div');
        box.style.cssText = 'background:rgba(15,23,42,.98);border:1px solid rgba(34,211,238,.4);border-radius:12px;padding:20px 24px;max-width:440px;width:100%;font-size:.78rem;color:var(--yry-text2,#a9b1d6);box-shadow:0 8px 32px rgba(0,0,0,.5)';
        const rows = FILES.map((f, i) => `<div class="yry-d-3"><span>${LABELS[i]}</span><kbd class="yry-d-0">${i + 1}</kbd></div>`).join('');
        const extras = [['/', '聚焦搜索框'], ['t', '回到顶部'], ['0 / Esc', '返回 docs 首页'], ['?', '显示/关闭此帮助']].map(([k, l]) => `<div class="yry-d-3"><span>${l}</span><kbd class="yry-d-0">${k}</kbd></div>`).join('');
        box.innerHTML = `<div class="yry-d-16"><b class="yry-d-51">⌨ 键盘快捷键</b><span class="yry-d-30" id="kbdHelpClose">✕ 关闭</span></div><div class="yry-d-26">聚合页跳转</div>${rows}<div class="yry-d-27">通用</div>${extras}<div class="yry-d-1">提示：按 <b class="yry-d-79">?</b> 或 <b class="yry-d-79">Esc</b> 关闭本弹窗</div>`;
        overlay.appendChild(box);
        overlay.addEventListener('click', e => { if (e.target === overlay || e.target.id === 'kbdHelpClose') { overlay.remove(); overlay = null; } });
        document.body.appendChild(overlay);
      };
      document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) return;
        if (e.metaKey || e.ctrlKey || e.altKey) return;
        const k = e.key;
        if (k === '?' || (e.shiftKey && k === '/')) {
          e.preventDefault();
          showHelp();
        } else if (k >= '1' && k <= '7') {
          const idx = parseInt(k, 10) - 1;
          if (FILES[idx]) window.location.href = BASE + FILES[idx];
        } else if (k === '0' || k === 'Escape') {
          if (overlay) { overlay.remove(); overlay = null; return; }
          const p = window.location.pathname;
          if (!p.endsWith('docs/index.html') && !p.endsWith('/docs/')) {
            window.location.href = 'index.html';
          }
        }
      });
    })();
  </script>

  <!-- ═══ yry-report-section 数据注入 (9 个 section · 从内联迁出) ═══ -->
  <script src="./js/docs-report-data.js"></script>

  <script type="module">
    // ⌨ 快捷键徽标点击交互 — 鼠标用户发现路径
    // 单击 → 触发 ? 帮助浮窗；Alt+点击 → 直接跳转对应聚合页
    const AGG_PATHS = [
      '../cdn/checklist.html', '../cdn/architecture.html', '../cdn/graph.html',
      '../cdn/tests.html', '../cdn/source.html', '../cdn/demo.html', '../cdn/review.html'
    ];
    function bindKeyChips() {
      document.querySelectorAll('.cdn-agg-chip.cdn-agg-key').forEach(chip => {
        if (chip.dataset.yryBound === '1') return;
        chip.dataset.yryBound = '1';
        chip.style.cursor = 'pointer';
        chip.title = '点击查看所有键盘快捷键 · 或按 ? 键 · Alt+点击直接跳转';
        chip.addEventListener('click', e => {
          if (e.altKey) {
            e.preventDefault();
            const m = chip.textContent.match(/\d/);
            if (m) {
              const idx = parseInt(m[0], 10) - 1;
              if (AGG_PATHS[idx]) window.location.href = AGG_PATHS[idx];
            }
            return;
          }
          e.preventDefault();
          e.stopPropagation();
          document.dispatchEvent(new KeyboardEvent('keydown', { key: '?', bubbles: true }));
        });
      });
    }
    bindKeyChips();
    // Vue 组件异步挂载后再绑一次
    setTimeout(bindKeyChips, 800);
    setTimeout(bindKeyChips, 2000);
    document.addEventListener('yry-cdn-agg-card-ready', () => setTimeout(bindKeyChips, 50));
  </script>
