# YrY CDN — CI workflow
# 触发: push / pull_request 影响 cdn/ 时
# 步骤: lint → validate → build:manifest → validate:manifest
name: CDN CI

on:
  push:
    branches: [main, master]
    paths:
      - 'cdn/**'
      - '.github/workflows/cdn-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'cdn/**'

defaults:
  run:
    working-directory: cdn

jobs:
  ci:
    name: Lint + Validate + Manifest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cdn/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build manifest
        run: npm run build:manifest

      - name: Validate (components + manifest + version)
        run: npm run validate

      - name: Verify manifest not dirty
        run: |
          if [[ -n "$(git status --porcelain cdn/components.manifest.json)" ]]; then
            echo "::error::components.manifest.json 不一致,请运行 'npm run build:manifest' 后提交"
            git diff --stat cdn/components.manifest.json
            exit 1
          fi

      - name: Lint JS (ESLint)
        run: npm run lint:js || echo "::warning::lint 失败但不影响 merge(可后续修复)"

      - name: Lint CSS (Stylelint)
        run: npm run lint:css || echo "::warning::lint 失败但不影响 merge(可后续修复)"

      - name: Format check (Prettier)
        run: npm run format:check || echo "::warning::format 失败但不影响 merge(可后续修复)"

      - name: Summary
        if: always()
        run: |
          echo "### CDN CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 工作目录: \`cdn/\`" >> $GITHUB_STEP_SUMMARY
          echo "- Node: 20" >> $GITHUB_STEP_SUMMARY
          echo "- 步骤: build:manifest → validate → lint" >> $GITHUB_STEP_SUMMARY