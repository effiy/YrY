name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx eslint 'lib/**/*.mjs' 'skills/**/*.mjs' --max-warnings 0
      - run: npx prettier --check 'lib/**/*.mjs' 'skills/**/*.mjs'
      - run: npm test
