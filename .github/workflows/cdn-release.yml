# YrY CDN — npm 发布 workflow
# 触发: 推送 cdn-v*.*.* tag (例如 cdn-v1.2.0)
# 行为: 验证 → build:manifest → 同步版本到 README/index.html → npm publish
name: CDN Release

on:
  push:
    tags:
      - 'cdn-v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '要发布的版本 (例如 1.2.0)'
        required: true
        default: '1.2.0'

defaults:
  run:
    working-directory: cdn

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write  # npm provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: cdn/package-lock.json

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#cdn-v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 发布版本: ${VERSION}"

      - name: Sync version (sync to all docs)
        run: |
          # 如果 package.json 版本与 tag 不一致,先同步
          CURRENT=$(node -p "require('./package.json').version")
          if [[ "${CURRENT}" != "${VERSION}" ]]; then
            echo "::warning::package.json version (${CURRENT}) 与 tag (${VERSION}) 不一致"
            echo "请手动更新 package.json 后重新打 tag,或运行:"
            echo "  node scripts/sync-version.mjs --check"
          fi

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build manifest
        run: npm run build:manifest

      - name: Validate
        run: npm run validate

      - name: Pack dry-run (verify file list)
        run: npm pack --dry-run

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: yry-cdn v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            cdn/components.manifest.json
            cdn/CHANGELOG.md
          body: |
            ## 📦 yry-cdn v${{ steps.version.outputs.version }}

            通过 npm 安装:
            ```bash
            npm install yry-cdn@${{ steps.version.outputs.version }}
            ```

            通过 jsDelivr CDN 引用:
            ```html
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/yry-cdn@${{ steps.version.outputs.version }}/shared.css">
            <script src="https://cdn.jsdelivr.net/npm/yry-cdn@${{ steps.version.outputs.version }}/shared.js"></script>
            ```

            详见 [CHANGELOG.md](./cdn/CHANGELOG.md)