<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>YrY Tests · 自检中心</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/yry-cdn-lib@1.0.0/theme.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/yry-cdn-lib@1.0.0/shared.css">
  <style>
    :root { --bg:var(--yry-bg); --bg-card:var(--yry-bg-card); --bg-flat:var(--yry-bg-flat); --bg-raised:var(--yry-bg-raised); --accent:var(--yry-accent); --cyan:var(--yry-cyan); --pass:var(--yry-pass); --fail:var(--yry-fail); --warn:var(--yry-warn); --skip:var(--yry-skip); --text:var(--yry-text); --text2:var(--yry-text2); --text3:var(--yry-text3); --shadow:var(--yry-shadow); --shadow-lg:var(--yry-shadow-lg); --radius:var(--yry-radius); --border:var(--yry-border); }
    /* Reuse CDN animations via aliased keyframes */
    @keyframes fadeInUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeInDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes modalIn { from{opacity:0;transform:scale(.96)} to{opacity:1;transform:scale(1)} }
    @keyframes slideDown { from{opacity:0;max-height:0} to{opacity:1;max-height:2000px} }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,193,7,.4)} 50%{box-shadow:0 0 0 6px rgba(255,193,7,0)} }
    * { box-sizing:border-box;margin:0;padding:0 }
    html { scroll-behavior:smooth }
    body { background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;line-height:1.6;min-height:100vh }
    .container { max-width:1120px;margin:0 auto;padding:48px 24px 80px }
    .header { text-align:center;margin-bottom:32px;animation:fadeInDown .5s ease both }
    .header h1 { font-size:2.1rem;font-weight:700 } .header h1 .accent { color:var(--accent) }
    .header .sub { color:var(--text2);font-size:.9rem }
    .cross-nav { display:flex;gap:4px;justify-content:center;align-items:center;margin-bottom:40px;flex-wrap:wrap;animation:fadeInDown .5s .15s ease both }
    .cross-link { color:var(--cyan);text-decoration:none;font-size:.74rem;padding:3px 10px;border-radius:4px;transition:color .15s,background .15s }
    .cross-link:hover { color:var(--accent);background:rgba(255,193,7,.06);text-decoration:underline }
    .cross-link.on { color:var(--accent);font-weight:600 }
    .cross-sep { color:var(--text3);font-size:.5rem;opacity:.35;user-select:none }
    .stats-grid { display:flex;gap:14px;justify-content:center;margin-bottom:24px;flex-wrap:wrap;animation:fadeInDown .5s .1s ease both }
    .stat-card { background:var(--bg-card);border:var(--border);border-radius:var(--radius);padding:18px 22px;text-align:center;box-shadow:var(--shadow);min-width:90px;transition:transform .15s,box-shadow .15s;cursor:pointer;position:relative }
    .stat-card:hover { transform:translateY(-2px);box-shadow:var(--shadow-lg) }
    .stat-card .val { font-size:1.8rem;font-weight:700;line-height:1.1 }
    .stat-card .val.t { color:var(--text) } .stat-card .val.p { color:var(--pass) } .stat-card .val.f { color:var(--fail) } .stat-card .val.s { color:var(--skip) } .stat-card .val.d { color:var(--cyan);font-size:1.25rem }
    .stat-card .lbl { font-size:.72rem;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px }
    .stat-card.active-filter { border-color:rgba(255,193,7,.4);animation:pulse 2s infinite }
    .bar-wrap { margin-bottom:32px;animation:fadeInDown .5s .12s ease both }
    .bar-outer { height:8px;border-radius:4px;overflow:hidden;display:flex;background:rgba(255,255,255,.04);cursor:pointer }
    .bar-outer .seg { height:100%;transition:width .5s ease;min-width:2px }
    .bar-outer .seg.p { background:var(--pass) } .bar-outer .seg.f { background:var(--fail) } .bar-outer .seg.s { background:var(--skip) }
    .tabs { display:flex;gap:0;border-bottom:var(--border);margin-bottom:0;animation:fadeInDown .5s .15s ease both }
    .tab { padding:10px 20px;cursor:pointer;font-size:.84rem;color:var(--text3);border-bottom:2px solid transparent;transition:all .15s;user-select:none;position:relative }
    .tab:hover { color:var(--text2) } .tab.on { color:var(--accent);border-bottom-color:var(--accent) }
    .tab .tab-badge { font-size:.6rem;background:var(--fail);color:#fff;border-radius:8px;padding:1px 6px;position:absolute;top:4px;right:0 }
    .panel { display:none;animation:fadeInUp .4s ease both;padding-top:28px }
    .panel.on { display:block }
    .toolbar { display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;animation:fadeInDown .5s .18s ease both }
    .btn { background:var(--bg-flat);border:var(--border);border-radius:8px;color:var(--text2);padding:7px 14px;cursor:pointer;font-size:.8rem;transition:all .15s;display:inline-flex;align-items:center;gap:5px;text-decoration:none;white-space:nowrap;font-family:inherit }
    .btn:hover { border-color:rgba(255,255,255,.15);color:var(--text);transform:translateY(-1px);box-shadow:var(--shadow) }
    .btn.primary { border-color:rgba(255,193,7,.3);color:var(--accent) }
    .btn.on { background:rgba(255,193,7,.12);border-color:rgba(255,193,7,.4);color:var(--accent) }
    .search-wrap { position:relative;flex:1;min-width:180px;max-width:320px }
    .search-wrap input { width:100%;background:var(--bg-flat);border:var(--border);border-radius:20px;color:var(--text);padding:7px 14px 7px 34px;font-size:.82rem;outline:none;transition:border-color .15s;font-family:inherit }
    .search-wrap input:focus { border-color:rgba(255,193,7,.4) } .search-wrap input::placeholder { color:var(--text3) }
    .search-wrap .si { position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.8rem;color:var(--text3);pointer-events:none }
    .kbd-hint { font-size:.64rem;color:var(--text3);background:rgba(255,255,255,.04);border-radius:3px;padding:1px 5px;margin-left:4px }
    .layer { margin-bottom:44px }
    .layer-head { display:flex;align-items:center;gap:10px;margin-bottom:16px }
    .layer-head .ln { width:28px;height:28px;border-radius:50%;background:rgba(255,193,7,.12);color:var(--accent);font-size:.8rem;font-weight:700;display:flex;align-items:center;justify-content:center }
    .layer-head h2 { font-size:1.15rem;font-weight:700 } .layer-head .ls { font-size:.78rem;color:var(--text3) }
    .file-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px }
    .file-card { background:var(--bg-card);border:var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;display:flex;align-items:flex-start;gap:12px }
    .file-card:hover { transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:rgba(255,255,255,.1) }
    .file-card.focused { border-color:rgba(255,193,7,.4) }
    .file-card .fc-icon { font-size:1.2rem;flex-shrink:0;margin-top:2px }
    .file-card .fc-body { flex:1;min-width:0 }
    .file-card .fc-name { font-weight:600;font-size:.88rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap }
    .file-card .fc-path { font-size:.7rem;color:var(--text3);font-family:monospace;margin-top:1px }
    .file-card .fc-desc { font-size:.74rem;color:var(--text2);margin-top:4px;line-height:1.4 }
    .file-card .fc-meta { display:flex;gap:12px;margin-top:6px;font-size:.7rem;color:var(--text3);flex-wrap:wrap }
    .file-card .fc-badge { font-size:.68rem;padding:2px 8px;border-radius:10px;font-weight:600 }
    .file-card .fc-badge.pass { background:rgba(34,197,94,.12);color:var(--pass) }
    .file-card .fc-badge.fail { background:rgba(239,68,68,.12);color:var(--fail) }
    .file-card .fc-badge.none { background:rgba(255,255,255,.04);color:var(--text3) }
    .suite { background:var(--bg-card);border:var(--border);border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow);overflow:hidden;transition:border-color .2s }
    .suite.open { border-color:rgba(255,255,255,.08) }
    .suite.focused { border-color:rgba(255,193,7,.4) }
    .s-head { display:flex;align-items:center;gap:10px;padding:12px 18px;cursor:pointer;user-select:none;transition:background .12s }
    .s-head:hover { background:rgba(255,255,255,.02) }
    .s-head .s-arrow { font-size:.6rem;color:var(--text3);transition:transform .2s;width:12px;text-align:center }
    .suite.open .s-head .s-arrow { transform:rotate(90deg) }
    .s-head .s-name { flex:1;font-weight:600;font-size:.88rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap }
    .s-head .s-meta { display:flex;gap:8px;font-size:.72rem }
    .s-head .s-meta .sm.p { color:var(--pass) } .s-head .s-meta .sm.f { color:var(--fail) }
    .s-body { display:none;border-top:var(--border);animation:slideDown .25s ease }
    .suite.open .s-body { display:block }
    .t-row { display:flex;align-items:center;gap:10px;padding:7px 18px 7px 36px;font-size:.8rem;border-bottom:1px solid rgba(255,255,255,.015);transition:background .08s;cursor:pointer }
    .t-row:hover { background:rgba(255,255,255,.02) }
    .t-row.fail { background:rgba(239,68,68,.04) }
    .t-row.focused { background:rgba(255,193,7,.06) }
    .t-row .t-icon { width:16px;text-align:center;flex-shrink:0;font-size:.7rem }
    .t-row .t-name { flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap }
    .t-row .t-err { font-size:.7rem;color:var(--fail);max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap }
    .t-row .t-dur { font-size:.68rem;color:var(--text3);min-width:38px;text-align:right;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:4px }
    .t-row .t-dur .td-bar { width:30px;height:3px;border-radius:2px;background:rgba(255,255,255,.04);overflow:hidden;flex-shrink:0 }
    .t-row .t-dur .td-bar-inner { height:100%;border-radius:2px;background:var(--cyan);transition:width .3s }
    .t-row .t-dur.slow .td-bar-inner { background:var(--warn) }
    .t-row .t-dur.very-slow .td-bar-inner { background:var(--fail) }
    .sort-indicator { font-size:.6rem;color:var(--accent);margin-left:2px }
    .modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px }
    .modal-overlay.show { display:flex }
    .modal { background:var(--bg-raised);border:var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);width:100%;max-width:900px;max-height:85vh;display:flex;flex-direction:column;animation:modalIn .2s ease }
    .modal .m-head { display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:var(--border);flex-shrink:0 }
    .modal .m-head .m-title { flex:1;font-weight:600;font-size:.92rem;font-family:monospace }
    .modal .m-head .m-close { background:none;border:none;color:var(--text3);font-size:1.3rem;cursor:pointer;padding:4px 8px;border-radius:4px }
    .modal .m-head .m-close:hover { color:var(--text) }
    .modal .m-body { flex:1;overflow:auto;padding:0 }
    .modal .m-body pre { margin:0;padding:16px 20px;font-family:'SF Mono','Fira Code',monospace;font-size:.78rem;line-height:1.55;color:var(--text2);white-space:pre-wrap;word-break:break-all }
    .modal .m-body pre .ln { display:inline-block;width:36px;text-align:right;margin-right:12px;color:var(--text3);font-size:.7rem;user-select:none }
    .state-msg { text-align:center;padding:72px 20px;animation:fadeInUp .5s ease both }
    .state-msg .icon { font-size:3rem;margin-bottom:10px }
    .state-msg h3 { font-size:1.05rem;color:var(--text2) } .state-msg p { font-size:.82rem;color:var(--text3);margin:4px 0 }
    .state-msg code { background:var(--bg-flat);padding:5px 10px;border-radius:6px;font-size:.78rem;color:var(--cyan);margin-top:6px;display:inline-block }
    .skeleton { background:linear-gradient(90deg,var(--bg-flat) 25%,rgba(255,255,255,.03) 50%,var(--bg-flat) 75%);background-size:800px 100%;animation:shimmer 1.5s infinite linear;border-radius:4px }
    .toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg-raised);border:1px solid rgba(255,193,7,.3);border-radius:8px;color:var(--text);padding:10px 20px;font-size:.82rem;z-index:300;box-shadow:var(--shadow-lg);opacity:0;transition:opacity .2s;pointer-events:none }
    .toast.show { opacity:1 }
    .slow-warn { font-size:.64rem;color:var(--warn);margin-left:4px }
    @media (max-width:640px) { .container { padding:24px 12px 60px } .header h1 { font-size:1.5rem } .file-grid { grid-template-columns:1fr } .stats-grid { gap:6px } .stat-card { padding:12px 14px;min-width:65px } .stat-card .val { font-size:1.3rem } .toolbar { flex-direction:column } .search-wrap { max-width:100% } }
  
a[target="_blank"]::after{content:" ↗";font-size:.7em;opacity:.5}
</style>
</head>
<body>
<div class="container">
  <div class="header"><h1>🧪 YrY <span class="accent">自检中心</span></h1><p class="sub">测试文件浏览 · 结果面板 · 源码查看 — 联动 docs + demos</p></div>

  <div class="stats-grid" id="statsRow"></div>
  <div class="bar-wrap"><div class="bar-outer" id="bar" title="点击进度条筛选状态"></div></div>

  <div class="cross-nav">
    <a class="cross-link" href="../docs/index.html">📚 文档中心</a>
    <span class="cross-sep">·</span>
    <a class="cross-link" href="../docs/故事任务面板/yry-arch/演示/index.html">🎬 演示中心</a>
    <span class="cross-sep">·</span>
    <span class="cross-link on" id="navStatus">🧪 自检中心</span>
  </div>

  <div class="tabs"><span class="tab on" data-panel="files">📁 测试文件</span><span class="tab" data-panel="results">📊 执行结果</span><span class="tab" data-panel="slow">🐢 慢测试</span></div>

  <div class="panel on" id="panelFiles">
    <div class="toolbar">
      <div class="search-wrap"><span class="si">🔍</span><input type="text" id="searchFiles" placeholder="搜索文件…" autocomplete="off"></div>
      <button class="btn" onclick="expandAllFiles()">⊞ 展开</button>
      <button class="btn" onclick="collapseAllFiles()">⊟ 收起</button>
      <button class="btn" onclick="copyFileList()">📋 复制清单</button>
      <a class="btn" href="results.json" target="_blank">📄 JSON</a>
      <span class="kbd-hint">Ctrl+F 搜索</span>
    </div>
    <div id="filesContent"></div>
  </div>

  <div class="panel" id="panelResults">
    <div class="toolbar">
      <div class="search-wrap"><span class="si">🔍</span><input type="text" id="searchResults" placeholder="搜索测试名称…" autocomplete="off"></div>
      <button class="btn" id="btnSortDur" onclick="toggleSort()">⏱ 耗时排序</button>
      <button class="btn" onclick="expandAllSuites()">⊞ 展开全部</button>
      <button class="btn" onclick="collapseAllSuites()">⊟ 收起全部</button>
      <button class="btn" id="btnAutoRefresh" onclick="toggleAutoRefresh()">🔄 自动刷新</button>
      <button class="btn" onclick="copyResultsMd()">📋 复制 MD</button>
      <span class="kbd-hint">j/k 导航 · Enter 展开 · Esc 关闭</span>
    </div>
    <div id="resultsContent"></div>
  </div>

  <div class="panel" id="panelSlow">
    <div class="toolbar"><span style="color:var(--text3);font-size:.82rem">超过 100ms 的测试（按耗时降序）</span></div>
    <div id="slowContent"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal"><div class="m-head"><span class="m-title" id="modalTitle"></span><button class="m-close" onclick="closeModal()">✕</button></div><div class="m-body" id="modalBody"></div></div></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/yry-cdn-lib@1.0.0/shared.js"></script>
<script>
let manifest=null,results=null,activePanel='files',fileQuery='',resultQuery='',sortByDur=false,autoRefreshId=null,focusIdx=-1;
const CAT_ICONS={skills:'⚙️',agents:'🤖',rules:'📏',integration:'🔗',lib:'📦'};
const CAT_LABELS={skills:'Skills',agents:'Agents',rules:'Rules',integration:'Integration',lib:'Library'};
const SLOW_THRESHOLD=100;

async function loadData(){
  const[m,r]=await Promise.allSettled([fetch('manifest.json'),fetch('results.json')]);
  if(m.status==='fulfilled'&&m.value.ok)manifest=await m.value.json();
  if(r.status==='fulfilled'&&r.value.ok)results=await r.value.json();
  render();
}

// Delegated to CDN YrY.* utilities
function esc(s){ return YrY.esc(s); }
function fmtDur(ms){ return YrY.fmtDur(ms); }
function toast(msg){ YrY.toast(msg); }
function fmtTs(iso){if(!iso)return'';try{return new Date(iso).toLocaleString('zh-CN')}catch{return iso}}
function classifyPath(p){if(p.startsWith('skills/'))return'skills';if(p.startsWith('agents/'))return'agents';if(p.startsWith('rules/'))return'rules';if(p.startsWith('integration/'))return'integration';if(p.startsWith('lib/'))return'lib';return'other'}
function fileToResultKey(name){const m={'rui.test.mjs':'rui skill','rui-bot.test.mjs':'rui-bot skill','rui-claude.test.mjs':'rui-claude skill','rui-import.test.mjs':'rui-import skill','rui-story.test.mjs':'rui-story skill','rui-trends.test.mjs':'rui-trends skill','agents.test.mjs':'agent definitions','rules.test.mjs':'rule definitions','cross-references.test.mjs':'cross-cutting integration','knowledge-graph.test.mjs':'knowledge graph integrity'};return m[name]||null}
function isTopMarker(name){const n=name.toLowerCase();return n.endsWith(' skill')||n.endsWith(' definitions')||n.endsWith(' integrity')||n.endsWith(' integration')}
function classifySuiteName(name){const n=name.toLowerCase();if(n.includes('skill'))return'skills';if(n.includes('agent'))return'agents';if(n.includes('rule'))return'rules';if(n.includes('cross-cutting')||n.includes('knowledge graph'))return'integration';return'other'}

function buildResultMap(){
  if(!results||!results.suites)return{};
  const map={};let current=null;
  for(const s of results.suites){
    const tests=(s.tests||[]).filter(t=>t.name);
    if(s.name!=='(standalone)'&&isTopMarker(s.name)){current=s.name;if(!map[current])map[current]={passed:0,failed:0,skipped:0,total:0,tests:[]}}
    if(s.name==='(standalone)'&&current&&tests.length>0){map[current].tests.push(...tests);for(const t of tests){map[current].total++;if(t.status==='passed')map[current].passed++;else if(t.status==='failed')map[current].failed++;else if(t.status==='skipped')map[current].skipped++}}
  }
  return map;
}

function getAllTests(){const rm=buildResultMap();const all=[];for(const[,r] of Object.entries(rm))all.push(...r.tests);return all}

// ═══ Stats ═══
function renderStats(){
  const s=results?.summary||{};const t=s.total||0,p=s.passed||0,f=s.failed||0,sk=s.skipped||0;
  const dur=results?.durationMs?fmtDur(results.durationMs):'--';
  const passPct=t>0?(p/t*100).toFixed(1):'0';
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card" onclick="filterByStatus('all')" id="statAll"><div class="val t">${t}</div><div class="lbl">总计断言</div></div>
    <div class="stat-card" onclick="filterByStatus('passed')" id="statPassed"><div class="val p">${p}</div><div class="lbl">✅ 通过 · ${passPct}%</div></div>
    <div class="stat-card" onclick="filterByStatus('failed')" id="statFailed"><div class="val f">${f}</div><div class="lbl">❌ 失败</div></div>
    <div class="stat-card" onclick="filterByStatus('skipped')" id="statSkipped"><div class="val s">${sk}</div><div class="lbl">⏭️ 跳过</div></div>
    <div class="stat-card"><div class="val d">${dur}</div><div class="lbl">⏱ 耗时</div></div>`;
  const pp=t>0?(p/t*100):0,fp=t>0?(f/t*100):0,sp=t>0?(sk/t*100):0;
  document.getElementById('bar').innerHTML=`<div class="seg p" style="width:${pp}%"></div><div class="seg f" style="width:${fp}%"></div><div class="seg s" style="width:${sp}%"></div>`;
  document.getElementById('navStatus').textContent=results?`🧪 自检中心 · ${p}/${t} 通过`:'🧪 自检中心';
}

// ═══ Files panel ═══
function renderFiles(){
  const container=document.getElementById('filesContent');
  if(!manifest||!manifest.files){container.innerHTML=`<div class="state-msg"><div class="icon">📁</div><h3>文件清单不可用</h3><p>运行 <code>node tests/run.mjs --json</code></p></div>`;return}
  const resultMap=buildResultMap();
  const testFiles=manifest.files.filter(f=>f.name.endsWith('.test.mjs')||f.name==='run.mjs'||(f.dir==='lib'&&f.name.endsWith('.mjs')));
  const groups={};for(const f of testFiles){const cat=f.dir==='lib'?'lib':classifyPath(f.path);if(!groups[cat])groups[cat]=[];groups[cat].push(f)}
  const order=['skills','agents','rules','integration','lib'];let html='';
  for(const cat of order){const files=groups[cat];if(!files||!files.length)continue;
    html+=`<div class="layer"><div class="layer-head"><span class="ln">${files.length}</span><h2>${CAT_ICONS[cat]||''} ${CAT_LABELS[cat]||cat}</h2><span class="ls">${files.length} 文件</span></div><div class="file-grid">`;
    for(const f of files){if(fileQuery&&!f.name.toLowerCase().includes(fileQuery)&&!f.path.toLowerCase().includes(fileQuery)&&!(f.desc&&f.desc.toLowerCase().includes(fileQuery)))continue;
      const rKey=fileToResultKey(f.name);const r=rKey?resultMap[rKey]:null;
      let badge='';if(r&&r.total>0)badge=r.failed>0?`<span class="fc-badge fail">❌ ${r.failed}/${r.total}</span>`:`<span class="fc-badge pass">✅ ${r.passed}/${r.total}</span>`;else if(f.name.endsWith('.test.mjs'))badge=`<span class="fc-badge none">未执行</span>`;
      html+=`<div class="file-card" onclick="viewSource('${esc(f.path)}')" title="点击查看源码 · 右键复制路径"><span class="fc-icon">${f.dir==='lib'?'📦':'📄'}</span><div class="fc-body"><div class="fc-name">${esc(f.name)} ${badge}</div><div class="fc-path">${esc(f.path)}</div>${f.desc?`<div class="fc-desc">${esc(f.desc)}</div>`:''}<div class="fc-meta"><span>📏 ${f.lines} 行</span><span>📦 ${(f.size/1024).toFixed(1)}KB</span>${r?`<span>🧪 ${r.total} 断言</span>`:''}</div></div></div>`}
    html+=`</div></div>`}
  container.innerHTML=html||`<div class="state-msg"><div class="icon">🔍</div><h3>无匹配文件</h3></div>`;
}

// ═══ Results panel ═══
function renderResults(){
  const container=document.getElementById('resultsContent');
  if(!results||!results.suites){container.innerHTML=`<div class="state-msg"><div class="icon">📊</div><h3>暂无测试结果</h3><p>运行 <code>node tests/run.mjs --json</code></p></div>`;return}
  const resultMap=buildResultMap();const entries=Object.entries(resultMap);
  if(!entries.length){container.innerHTML=`<div class="state-msg"><div class="icon">📊</div><h3>无结果数据</h3></div>`;return}
  const order={skills:1,agents:2,rules:3,integration:4};entries.sort((a,b)=>(order[classifySuiteName(a[0])]||5)-(order[classifySuiteName(b[0])]||5));
  let html='';focusIdx=-1;
  for(const[name,r]of entries){
    if(resultQuery){const mn=name.toLowerCase().includes(resultQuery);const mt=r.tests.some(t=>t.name.toLowerCase().includes(resultQuery)||(t.error&&t.error.toLowerCase().includes(resultQuery)));if(!mn&&!mt)continue}
    const cat=classifySuiteName(name);const icon=CAT_ICONS[cat]||'📦';const hasFail=r.failed>0;
    let tests=r.tests;if(sortByDur)tests=[...tests].sort((a,b)=>(b.duration||0)-(a.duration||0));
    const maxDur=Math.max(...tests.map(t=>t.duration||0),1);
    html+=`<div class="suite${hasFail?' open':''}" data-cat="${cat}" data-name="${esc(name)}"><div class="s-head" data-action="toggle"><span class="s-arrow">▶</span><span class="s-name">${icon} ${esc(name)}</span><span class="s-meta">${r.passed>0?`<span class="sm p">✅ ${r.passed}</span>`:''}${r.failed>0?`<span class="sm f">❌ ${r.failed}</span>`:''}${r.skipped>0?`<span class="sm" style="color:var(--skip)">⏭️ ${r.skipped}</span>`:''}</span></div><div class="s-body">`;
    for(const t of tests){if(resultQuery&&!t.name.toLowerCase().includes(resultQuery)&&!(t.error&&t.error.toLowerCase().includes(resultQuery)))continue;
      const durMs=t.duration||0;const barPct=maxDur>0?Math.round(durMs/maxDur*100):0;
      const durClass=durMs>500?'very-slow':durMs>SLOW_THRESHOLD?'slow':'';
      html+=`<div class="t-row${t.status==='failed'?' fail':''}" data-test="${esc(t.name)}" onclick="copyTestName('${esc(t.name)}')" title="点击复制测试名"><span class="t-icon">${t.status==='passed'?'✅':t.status==='failed'?'❌':t.status==='skipped'?'⏭️':'⬜'}</span><span class="t-name">${esc(t.name)}</span>${t.error?`<span class="t-err" title="${esc(t.error)}">${esc(t.error)}</span>`:''}<span class="t-dur ${durClass}"><div class="td-bar"><div class="td-bar-inner" style="width:${barPct}%"></div></div>${fmtDur(t.duration)}${durMs>SLOW_THRESHOLD?`<span class="slow-warn">🐢</span>`:''}</span></div>`}
    html+=`</div></div>`}
  container.innerHTML=html||`<div class="state-msg"><div class="icon">🔍</div><h3>无匹配结果</h3></div>`;
}

// ═══ Slow tests panel ═══
function renderSlow(){
  const container=document.getElementById('slowContent');
  const all=getAllTests();const slow=all.filter(t=>(t.duration||0)>SLOW_THRESHOLD).sort((a,b)=>(b.duration||0)-(a.duration||0));
  if(!slow.length){container.innerHTML=`<div class="state-msg"><div class="icon">⚡</div><h3>所有测试都在 ${SLOW_THRESHOLD}ms 以内</h3></div>`;return}
  let html='';
  for(const t of slow){html+=`<div class="t-row${t.status==='failed'?' fail':''}" style="padding-left:18px" onclick="copyTestName('${esc(t.name)}')" title="点击复制测试名"><span class="t-icon">${t.status==='passed'?'✅':'❌'}</span><span class="t-name">${esc(t.name)}</span><span class="t-dur very-slow">${fmtDur(t.duration)}</span></div>`}
  container.innerHTML=html;
}

// ═══ Source modal ═══
async function viewSource(relPath){const overlay=document.getElementById('modalOverlay');document.getElementById('modalTitle').textContent=relPath;document.getElementById('modalBody').innerHTML=`<div style="padding:40px;text-align:center;color:var(--text3)">加载中…</div>`;overlay.classList.add('show');try{const resp=await fetch(relPath);if(!resp.ok)throw new Error('HTTP '+resp.status);const text=await resp.text();const lines=text.split('\n');document.getElementById('modalBody').innerHTML=`<pre>${lines.map((l,i)=>`<span class="ln">${i+1}</span>${esc(l)}`).join('\n')}</pre>`}catch(e){document.getElementById('modalBody').innerHTML=`<div style="padding:40px;text-align:center;color:var(--fail)">无法加载: ${esc(e.message)}</div>`}}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show')}

// ═══ Actions ═══
function expandAllFiles(){document.querySelectorAll('#filesContent .file-card').forEach(c=>c.style.display='')}
function collapseAllFiles(){}
function expandAllSuites(){document.querySelectorAll('#resultsContent .suite').forEach(c=>c.classList.add('open'))}
function collapseAllSuites(){document.querySelectorAll('#resultsContent .suite').forEach(c=>c.classList.remove('open'))}
function toggleSort(){sortByDur=!sortByDur;document.getElementById('btnSortDur').classList.toggle('on',sortByDur);renderResults()}
function toggleAutoRefresh(){if(autoRefreshId){clearInterval(autoRefreshId);autoRefreshId=null;document.getElementById('btnAutoRefresh').classList.remove('on');toast('自动刷新已关闭')}else{autoRefreshId=setInterval(async()=>{try{const r=await fetch('results.json');if(r.ok){results=await r.json();render()}}catch{}},10000);document.getElementById('btnAutoRefresh').classList.add('on');toast('每 10 秒自动刷新')}}

function copyTestName(name){navigator.clipboard.writeText(name).then(()=>toast('已复制: '+name)).catch(()=>{})}
async function copyResultsMd(){if(!results)return;const s=results.summary||{};let md=`## YrY 自检结果\n\n| 指标 | 值 |\n|------|----|\n| 总计 | ${s.total||0} |\n| ✅ 通过 | ${s.passed||0} |\n| ❌ 失败 | ${s.failed||0} |\n| ⏱ 耗时 | ${fmtDur(results.durationMs)} |\n| 🕐 时间 | ${fmtTs(results.timestamp)} |\n`;const rm=buildResultMap();for(const[name,r]of Object.entries(rm)){const icon=r.failed>0?'❌':'✅';md+=`\n### ${icon} ${name}\n| 通过 | 失败 | 跳过 | 总计 |\n|------|------|------|------|\n| ${r.passed} | ${r.failed} | ${r.skipped} | ${r.total} |\n`}try{await navigator.clipboard.writeText(md);toast('已复制为 Markdown')}catch{toast('复制失败')}}
async function copyFileList(){if(!manifest)return;const list=manifest.files.map(f=>f.path).join('\n');try{await navigator.clipboard.writeText(list);toast('已复制文件清单')}catch{toast('复制失败')}}

function filterByStatus(status){resultQuery=status==='all'?'':status==='passed'?'✅':status==='failed'?'❌':'';document.querySelectorAll('.stat-card').forEach(c=>c.classList.remove('active-filter'));const el=document.getElementById(status==='all'?'statAll':status==='passed'?'statPassed':status==='failed'?'statFailed':status==='skipped'?'statSkipped':'statAll');if(el)el.classList.add('active-filter');switchPanel('results');renderResults()}
function switchPanel(name){activePanel=name;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.panel===name));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('on',p.id==='panel'+(name==='files'?'Files':name==='results'?'Results':name==='slow'?'Slow':'')));if(name==='files')renderFiles();else if(name==='results')renderResults();else if(name==='slow')renderSlow()}

// ═══ Keyboard navigation ═══
document.addEventListener('keydown',e=>{
  if(document.activeElement.tagName==='INPUT')return;
  if(e.key==='Escape'){closeModal();}
  if(e.key==='j'||e.key==='ArrowDown'){e.preventDefault();focusIdx++;navigateResults();}
  if(e.key==='k'||e.key==='ArrowUp'){e.preventDefault();focusIdx=Math.max(-1,focusIdx-1);navigateResults();}
  if(e.key==='Enter'&&activePanel==='results'){const focused=document.querySelector('.suite.focused');if(focused){focused.classList.toggle('open');}}
  if(e.key==='Enter'&&activePanel==='files'){const focused=document.querySelector('.file-card.focused');if(focused)focused.click();}
  if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();const inp=document.getElementById(activePanel==='files'?'searchFiles':'searchResults');if(inp)inp.focus();}
  if(e.key==='1')switchPanel('files');
  if(e.key==='2')switchPanel('results');
  if(e.key==='3')switchPanel('slow');
});

function navigateResults(){
  document.querySelectorAll('.suite.focused,.t-row.focused,.file-card.focused').forEach(e=>e.classList.remove('focused'));
  const suites=document.querySelectorAll('#resultsContent .suite');
  if(suites.length===0)return;
  if(focusIdx<0)return;
  if(focusIdx>=suites.length)focusIdx=suites.length-1;
  suites[focusIdx].classList.add('focused');
  suites[focusIdx].scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ═══ Event delegation ═══
document.querySelector('.tabs').addEventListener('click',e=>{const tab=e.target.closest('.tab');if(!tab)return;switchPanel(tab.dataset.panel)});
document.getElementById('searchFiles').addEventListener('input',function(){fileQuery=this.value.toLowerCase().trim();renderFiles()});
document.getElementById('searchResults').addEventListener('input',function(){resultQuery=this.value.toLowerCase().trim();renderResults()});
document.getElementById('resultsContent').addEventListener('click',e=>{const head=e.target.closest('.s-head');if(head){const suite=head.closest('.suite');suite.classList.toggle('open')}});
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});
document.getElementById('bar').addEventListener('click',function(e){const rect=this.getBoundingClientRect();const pct=(e.clientX-rect.left)/rect.width;if(pct<.33)filterByStatus('passed');else if(pct<.66)filterByStatus('failed');else filterByStatus('skipped')});

// ═══ Render ═══
function render(){renderStats();if(activePanel==='files')renderFiles();else if(activePanel==='results')renderResults();else if(activePanel==='slow')renderSlow()}
loadData();
</script>
</body>
</html>
