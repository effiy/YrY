<!DOCTYPE html>
<html lang="zh-CN">
<head>
{{HEAD_BLOCK}}
<style>
/* Page-specific overrides — shared patterns in shared-b.css */
</style>
</head>
<body>
<div class="yry-container">
{{BREADCRUMB}}
{{CROSS_NAV}}

<div class="yry-header">
  <h1>📄 <span class="yry-accent">{{SCENE_TITLE}}</span> · 源码</h1>
  <p class="yry-sub">场景 {{SCENE_NUM}} · 版本 v{{VERSION}} · {{DATE}}</p>
</div>

{{STATS_GRID}}

<div class="yry-tabs">
  <span class="yry-tab on" data-panel="files">📁 文件清单</span>
  <span class="yry-tab" data-panel="structure">🗂 目录浏览</span>
  <span class="yry-tab" data-panel="topology">🔗 模块拓扑</span>
</div>

<div class="yry-panel on" id="panelFiles">
  <div class="yry-section">
    <h2><span class="yry-dot"></span>产物文件</h2>
    {{SEC2_HTML}}
  </div>
</div>

<div class="yry-panel" id="panelStructure">
  {{SEC0_HTML}}
</div>

<div class="yry-panel" id="panelTopology">
  {{MERMAID_BLOCKS}}
</div>

<div class="yry-footer">YrY v{{VERSION}} · {{DATE}} · <a href="{{CDN_DEPTH}}docs/index.html">文档中心</a></div>
</div>
<script src="{{CDN_DEPTH}}cdn/shared.js"></script>
<script>YrY.initTabs();</script>
</body>
</html>
