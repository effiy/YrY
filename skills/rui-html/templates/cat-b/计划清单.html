<!DOCTYPE html>
<html lang="zh-CN">
<head>
{{HEAD_BLOCK}}
<style>
.yry-container{max-width:960px;padding:40px 24px 80px}
.yry-header h1{font-size:1.8rem}
.yry-header .yry-sub{margin-top:4px}
.yry-header .meta{color:var(--yry-text3);font-size:.75rem;margin-top:6px}
.yry-stats{gap:12px;margin-bottom:20px}
.yry-stat{padding:16px 20px;min-width:80px}
.yry-stat .yry-val{font-size:1.6rem}
.yry-tabs{margin-bottom:24px}
.yry-tab{padding:8px 18px;font-size:0.82rem}
.yry-panel{padding-top:0;animation:none}
.yry-section h2{font-size:0.95rem}
.yry-section h2 .yry-dot{width:7px;height:7px}
/* ── Progress bar ── */
.progress-wrap{margin-bottom:20px}
.progress-label{display:flex;justify-content:space-between;font-size:0.78rem;margin-bottom:6px;color:var(--yry-text2)}
.progress-bar{width:100%;height:6px;background:var(--yry-bg-flat);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#3d59a1,var(--yry-accent));border-radius:3px;transition:width 0.4s ease}
/* ── Checklist steps ── */
.step{background:var(--yry-bg-card);border:var(--yry-border);border-radius:var(--yry-radius);margin:10px 0;overflow:hidden;box-shadow:var(--yry-shadow)}
.step-header{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer}
.step-header:hover{background:rgba(255,193,7,0.04)}
.step-checkbox{width:18px;height:18px;accent-color:var(--yry-accent);cursor:pointer;flex-shrink:0}
.step-num{font-weight:700;color:var(--yry-accent);min-width:26px;font-size:0.88rem}
.step-title{flex:1;font-size:0.92rem}
.step-status{font-size:0.72rem;padding:3px 10px;border-radius:12px;flex-shrink:0}
.status-done{background:rgba(34,197,94,0.12);color:var(--yry-pass)}
.status-pending{background:rgba(110,110,114,0.18);color:var(--yry-text3)}
.status-active{background:rgba(245,158,11,0.12);color:var(--yry-warn)}
.step-body{display:none;padding:0 16px 16px 52px;font-size:0.84rem;border-top:var(--yry-border)}
.step-body.open{display:block}
.step-body p{color:var(--yry-text2);margin:4px 0}
</style>
</head>
<body>
<div class="yry-container">
{{BREADCRUMB}}
{{CROSS_NAV}}

<div class="yry-header">
  <h1>📋 <span class="yry-accent">{{SCENE_TITLE}}</span> · 计划清单</h1>
  <p class="yry-sub">场景 {{SCENE_NUM}} · 版本 v{{VERSION}} · {{DATE}}</p>
</div>

{{STATS_GRID}}

<div class="progress-wrap">
  <div class="progress-label"><span>总体进度</span><span>0/0 步骤完成</span></div>
  <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
</div>

<div class="yry-tabs">
  <span class="yry-tab on" data-panel="checklist">📋 清单</span>
  <span class="yry-tab" data-panel="overview">📊 概览</span>
  <span class="yry-tab" data-panel="verify">✅ 验证</span>
</div>

<div class="yry-panel on" id="panelChecklist">
  {{SEC0_HTML}}
</div>

<div class="yry-panel" id="panelOverview">
  {{SEC2_HTML}}
</div>

<div class="yry-panel" id="panelVerify">
  {{SEC4_HTML}}
</div>

<div class="yry-footer">YrY v{{VERSION}} · {{DATE}} · <a href="{{CDN_DEPTH}}docs/index.html">文档中心</a></div>
</div>
<script src="{{CDN_DEPTH}}cdn/shared.js"></script>
<script>YrY.initTabs();YrY.initStepToggle();</script>
</body>
</html>
