<!DOCTYPE html>
<html lang="zh-CN">
<head>
{{HEAD_BLOCK}}
<link rel="stylesheet" href="{{CDN_DEPTH}}cdn/yry-scene-chrome/index.css">
<link rel="stylesheet" href="{{CDN_DEPTH}}cdn/yry-scene-stats/index.css">
<link rel="stylesheet" href="{{CDN_DEPTH}}cdn/yry-scene-tabs/index.css">
<link rel="stylesheet" href="{{CDN_DEPTH}}cdn/yry-scene-footer/index.css">
<link rel="stylesheet" href="{{CDN_DEPTH}}cdn/yry-scene-steps/index.css">
<link rel="stylesheet" href="{{CDN_DEPTH}}cdn/yry-progress-bar/index.css">
<link rel="stylesheet" href="{{CDN_DEPTH}}cdn/yry-scene-checklist/index.css">
</head>
<body>
<div class="yry-container">
<yry-scene-chrome
  theme="b"
  title="📋 {ACCENT} · 计划清单"
  title-accent="{{SCENE_TITLE}}"
  subtitle="场景 {{SCENE_NUM}} · 版本 v{{VERSION}} · {{DATE}}"
  breadcrumb='{{BREADCRUMB_JSON}}'
  crossnav='{{CROSS_NAV_JSON}}'>
</yry-scene-chrome>

<yry-scene-stats items='{{STATS_GRID_JSON}}'></yry-scene-stats>

<yry-progress-bar done="0" total="0" label="总体进度"></yry-progress-bar>

<yry-scene-tabs tabs='[{"id":"checklist","label":"📋 清单"},{"id":"overview","label":"📊 概览"},{"id":"verify","label":"✅ 验证"}]'>
  <div data-panel="checklist"><yry-scene-steps>{{SEC1_HTML}}</yry-scene-steps></div>
  <div data-panel="overview">
    <div class="yry-section">
      <h2><span class="yry-dot"></span>§0 场景概述</h2>
      {{SEC0_HTML}}
    </div>
  </div>
  <div data-panel="verify">
    <div class="yry-section">
      <h2><span class="yry-dot"></span>§3 验证标准</h2>
      {{SEC3_HTML}}
    </div>
  </div>
</yry-scene-tabs>

<yry-scene-footer version="{{VERSION}}" date="{{DATE}}" docs-link="{{CDN_DEPTH}}docs/index.html"></yry-scene-footer>
</div>
<script src="{{CDN_DEPTH}}cdn/shared/index.js"></script>
<script src="{{CDN_DEPTH}}cdn/yry-scene-chrome/index.js"></script>
<script src="{{CDN_DEPTH}}cdn/yry-scene-stats/index.js"></script>
<script src="{{CDN_DEPTH}}cdn/yry-scene-tabs/index.js"></script>
<script src="{{CDN_DEPTH}}cdn/yry-scene-footer/index.js"></script>
<script src="{{CDN_DEPTH}}cdn/yry-scene-steps/index.js"></script>
<script src="{{CDN_DEPTH}}cdn/yry-progress-bar/index.js"></script>
</body>
</html>
