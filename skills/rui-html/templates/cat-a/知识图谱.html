<!DOCTYPE html>
<html lang="zh-CN">
<head>
{{HEAD_BLOCK}}
<style>
/* Page-specific overrides — shared patterns in shared-a.css */
.graph-container{background:rgba(15,23,42,.5);border-radius:1rem;border:1px solid #1e293b;padding:1rem;margin-bottom:1.5rem}
#cy{width:100%;height:550px;border-radius:.5rem}
.yry-container{max-width:1400px}
.legend{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:.75rem;padding:.75rem;background:rgba(15,23,42,.5);border-radius:.5rem;border:1px solid #1e293b;font-size:.75rem;color:#94a3b8}
.legend-item{display:flex;align-items:center;gap:.375rem}
.legend-dot{width:12px;height:12px;border-radius:50%;border:2px solid}
.legend-dot.scene{background:rgba(139,92,246,.3);border-color:#8B5CF6}
.legend-dot.check{background:rgba(236,72,153,.3);border-color:#EC4899}
.legend-dot.source{background:rgba(59,130,246,.3);border-color:#3B82F6}
.legend-dot.domain{background:rgba(34,211,238,.3);border-color:#22d3ee}
</style>
</head>
<body>
<div class="yry-container" id="report-container">
{{BREADCRUMB}}
{{CROSS_NAV}}

<div class="yry-header">
  <div class="yry-header-row">
    <div class="yry-pulse-dot"></div>
    <h1>🔗 {{SCENE_TITLE}} · 知识图谱</h1>
    <div class="yry-toolbar">
      <div class="yry-toolbar-actions">
        <button onclick="copyAsImage(this)">📋 Copy</button>
        <button onclick="downloadPNG(this)">🖼 PNG</button>
        <button onclick="downloadPDF(this)">📄 PDF</button>
      </div>
      <button class="yry-toolbar-toggle" onclick="this.parentElement.classList.toggle('expanded')">⋯</button>
    </div>
  </div>
  <p class="yry-subtitle">{{STORY_NAME}} · 场景 {{SCENE_NUM}} · v{{VERSION}}</p>
</div>

<div class="legend">
  <span style="color:#94a3b8;font-weight:600;">节点:</span>
  <span class="legend-item"><span class="legend-dot scene"></span>场景</span>
  <span class="legend-item"><span class="legend-dot check"></span>检查/功能</span>
  <span class="legend-item"><span class="legend-dot source"></span>源文件</span>
  <span class="legend-item"><span class="legend-dot domain"></span>概念域</span>
  <span style="margin-left:1rem;color:#94a3b8;font-weight:600;">操作:</span>
  <span style="color:#64748b;">🖱 拖拽 · 滚轮缩放 · 点击节点高亮邻域</span>
</div>

<div class="graph-container"><div id="cy"></div></div>

<div class="yry-cards">
  <div class="yry-card">
    <div class="yry-card-header"><div class="yry-card-dot scene"></div><h3>场景</h3></div>
    <ul><li><b>{{SCENE_TITLE}}</b> — 场景 {{SCENE_NUM}}</li></ul>
  </div>
  {{SEC0_HTML}}
</div>

<div class="yry-footer">YrY v{{VERSION}} · {{DATE}}</div>
</div>
<script src="{{CDN_DEPTH}}cdn/shared.js"></script>
<script>
(function(){
  if(typeof cytoscape==='undefined'){document.getElementById('cy').innerHTML='<p style="color:#475569;text-align:center;padding:2rem;">Cytoscape.js 未加载 — 知识图谱数据待生成</p>';return}
  var cy=cytoscape({container:document.getElementById('cy'),style:[{selector:'node',style:{label:'data(label)',color:'white','font-size':'10px','font-family':'JetBrains Mono,monospace','text-valign':'center','text-halign':'center','background-color':'#1e293b',border:'2px solid #475569'}}],elements:{nodes:[{data:{id:'placeholder',label:'数据待填充'}}],edges:[]},layout:{name:'grid'}});
  document.querySelector('.toolbar-actions button:nth-child(1)').onclick=function(){navigator.clipboard.writeText(JSON.stringify(cy.json())).then(()=>{this.textContent='✅ Copied';setTimeout(()=>this.textContent='📋 Copy',1500)})};
  document.querySelector('.toolbar-actions button:nth-child(2)').onclick=function(){if(typeof html2canvas==='undefined')return;html2canvas(document.getElementById('cy'),{backgroundColor:'#020617'}).then(c=>{var a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='{{STORY_NAME}}-scene{{SCENE_NUM}}-kg.png';a.click()})};
})();
</script>
</body>
</html>
