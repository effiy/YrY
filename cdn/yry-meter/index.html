<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YryMeter · Demo & Template</title>
  <link rel="stylesheet" href="../shared\/index\.css">
  <link rel="stylesheet" href="../theme\/index\.css">
  <link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="../yry-inline-helpers/index.css">
<link rel="stylesheet" href="demo.css">
</head>
<body>
  <h1><span class="accent">📊</span> YryMeter · 仪表盘组件</h1>
  <p class="demo-hint">
    自定义元素 <code>&lt;yry-meter&gt;</code> — 进度/评分仪表盘。
    通过 <code>value</code> / <code>max</code> 属性设置数值，自动着色：≥80 绿色、≥50 橙色、&lt;50 红色。
    支持 <code>label</code> 属性显示文本，<code>size</code> 控制高度。
  </p>

  <div class="demo-section">
    <h3>Demo — 健康维度评分</h3>
    <div class="yry-cd-26">
      <div class="yry-cd-2">
        <span class="yry-cd-62">架构合规</span>
        <yry-meter value="95" max="100" class="yry-cd-73"></yry-meter>
        <span class="yry-cd-12">95</span>
      </div>
      <div class="yry-cd-2">
        <span class="yry-cd-62">测试覆盖</span>
        <yry-meter value="65" max="100" class="yry-cd-73"></yry-meter>
        <span class="yry-cd-13">65</span>
      </div>
      <div class="yry-cd-2">
        <span class="yry-cd-62">依赖健康</span>
        <yry-meter value="42" max="100" class="yry-cd-73"></yry-meter>
        <span class="yry-cd-14">42</span>
      </div>
      <div class="yry-cd-2">
        <span class="yry-cd-62">代码质量</span>
        <yry-meter value="88" max="100" class="yry-cd-73"></yry-meter>
        <span class="yry-cd-12">88</span>
      </div>
    </div>
  </div>

  <div class="demo-section">
    <h3>Demo — 不同尺寸和标签</h3>
    <yry-meter value="78" max="100" size="sm" label="内存使用" class="yry-cd-46"></yry-meter>
    <yry-meter value="94" max="100" label="综合健康度" class="yry-cd-46"></yry-meter>
    <yry-meter value="60" max="100" size="lg" label="磁盘使用"></yry-meter>
  </div>

  <script src="index.js"></script>
  <div class="demo-footer">📊 YryMeter v1.0.0 · <a href="../index.html">CDN 首页</a></div>
</body>
</html>
