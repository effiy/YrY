<!DOCTYPE html>
<!--
  YrY CDN — yry-simulator · 管线模拟器 + Sim Log
  提供: simLog / updateStage / resetSim / setSpeed / startSim
  加载: <script src="../../../../cdn/yry-simulator/index.js"></script>
  依赖: 页面需定义 var stageDefsS3 = [...]
        DOM 中需存在 #simLogBox / #btnSimPlay / simStageIds 对应元素
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>YrY yry-simulator · 管线模拟器</title>
  <link rel="stylesheet" href="../shared/index.css">
  <link rel="stylesheet" href="../theme/index.css">
  <style>
    body { padding: 32px 24px 60px; max-width: 920px; margin: 0 auto; line-height: 1.7; }
    h1 { font-size: 1.4rem; color: var(--yry-accent, #FFC107); }
    pre { background: rgba(0,0,0,.3); padding: 10px 14px; border-radius: 6px; font-size: .76rem; color: var(--yry-cyan, #22d3ee); overflow-x: auto; }
    .stage-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--yry-bg-card); border: var(--yry-border); border-radius: 12px; margin: 8px 0; }
    .st-bar { height: 4px; background: var(--yry-bg-flat); border-radius: 2px; flex: 1; }
    .btn-play { background: var(--yry-accent); color: #000; border: none; border-radius: 24px; padding: 8px 22px; cursor: pointer; font-weight: 700; }
    .log-box { background: rgba(0,0,0,.3); border-radius: 8px; padding: 12px; font-family: 'SF Mono', monospace; font-size: .72rem; max-height: 240px; overflow-y: auto; }
  </style>
</head>
<body>
  <h1>🎮 yry-simulator · 管线模拟器</h1>
  <p>提供分阶段模拟: <code>startSim()</code> 推进阶段,各阶段打印日志行,可调速。可用于新人上手 5 阶段演练等场景。</p>

  <h2>载入</h2>
  <pre>&lt;script src="../../../../cdn/yry-simulator/index.js"&gt;&lt;/script&gt;</pre>

  <h2>API</h2>
  <pre>simLog(msg, color)   // 时间戳日志输出
updateStage(i, cls, text, pct)
resetSim()
setSpeed(val)
startSim()</pre>

  <p style="margin-top: 32px; color: var(--yry-text3, #888); font-size: .72rem;">YrY CDN · yry-simulator · 2026</p>

  <script src="../shared/index.js"></script>
  <script src="index.js"></script>
</body>
</html>
