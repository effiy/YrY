<!DOCTYPE html>
<!--
  ═══════════════════════════════════════════════════════════════════════════
  YryFaqPanel · 模板源 + Demo 预览页
  ═══════════════════════════════════════════════════════════════════════════
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YryFaqPanel · Demo & Template</title>
  <link rel="stylesheet" href="../shared\/index\.css">
  <link rel="stylesheet" href="../theme\/index\.css">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="../yry\-inline\-helpers\/index\.css">
  <style>
    body {
      background: var(--yry-bg, #0a0a0a);
      color: var(--yry-text, #f5f5f5);
      font-family: var(--yry-font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif);
      padding: 32px 24px 60px;
      max-width: 920px; margin: 0 auto;
      line-height: 1.55;
    }
    h1 { font-size: 1.25rem; margin: 0 0 4px; color: var(--yry-text, #f5f5f5); }
    h1 .accent { color: #22c55e; }
    .demo-hint { font-size: .78rem; color: var(--yry-text3, #888); margin: 0 0 20px; line-height: 1.6; }
    .demo-hint code { background: rgba(255,255,255,.06); padding: 1px 6px; border-radius: 3px; font-family: ui-monospace, monospace; font-size: .72rem; color: #e0af68; }
  </style>
</head>
<body>
  <h1><span class="accent">&#10067;</span> YryFaqPanel · FAQ 手风琴面板</h1>
  <p class="demo-hint">
    自定义元素 <code>&lt;yry-faq-panel&gt;</code> — 加载后注入面板 HTML。<br>
    需配合 <code>panel-hub.js</code> + <code>faq-panel.js</code> 实现完整交互。
  </p>

  <yry-faq-panel></yry-faq-panel>

  <!-- ════════════════════════════════════════════════════════════════════
       TEMPLATE SOURCE OF TRUTH · YryFaqPanel 的 template (Vue 3 完整模板)
       由 index.js 通过 fetch + DOMParser 解析后注册为自定义元素
       ════════════════════════════════════════════════════════════════════ -->
  <script type="text/x-template" id="yry-faq-panel-tpl">
    <div class="faq-overlay yry-faq-overlay" id="faqOverlay"></div>
    <div class="faq-panel yry-faq-panel" id="faqPanel">
      <div class="panel-header yry-panel-header">
        <span class="faq-title yry-faq-title">❓ 常见问题</span>
      </div>
      <div class="panel-body yry-panel-body" id="faqPanelBody">
        <div class="yry-faq-intro">
          <strong>YrY 知识库</strong> — {{ faqs.length }} 个常见问题,覆盖:系统概念 · 命令使用 · 面板关系 · 健康检查 · 设计原则 · 版本管理。<br>点击问题展开答案。彩色链接可快速打开对应面板。
        </div>
        <ul class="faq-list yry-faq-list">
          <li v-for="(item, i) in faqs" :key="i" :class="'faq-item yry-faq-item' + (item.open ? ' open' : '')">
            <div class="faq-q" :data-index="i" @click="toggle(i)">
              <span class="faq-q-icon">Q:</span>{{ item.q }}
            </div>
            <div class="faq-a" v-html="item.a"></div>
          </li>
        </ul>
      </div>
      <div class="panel-footer">
        <span class="yry-mute-7">快捷打开:</span>
        <a href="#" onclick="event.preventDefault();window.openPanel('notify')" class="yry-clr-fail-7 yry-link-noul">🔔 通知</a>
        <span class="panel-footer-sep">·</span>
        <a href="#" onclick="event.preventDefault();window.openPanel('cron')" class="panel-footer-link">⏰ 调度</a>
        <span class="panel-footer-sep">·</span>
        <a href="#" onclick="event.preventDefault();window.openPanel('selfimprove')" class="yry-clr-purp-7 yry-link-noul">🧬 自改进</a>
      </div>
    </div>
  </script>

  <script src="index.js"></script>

  <div class="demo-footer" style="margin-top:28px;text-align:center;font-size:.72rem;color:var(--yry-text3,#888)">
    &#10067; YryFaqPanel v1.0.0 · <a href="../index.html" style="color:var(--yry-accent,#ffc107);text-decoration:none">CDN 首页</a>
  </div>

  <script src="../yry-back-top/index.js"></script>
</body>
</html>
