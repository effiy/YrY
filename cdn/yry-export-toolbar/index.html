<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yry-export-toolbar — Export Toolbar Component</title>
<link rel="stylesheet" href="../theme\/index\.css">
<link rel="stylesheet" href="index.css">
</head>
<body class="yry-cd-3">

<div class="demo-container" id="demo-container">
  <h2 class="yry-cd-31">Export Toolbar Demo</h2>
  <p class="yry-cd-28">Click buttons below to test export functions. The toolbar captures <code>#demo-container</code>.</p>

  <!-- The toolbar auto-initializes on any .yry-export-toolbar element -->
  <div class="yry-export-toolbar" data-target="#demo-container" data-filename="demo-export">
    <button data-action="copy-png" title="Copy as PNG to clipboard">📋 Copy PNG</button>
    <button data-action="download-png" title="Download as PNG">🖼 PNG</button>
    <button data-action="download-pdf" title="Download as PDF">📄 PDF</button>
  </div>

  <div class="yry-cd-1">
    <p class="yry-cd-43">✅ Target content area</p>
    <p class="yry-cd-19">This is the content that will be captured by html2canvas.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<script src="index.js"></script>
</body>
</html>
