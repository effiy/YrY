<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YrySelfimproveStyles · Demo</title>
  <meta name="description" content="YrySelfimproveStyles 自我改进仪表板样式集 Demo">
  <link rel="stylesheet" href="../shared/index.css">
  <link rel="stylesheet" href="../theme/index.css">
  <link rel="stylesheet" href="../shared-reports/index.css">
  <link rel="stylesheet" href="index.css">
  <style>
    body { background: var(--yry-bg, #0a0a0a); color: var(--yry-text, #f5f5f5); font-family: var(--yry-font-sans, -apple-system, sans-serif); padding: 32px 24px 60px; max-width: 1100px; margin: 0 auto; line-height: 1.7; }
    h1 { font-size: 1.25rem; margin: 0 0 4px; }
    .demo-hint { font-size: .78rem; color: var(--yry-text3, #888); margin: 0 0 20px; }
  </style>
</head>
<body>
<h1>🧬 YrySelfimproveStyles · Demo</h1>
<p class="demo-hint">自我改进仪表板样式集 — diag-grid · dim-grid · comp-grid · arch-summary · trend-chart · kpi-grid · priority-grid · drift-grid · skill-grid 等 15+ 命名空间。</p>
<div class="diag-grid">
  <div class="diag-card triggered"><div class="diag-id">D0</div><div class="diag-name">基线偏离</div><div class="diag-rate">触发率 12%</div></div>
  <div class="diag-card"><div class="diag-id">D1</div><div class="diag-name">效率退化</div><div class="diag-rate">0%</div></div>
</div>
<div class="kpi-grid">
  <div class="kpi-item pass"><div class="kpi-label">闭环数</div><div class="kpi-value pass">42</div><div class="kpi-suffix">本周</div></div>
  <div class="kpi-item warn"><div class="kpi-label">复发率</div><div class="kpi-value warn">8%</div><div class="kpi-suffix">需关注</div></div>
</div>
</body>
