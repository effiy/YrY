<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YryCmdHead · Demo & Template</title>
<link rel="stylesheet" href="../shared\/index\.css">
<link rel="stylesheet" href="../theme\/index\.css">
<link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="demo.css">
<script src="../shared/vue.global.prod.js"></script>
</head>
<body>

<h1><span class="accent">⚡</span> YryCmdHead · 命令面板头部</h1>
<p class="demo-hint">Vue 3 组件: <code>title</code> · <code>subtitle</code> · <code>stats</code> (JSON 数组)</p>

<div id="demo-1"></div>

<script type="text/x-template" id="yry-cmd-head-tpl">
  <div class="cmdh-wrapper">
    <div v-if="title" class="cmdh-title">{{ title }}</div>
    <div v-if="subtitle" class="cmdh-subtitle" v-html="subtitle"></div>
    <div v-if="parsedStats.length" class="cmdh-stats">
      <span v-for="(s, i) in parsedStats" :key="i" v-html="s.html || s.text || ''"></span>
    </div>
  </div>
</script>

<script src="../shared/vue-ce-loader.js"></script>
  <script src="index.js"></script>
<script>
function mountAll() {
  if (!window.YryCmdHead) return;
  Vue.createApp(window.YryCmdHead, {
    title: '⚡ 命令面板 · §2 实施',
    subtitle: '本阶段需在 <code>demo-server</code> 上执行 14 个命令,涉及 <b>4 个子系统</b>。',
    stats: '[{"html":"👤 <b>Owner</b>: planner+devops"},{"html":"⏱ <b>工期</b>: <b>8.0h</b> / <code>06-03 → 06-08</code>"},{"html":"📦 <b>产出</b>: 4 个实施报告"},{"html":"<span class=\\"chs\\">✓ 已就绪</span>"}]'
  }).mount('#demo-1');
}
if (window.YryCmdHead) mountAll();
else document.addEventListener('yry-cmd-head-ready', mountAll, { once: true });
</script>
</body>
</html>
