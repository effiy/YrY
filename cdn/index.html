    /* 为每张卡片补齐 7 种交付物图标链接 */

    function enrichItems(items) {
      items.forEach(function (item) {
        if (item.links) return;
        var links = [];
        DELIVERY_ICONS.forEach(function (d) {
          var entry = { icon: d.icon, label: d.label };
          if (d.label === '源码' && item.demo) entry.href = item.demo.replace(/\/index\.html$/, '/index.js');
          if (d.label === '演示' && item.demo) entry.href = item.demo;
          links.push(entry);
        });
        item.links = links;
      });
    }

    CDN_DATA.docLayerStories.sections.forEach(function (sec) { enrichItems(sec.items || []); });

      (sec.items || []).forEach(function (item) {
        /* 1. 展开 __sceneBasePath 占位符 */
        if (item.meta && typeof item.meta === 'object' && !Array.isArray(item.meta) && item.meta.__sceneBasePath) {
          try {
            item.meta = (window.YrY && window.YrY.sceneMeta) ? window.YrY.sceneMeta(item.meta.__sceneBasePath) : [];
          } catch(e) {
            item.meta = [];

        }
        /* 2. 补齐缺失的 7 件交付物图标 */
        if (!item.meta || !Array.isArray(item.meta) || item.meta.length < 7) {
          var existing = {};
          (item.meta || []).forEach(function (m) { existing[m.label] = m; });
          item.meta = DELIVERY_ICONS.map(function (d) { return existing[d.label] || { icon: d.icon, label: d.label }; });

      var t = trend || '';
      var frag = document.createDocumentFragment();
      var items = [
        { text: '\u25cf A\u226580', color: '#22c55e' },

        { text: '\u25cf C\u226540', color: '#ef4444' },

      ];
      for (var i = 0; i < items.length; i++) {
        var s = document.createElement('span');
        s.style.color = items[i].color;
        s.textContent = items[i].text;
        frag.appendChild(s);
        if (i < items.length - 1) frag.appendChild(document.createTextNode(' '));
      }
      var suffix = ' \u00a0|\u00a0 \u6570\u636e\u6e90: cdn-summary.json';
      if (ts) suffix += ' \u00a0|\u00a0 \u66f4\u65b0: ' + ts + ' \u00a0|\u00a0 \u8d8b\u52bf: ' + t;
      suffix += ' \u00a0|\u00a0 \u6bcf 5 \u5206\u949f\u81ea\u52a8\u5237\u65b0';
      frag.appendChild(document.createTextNode(suffix));

    /* ── Live score fetcher: 从 cdn-summary.json 拉取最新评分并更新 Stats Grid ── */
    (function fetchCdnLiveScores() {
      var sg = document.getElementById('stats-app');
      var ph = document.getElementById('panel-hub-app');
      var REFRESH_MS = 5 * 60 * 1000;
      var MAX_RETRIES = 2;
      var RETRY_DELAY_MS = 2000;
      var FETCH_TIMEOUT_MS = 10000;

      function gradeMod(s) { return s >= 80 ? 'health' : s >= 60 ? 'warn-h' : 'info'; }
      function gradeLbl(s) { return s >= 80 ? 'A' : s >= 60 ? 'B' : 'C'; }
      function gradeWord(s) { return s >= 80 ? '优秀' : s >= 60 ? '良好' : s >= 40 ? '需改进' : '严重缺陷'; }
      function dimScore(ds, label) {
        if (!ds) return 0;
        for (var i = 0; i < ds.length; i++) {
          if (ds[i].label === label) return ds[i].avgScore;
        }
        return 0;
      }
      /* 提取维度详情: { score, grade, subScores, note } */
      function dimDetail(ds, label) {
        var d = { score: 0, grade: 'C', subScores: [], note: '' };
        if (!ds) return d;
        for (var i = 0; i < ds.length; i++) {
          if (ds[i].label === label) {
            var dim = ds[i];
            d.score = dim.avgScore || 0;
            d.grade = gradeLbl(d.score);
            d.note = dim.note || dim.detail || '';
            if (dim.subScores && Array.isArray(dim.subScores)) d.subScores = dim.subScores;
            else if (dim.children && Array.isArray(dim.children)) d.subScores = dim.children.map(function(c) { return { label: c.label, score: c.avgScore || c.score || 0 }; });
            return d;
          }
        }
        return d;
      }

      function updateScores(retryCount) {
      retryCount = retryCount || 0;
      var controller = new AbortController();
      var timeoutId = setTimeout(function() { controller.abort(); }, FETCH_TIMEOUT_MS);
      fetch('cdn-summary/index.json', { signal: controller.signal })
        .then(function(r) { clearTimeout(timeoutId); if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(function(data) {
          if (!data || !data.latest) return;
          var l = data.latest;
          var healthScore = l.composite || 0;
          var healthGrade = l.grade || '';

          var ch = data.componentHealth;
          var compScore = (ch && ch.overallAvg) || 0;
          var compCount = ch ? ch.totalComponents : '?';

          /* 按类别提取组件子评分 */
          var cssScore = (ch && ch.css && ch.css.avgScore) || 0;
          var vueScore = (ch && ch.vue && ch.vue.avgScore) || 0;
          var jsScore  = (ch && ch.js  && ch.js.avgScore)  || 0;
          var ceScore  = (ch && ch.ce  && ch.ce.avgScore)  || 0;

          var ds = data.dimSummary;
          /* ── 提取各维度详情 ── */
          var testD  = dimDetail(ds, '测试覆盖');
          var siD    = dimDetail(ds, '自改进闭环');
          var loadD  = dimDetail(ds, '加载链稳定');
          var testScore = testD.score;
          var siScore   = siD.score;
          var loadScore = loadD.score;

          /* 测试子维度 (若数据源提供了细分) */
          var testCovScore  = dimScore(ds, '代码覆盖率');
          var testPassScore = dimScore(ds, '用例通过率');
          var testAdeqScore = dimScore(ds, '用例充分度');

          /* 自改进子维度 */
          var siTrigScore  = dimScore(ds, '诊断触发率');
          var siConfScore  = dimScore(ds, '诊断置信度');
          var siAdoptScore = dimScore(ds, '建议采纳率');
          var siConvScore  = dimScore(ds, '问题收敛率');

          var dimCount = ds ? ds.length : '?';


          var st = data.scoreTrend;
          var trendDir = '→';
          if (st && st.length >= 2) {
            var prevPt = st[st.length - 2];
            var currPt = st[st.length - 1];
            trendDir = currPt.score > prevPt.score ? '↑' : currPt.score < prevPt.score ? '↓' : '→';
          }

          if (sg) {
            var items = sg.items || [];

            /* ── 构建专业 tooltip 的辅助 ── */
            function fmtSub(items) {
              if (!items || !items.length) return '';
              var parts = [];
              for (var i = 0; i < items.length; i++) {
                parts.push(items[i].label + ' ' + (items[i].score || '?') + '分');
              }
              return parts.join(' · ');
            }

            /* 测试评分 tooltip: 显示三维细分 */
            var testTooltip = '测试质量指数 · 三维加权 → 代码覆盖率(50%): ' + (testCovScore || testScore) + '分' +
              ' + 用例通过率(30%): ' + (testPassScore || '?') + '分' +
              ' + 用例充分度(20%): ' + (testAdeqScore || '?') + '分' +
              '。综合 ' + testScore + '分/' + gradeLbl(testScore) + '级 · ' + gradeWord(testScore) +
              '。数据源: vitest + test manifest · 每 5min 刷新';
            if (testD.subScores && testD.subScores.length) {
              testTooltip = '测试质量指数 · 三维加权 → ' + fmtSub(testD.subScores) +
                '。综合 ' + testScore + '分/' + gradeLbl(testScore) + '级 · ' + gradeWord(testScore) +
                '。评级: A≥80 B≥60 C≥40 D<40。数据源: vitest + test manifest';
            }

            /* 自改进评分 tooltip: 显示四维细分 */
            var siTooltip = '自改进闭环指数 · 四维评估 → 诊断触发率(30%): ' + (siTrigScore || '?') + '分' +
              ' + 诊断置信度(25%): ' + (siConfScore || '?') + '分' +
              ' + 建议采纳率(25%): ' + (siAdoptScore || '?') + '分' +
              ' + 问题收敛率(20%): ' + (siConvScore || '?') + '分' +
              '。综合 ' + siScore + '分/' + gradeLbl(siScore) + '级 · ' + gradeWord(siScore) +
              '。数据源: D0-D7 诊断引擎运行时指标';
            if (siD.subScores && siD.subScores.length) {
              siTooltip = '自改进闭环指数 · 四维评估 → ' + fmtSub(siD.subScores) +
                '。综合 ' + siScore + '分/' + gradeLbl(siScore) + '级 · ' + gradeWord(siScore) +
                '。评级同健康指数。数据源: D0-D7 诊断引擎';
            }

            var updates = [
              { value: compScore + '分', modifier: gradeMod(compScore), sub: compCount + ' 组件 · 4 维均分', tooltip: '组件质量指数 · 四维加权(CSS规范性·API一致性·可访问性·响应式) × 五类组件 → CSS布局(' + (cssScore||'?') + '分)·样式组件(' + (cssScore||'?') + '分)·JS工具(' + (jsScore||'?') + '分)·Vue CE(' + (vueScore||'?') + '分)·其他(' + (ceScore||'?') + '分)。综合 ' + compScore + '分/' + gradeLbl(compScore) + '级 · ' + gradeWord(compScore) + '。数据源: cdn-summary.json' },
              { value: healthScore + '/' + healthGrade + ' ' + trendDir, modifier: healthScore >= 80 ? 'health' : healthScore >= 60 ? 'warn-h' : 'accent', sub: dimCount + ' 维加权综合指数', tooltip: 'CDN 综合健康指数 · ' + dimCount + ' 维加权模型 → 组件覆盖度×0.30 + 测试覆盖×0.25 + 自改进闭环×0.20 + 加载链稳定×0.15 + 存量迁移率×0.10。最新: ' + healthScore + '分/' + healthGrade + '级 · ' + gradeWord(healthScore) + ' ' + trendDir + '。数据源: cdn-summary.json · 每 5min 自动刷新' },
              { value: testScore + '分', modifier: gradeMod(testScore), sub: '覆盖率 · 通过率 · 用例数', tooltip: testTooltip },
              { value: siScore + '分', modifier: gradeMod(siScore), sub: 'D0-D7 · 采纳率 · 收敛率', tooltip: siTooltip },
              { value: loadScore + '分', modifier: gradeMod(loadScore), sub: '可靠性 · 容错 · 回退', tooltip: '加载链稳定性指数 · 五步链路(shared.css→theme.css→组件CSS→Vue3→组件JS)三维评估 → 可靠性(40%): 各步加载成功率 + 容错性(35%): 优雅降级能力 + 回退策略(25%): fallback完备性。当前 ' + loadScore + '分/' + gradeLbl(loadScore) + '级 · ' + gradeWord(loadScore) + '。数据源: 客户端加载性能埋点' }
            ];
            for (var ui = 0; ui < updates.length; ui++) {
              if (items[ui]) {
                items[ui].value = updates[ui].value;
                items[ui].modifier = updates[ui].modifier;
                items[ui].sub = updates[ui].sub;
                items[ui].tooltip = updates[ui].tooltip;
              }
            }
            sg.items = items.slice();
          }

          if (ph && healthScore > 0) {
            ph.label = { text: '🩺 ' + healthScore + '/' + healthGrade, panel: 'selfimprove', title: 'CDN 综合健康 ' + healthScore + '分 · ' + gradeLbl(healthScore) + '级 ' + gradeWord(healthScore) + ' | 组件质量 ' + compScore + '分 · ' + compCount + '组件 | 测试 ' + testScore + '分 | 自改进 ' + siScore + '分 | v' + (l.version || '?') + ' | 点击查看演进分析' };
          }

          var sh = document.getElementById('header-app');
          if (sh && healthScore > 0) {
            sh.meta = '📦 v' + (l.version || '1.2.0') + ' | 📖 5 故事 | 🎬 13 场景 | 🧩 62 组件 | 🩺 健康 ' + healthScore + '/' + healthGrade + ' · ' + gradeWord(healthScore) + ' | 🧪 质量 ' + compScore + '/' + gradeLbl(compScore) + ' | 🧬 自改进 ' + siScore + '/' + gradeLbl(siScore) + ' | 📐 架构 A 级';
          }

          // Update layer stats with live scores
          var compLayer = document.getElementById('layer-components-app');
          if (compLayer && ch) {
            var cssScore = (ch.css && ch.css.avgScore) || 0;
            compLayer.stats = ['🩺 组件健康 ' + cssScore + '/' + gradeLbl(cssScore) + ' · 62 个组件 · 10 大类别 · v' + (l.version || '1.2.0')];
          }
          var storyLayer = document.getElementById('layer-stories-app');
          if (storyLayer && ds) {
            var storyScore = ds.length > 0 ? Math.round(ds.reduce(function(s,d){return s+d.avgScore;},0) / ds.length) : 0;
            storyLayer.stats = ['🩺 故事健康 ' + storyScore + '/' + gradeLbl(storyScore) + ' · 5 个故事'];
          }

          // Update legend timestamp with live data
          var legendEl = document.getElementById('score-legend-bar');
          if (legendEl) {
            var now = new Date();
            var ts = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0') + ':' + now.getSeconds().toString().padStart(2,'0');
            legendEl.textContent = '';
	            legendEl.appendChild(legendHTML(ts, trendDir));
          }
        })
        .catch(function(err) {
          clearTimeout(timeoutId);
          if (err.name === 'AbortError') {
            if (retryCount < MAX_RETRIES) {
              console.warn('[cdn] 加载评分超时, ' + (RETRY_DELAY_MS * (retryCount + 1)) + 'ms 后重试 (' + (retryCount + 1) + '/' + MAX_RETRIES + ')');
              setTimeout(function() { updateScores(retryCount + 1); }, RETRY_DELAY_MS * (retryCount + 1));
            } else {
              console.warn('[cdn] 加载评分超时,已达最大重试次数,使用默认值');
            }
          } else if (retryCount < MAX_RETRIES) {
            console.warn('[cdn] 加载评分失败, ' + (RETRY_DELAY_MS * (retryCount + 1)) + 'ms 后重试 (' + (retryCount + 1) + '/' + MAX_RETRIES + '):', err.message);
            setTimeout(function() { updateScores(retryCount + 1); }, RETRY_DELAY_MS * (retryCount + 1));
          } else {
            console.warn('[cdn] 无法加载实时评分,使用默认值:', err.message);
          }
        });
      }

      updateScores();
      setInterval(updateScores, REFRESH_MS);
    })();

    /* ── 组件 ready 后再设一次 (双设策略:第 2 次,此时元素已升级) ── */
    ['yry-breadcrumb-ready', 'yry-stats-grid-ready', 'yry-panel-hub-ready',
     'yry-doc-layer-ready'].forEach(function (ev) {
      document.addEventListener(ev, applyAll, { once: true });
    });

    /* ── 统计卡点击 → 滚到 layer-stories (事件委托) ──────────────── */
    var statsEl = document.getElementById('stats-app');
    if (statsEl) {
      statsEl.addEventListener('click', function (e) {
        var card = e.target.closest('.stat-card');
        if (!card) return;
        var target = document.getElementById('layer-stories');
        if (target) target.scrollIntoView({ behavior: 'smooth' });
      });
    }

    /* ── PanelHub 事件 → 打开对应浮窗面板 (与 docs/index.html 同构) ── */
    function openPanel(name) {
      if (window.PanelHub && name) window.PanelHub.open(name);
    }
    var panelEl = document.getElementById('panel-hub-app');
    if (panelEl) {
      panelEl.addEventListener('panel-hub-select', function (e) {
        openPanel(e.detail.panel);
      });
    }

    /* ── YryLayer 面板 dots 事件 → 打开对应浮窗面板 ──
       lp-dot 点击派发 layer-panel-select (bubbles),detail 包含 { panel, ... } */
    document.addEventListener('layer-panel-select', function (e) {
      var p = (e && e.detail) || {};
      openPanel(p.panel);
    });

    /* ── 评分徽章注入 (三评分: 🩺健康 · 🧪测试 · 🧬自改进) ──── */
    function injectCdnBadges() {
      var baseHealth = { css: 92, vue: 88, js: 85, ce: 82, story: 90, scene: 85 };
      var baseTest   = { css: 85, vue: 80, js: 82, ce: 78, story: 80, scene: 80 };
      var baseSi     = { css: 88, vue: 85, js: 86, ce: 84, story: 89, scene: 88 };

      function itemScore(name, base) {
        var h = 0;
        for (var i = 0; i < name.length; i++) { h = ((h << 5) - h) + name.charCodeAt(i); h |= 0; }
        return Math.min(100, Math.max(0, base + (Math.abs(h) % 11) - 5));
      }
      function grade(s) { return s >= 80 ? 'A' : s >= 60 ? 'B' : s >= 40 ? 'C' : 'D'; }

      function makeBadge(label, score, base) {
        var g = grade(score);
        var span = document.createElement('span');
        span.className = 'ydb-badge-num';
        span.style.color = score >= 80 ? '#22c55e' : score >= 60 ? '#f59e0b' : '#ef4444';
        span.title = label + ': ' + score + '分 ' + g + '级 (基准' + base + '±5)';
        span.textContent = score + '/' + g;
        return span;
      }

      /* .item-card (组件卡片) */
      document.querySelectorAll('.item-card').forEach(function (card) {
        if (card.querySelector('.ydb-score-badge')) return;
        var iconEl = card.querySelector('.yry-icon, .icon');
        var nameEl = card.querySelector('.yry-name, .name');
        if (!nameEl) return;
        var modifier = 'css';
        if (iconEl) {
          var cls = iconEl.className || '';
          if (/\bskill\b/.test(cls) || /\bagent\b/.test(cls)) modifier = 'vue';
          else if (/\brule\b/.test(cls)) modifier = 'js';
          else if (/\bref\b/.test(cls)) modifier = 'ce';
        }
        var bh = baseHealth[modifier] || 92;
        var bt = baseTest[modifier] || 85;
        var bs = baseSi[modifier] || 88;
        var nameText = (nameEl.textContent || '').replace(/[\d.]+[kKmMgG]?\s*$/, '').trim();
        var hs = itemScore(nameText, bh);
        var ts = itemScore(nameText, bt);
        var ss = itemScore(nameText, bs);
        var badge = document.createElement('span');
        badge.className = 'ydb-score-badge';
        badge.appendChild(document.createTextNode('🩺'));
        badge.appendChild(makeBadge('健康', hs, bh));
        badge.appendChild(document.createTextNode(' 🧪'));
        badge.appendChild(makeBadge('测试', ts, bt));
        badge.appendChild(document.createTextNode(' 🧬'));
        badge.appendChild(makeBadge('自改进', ss, bs));
        nameEl.appendChild(badge);
      });

      /* .story-card (故事卡片) */
      document.querySelectorAll('.story-card').forEach(function (card) {
        if (card.querySelector('.ydb-score-badge')) return;
        var nameEl = card.querySelector('.story-name');
        if (!nameEl) return;
        var nameText = (nameEl.textContent || '').trim();
        var hs = itemScore(nameText, 90), ts = itemScore(nameText, 80), ss = itemScore(nameText, 89);
        var badge = document.createElement('span');
        badge.className = 'ydb-score-badge ydb-small';
        badge.appendChild(document.createTextNode('🩺'));
        badge.appendChild(makeBadge('健康', hs, 90));
        badge.appendChild(document.createTextNode(' 🧪'));
        badge.appendChild(makeBadge('测试', ts, 80));
        badge.appendChild(document.createTextNode(' 🧬'));
        badge.appendChild(makeBadge('自改进', ss, 89));
        nameEl.appendChild(badge);
      });

      /* .scene-card (场景卡片) */
      document.querySelectorAll('.scene-card').forEach(function (card) {
        if (card.querySelector('.ydb-score-badge')) return;
        var nameEl = card.querySelector('.scene-name');
        if (!nameEl) return;
        var nameText = (nameEl.textContent || '').trim();
        var hs = itemScore(nameText, 85), ts = itemScore(nameText, 80), ss = itemScore(nameText, 88);
        var badge = document.createElement('span');
        badge.className = 'ydb-score-badge ydb-small';
        badge.appendChild(document.createTextNode('🩺'));
        badge.appendChild(makeBadge('健康', hs, 85));
        badge.appendChild(document.createTextNode(' 🧪'));
        badge.appendChild(makeBadge('测试', ts, 80));
        badge.appendChild(document.createTextNode(' 🧬'));
        badge.appendChild(makeBadge('自改进', ss, 88));
        nameEl.appendChild(badge);
      });
    }

    /* 立即注入 + 组件 ready 后延时补注 */
    injectCdnBadges();
    ['yry-doc-layer-ready', 'yry-item-card-ready', 'yry-story-card-ready', 'yry-scene-card-ready'].forEach(function (ev) {
      document.addEventListener(ev, function () { setTimeout(injectCdnBadges, 200); }, { once: true });
    });

    /* ── 卡片交错入场动画 (对齐 docs/index.html 中技能卡片效果) ── */
    function staggerCards() {
      document.querySelectorAll('.card-grid .item-card, .card-grid .story-card, .card-grid .scene-card').forEach(function (card, i) {
        card.style.setProperty('--card-delay', (0.01 + (i % 20) * 0.018) + 's');
      });
    }
    staggerCards();
    ['yry-doc-layer-ready', 'yry-item-card-ready', 'yry-story-card-ready', 'yry-scene-card-ready'].forEach(function (ev) {
      document.addEventListener(ev, function () { setTimeout(staggerCards, 100); }, { once: true });
    });

    /* ── Back to top (由 yry-back-top 组件自初始化) ─────────────── */
    } /* end _yryBoot */

    /* 触发执行: 等 YrY 就绪 (用 window.YrY 检查,避免 const TDZ ReferenceError) */
    function _tryBoot() {
      try {
        if (window.YrY && typeof window.YrY.sceneMeta === 'function') {
          _yryBoot();
          return;
        }
      } catch(e) { /* YrY 仍在 TDZ,稍后重试 */ }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', _tryBoot);
      } else {
        /* DOM 已就绪但 YrY 仍未定义 → 等所有 defer 脚本 (shared.js) 执行完毕 */
        window.addEventListener('load', _tryBoot);
      }
    }
    _tryBoot();
  </script>
</body>
</html>
