<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/yry-cdn-lib@1.1.0/theme.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/yry-cdn-lib@1.1.0/shared.css">
  <title>YrY CDN — 故事与场景</title>
  <meta name="description" content="YrY CDN 共享前端资源库 — 2 故事 10 场景">
  <link rel="stylesheet" href="yry-home.css">
  <link rel="stylesheet" href="yry-inline-helpers.css">
  <!-- ═══ 组件样式 (在 yry-home.css 之后加载,确保组件样式优先) ═══ -->
  <link rel="stylesheet" href="yry-breadcrumb/index.css">
  <link rel="stylesheet" href="yry-stats-grid/index.css">
  <link rel="stylesheet" href="yry-panel-hub/index.css">
  <link rel="stylesheet" href="yry-layer/index.css">
  <link rel="stylesheet" href="yry-sub-title/index.css">
  <link rel="stylesheet" href="yry-card-grid/index.css">
  <link rel="stylesheet" href="yry-item-card/index.css">
  <link rel="stylesheet" href="yry-tag-chip/index.css">
  <link rel="stylesheet" href="yry-story-card/index.css">
  <link rel="stylesheet" href="yry-scene-card/index.css">
  <link rel="stylesheet" href="yry-doc-layer/index.css">
  <!-- ═══ 工具组件 (vanilla JS, 无 Vue 依赖) ═══ -->
  <link rel="stylesheet" href="yry-export-toolbar/index.css">
  <link rel="stylesheet" href="yry-cytoscape-graph/index.css">
  <!-- Vue 3 (Yry* 自定义元素的运行时依赖) -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
  <div class="container">
    <!-- ── Breadcrumb (YryBreadcrumb) ── -->
    <yry-breadcrumb id="breadcrumb-app"></yry-breadcrumb>

    <div class="header">
      <h1><span class="accent">&#127760;</span> YrY CDN 共享前端资源库</h1>
      <p>yry-cdn-lib v1.1.0 — 以「2 故事 10 场景」形式管理 CDN 资源库的架构决策与演进</p>
    </div>

    <!-- ── Stats (YryStatsGrid) ── -->
    <yry-stats-grid id="stats-app"></yry-stats-grid>

    <!-- ── Cross-Nav (YryPanelHub) ── -->
    <yry-panel-hub id="panel-hub-app"></yry-panel-hub>

    <!-- ═══ Layer: 故事与场景 (YryDocLayer · 内含 2 sub-section: 故事 + 场景) ═══ -->
    <yry-doc-layer id="layer-stories-app"></yry-doc-layer>

    <div class="footer-note">yry-cdn-lib v1.1.0</div>
  </div>

  <button type="button" class="back-top yry-back-top" id="backTop" title="回到顶部" aria-label="回到顶部">&uarr;</button>

  <script src="https://cdn.jsdelivr.net/npm/yry-cdn-lib@1.1.0/shared.js" defer></script>

  <!-- ═══ 组件加载器 (按依赖顺序: tag-chip → item-card → card-grid → ...) ═══ -->
  <script src="yry-tag-chip/index.js"></script>
  <script src="yry-item-card/index.js"></script>
  <script src="yry-card-grid/index.js"></script>
  <script src="yry-breadcrumb/index.js"></script>
  <script src="yry-stats-grid/index.js"></script>
  <script src="yry-panel-hub/index.js"></script>
  <script src="yry-sub-title/index.js"></script>
  <script src="yry-layer/index.js"></script>
  <script src="yry-story-card/index.js"></script>
  <script src="yry-scene-card/index.js"></script>
  <script src="yry-doc-layer/index.js"></script>
  <!-- ═══ 工具组件 (vanilla JS) ═══ -->
  <script src="yry-export-toolbar/index.js"></script>

  <script>
    /* ═══ 概述 ═══
       与 docs/index.html 一致:所有 yry-* 挂载点都用自定义元素形式,
       通过属性(property)赋值注入数据,配合 "双设" 策略:
         1) 内联脚本立即赋值 (覆盖元素先于组件定义出现的场景)
         2) 监听 *-ready 事件,组件定义完成后再赋一次 (覆盖组件晚于元素出现的场景)
    */

    /* ── 场景标准交付物链接生成器 (7 件套,sceneMeta 与 docs-data.js 同构) ── */
    function sceneMeta(basePath) {
      return [
        { icon: '📋', label: '清单', href: basePath + '/计划清单.html' },
        { icon: '📐', label: '架构', href: basePath + '/架构图.html' },
        { icon: '🔗', label: '图谱', href: basePath + '/知识图谱.html' },
        { icon: '🧪', label: '测试', href: basePath + '/测试面板.html' },
        { icon: '📄', label: '源码', href: basePath + '/源码.html' },
        { icon: '💡', label: '演示', href: basePath + '/演示.html' },
        { icon: '📝', label: '审查', href: basePath + '/审查.html' }
      ];
    }

    /* ── 数据容器 ────────────────────────────────────────────── */
    var CDN_DATA = {
      /* Breadcrumb */
      breadcrumb: { items: [{ label: 'CDN 共享库', icon: '📋' }] },

      /* Stats Grid */
      stats: { items: [
        { value: 2,  label: '故事', modifier: 'health' },
        { value: 10, label: '场景', modifier: 'health' }
      ] },

      /* Panel Hub (跨页导航) */
      panelHub: {
        label: { text: '🌐 —', panel: 'docs', title: '点击打开文档中心' },
        buttons: [
          { icon: '📑', name: '文档',     desc: 'docs',       panel: 'docs',       color: 'var(--yry-cyan, #22d3ee)' },
          { icon: '📐', name: '面包屑',   desc: 'breadcrumb', panel: 'breadcrumb', color: '#a78bfa' },
          { icon: '🌐', name: 'jsDelivr', desc: 'cdn',        panel: 'jsdelivr',   color: '#22c55e' },
          { icon: '📦', name: 'npm',      desc: 'package',    panel: 'npm',        color: '#ef4444' },
          { icon: '📋', name: '任务',     desc: 'story',      panel: 'cdnstory',   color: '#ffc107' },
          { icon: '🕸', name: '图谱',     desc: 'graph',      panel: 'knowledge',  color: '#f472b6' }
        ],
        flow: 'CDN 库 → 文档 · 演示 · npm · jsDelivr · 任务 · 图谱',
        urls: {
          docs:       '../docs/index.html',
          breadcrumb: 'yry-breadcrumb/index.html',
          jsdelivr:   'https://www.jsdelivr.com/package/npm/yry-cdn-lib',
          npm:        'https://www.npmjs.com/package/yry-cdn-lib',
          cdnstory:   '../docs/故事任务面板/cdn/故事任务.md',
          knowledge:  '../docs/故事任务面板/cdn/知识图谱.html'
        }
      },

      /* Layer: 故事与场景 (YryDocLayer · 与 docs/index.html 的 4 个 doc-layer 同构) */
      docLayer: {
        layerId:     'layer-stories',
        num:         '1',
        titleIcon:   '📖',
        titlePrefix: '',
        titleAccent: '故事与场景',
        titleSuffix: '',
        stats:       ['2 故事 · 10 场景', '8 交付物/场景 · 80+ 文件'],
        panels:      [],
        sections:    [
          /* Section 1 — 故事 (YryStoryCard) */
          {
            subTitle: { icon: '📖', text: '故事', count: '2 个' },
            grid: 'story',
            items: [
              {
                icon: '🌐', name: 'CDN 共享前端资源库',
                nameHref: '故事任务面板/cdn/故事任务.md', nameTarget: '_blank',
                badge: 'v1.1.0',
                desc: 'YrY 共享前端资源 — 双主题系统 (Mono + System)、22 CSS 组件、9 JS 工具 API。55+ 页面统一引用,消除内联重复代码 40-60%。<a href="../docs/index.html#layer-scene">详情 → 文档中心 Layer 4</a>',
                scenes: [
                  'CDN 资源加载与页面渲染',
                  '双主题系统设计',
                  '组件库与 JS 工具 API',
                  '存量页面迁移',
                  'npm 包发布与版本管理'
                ]
              },
              {
                icon: '📐', name: 'YryBreadcrumb 组件',
                nameHref: '故事任务面板/yry-breadcrumb/README.md', nameTarget: '_blank',
                badge: 'v1.0.0',
                desc: 'YryBreadcrumb 组件的独立故事 — 跟踪 5 个组件演化场景,从需求到发布的全生命周期。',
                scenes: [
                  '需求与设计',
                  '模板与样式',
                  'Loader 实现',
                  '页面集成',
                  '测试与发布'
                ]
              }
            ]
          },
          /* Section 2 — 场景 (YrySceneCard · 每张卡 7 个标准交付物链接) */
          {
            subTitle: { icon: '🎬', text: '场景', count: '10 个' },
            grid: 'scene',
            items: [
              /* 主故事 A · CDN 共享库 — 场景 1-5 */
              { num: '场景 1', name: 'CDN 资源加载与页面渲染',
                nameHref: '故事任务面板/cdn/场景-1-cdn资源加载与页面渲染/index.md', nameTarget: '_blank',
                desc: 'jsDelivr URL 规范 · 加载顺序约束 · 字体/动画延迟 · shared.css 必备基线',
                meta: sceneMeta('故事任务面板/cdn/场景-1-cdn资源加载与页面渲染') },
              { num: '场景 2', name: '双主题系统设计',
                nameHref: '故事任务面板/cdn/场景-2-双主题系统设计/index.md', nameTarget: '_blank',
                desc: 'Category A (Mono) vs Category B (System) 选型 · 14 设计令牌 · CSS 变量分层',
                meta: sceneMeta('故事任务面板/cdn/场景-2-双主题系统设计') },
              { num: '场景 3', name: '组件库与 JS 工具 API',
                nameHref: '故事任务面板/cdn/场景-3-组件库与JS工具API/index.md', nameTarget: '_blank',
                desc: '22 CSS 组件类名约定 · 9 个 YrY.* 工具函数 · 命名空间与语义化',
                meta: sceneMeta('故事任务面板/cdn/场景-3-组件库与JS工具API') },
              { num: '场景 4', name: '存量页面迁移',
                nameHref: '故事任务面板/cdn/场景-4-存量页面迁移/index.md', nameTarget: '_blank',
                desc: '删除内联样式 → 替换 .yry-* 类名 · 保留页面专属 CSS · 6 步迁移清单',
                meta: sceneMeta('故事任务面板/cdn/场景-4-存量页面迁移') },
              { num: '场景 5', name: 'npm 包发布与版本管理',
                nameHref: '故事任务面板/cdn/场景-5-npm包发布与版本管理/index.md', nameTarget: '_blank',
                desc: 'package.json 字段 · files 白名单 · jsDelivr 同步 · 版本号策略',
                meta: sceneMeta('故事任务面板/cdn/场景-5-npm包发布与版本管理') },
              /* 组件子故事 B · YryBreadcrumb — 场景 1-5 */
              { num: '场景 1', name: '需求与设计',
                nameHref: '故事任务面板/yry-breadcrumb/场景-1-需求与设计/index.md', nameTarget: '_blank',
                desc: '5 项设计决策 · Props 草案 · a11y 完备性约束',
                meta: sceneMeta('故事任务面板/yry-breadcrumb/场景-1-需求与设计') },
              { num: '场景 2', name: '模板与样式',
                nameHref: '故事任务面板/yry-breadcrumb/场景-2-模板与样式/index.md', nameTarget: '_blank',
                desc: 'Vue template + CSS 设计令牌 · 3 个 Demo 示例',
                meta: sceneMeta('故事任务面板/yry-breadcrumb/场景-2-模板与样式') },
              { num: '场景 3', name: 'Loader 实现',
                nameHref: '故事任务面板/yry-breadcrumb/场景-3-Loader实现/index.md', nameTarget: '_blank',
                desc: 'fetch + DOMParser + ready 事件 + 5s 超时容错',
                meta: sceneMeta('故事任务面板/yry-breadcrumb/场景-3-Loader实现') },
              { num: '场景 4', name: '页面集成',
                nameHref: '故事任务面板/yry-breadcrumb/场景-4-页面集成/index.md', nameTarget: '_blank',
                desc: '4 文件引用顺序 · 4 种 items 模式 · 异步挂载',
                meta: sceneMeta('故事任务面板/yry-breadcrumb/场景-4-页面集成') },
              { num: '场景 5', name: '测试与发布',
                nameHref: '故事任务面板/yry-breadcrumb/场景-5-测试与发布/index.md', nameTarget: '_blank',
                desc: '7 项自测 · npm 集成 · jsDelivr 同步验证',
                meta: sceneMeta('故事任务面板/yry-breadcrumb/场景-5-测试与发布') }
            ]
          }
        ]
      }
    };

    /* ── 立即设置 (双设策略:第 1 次,元素已在 DOM,组件可能尚未定义) ── */
    function applyAll() {
      var bc = document.getElementById('breadcrumb-app');
      if (bc) bc.items = CDN_DATA.breadcrumb.items;

      var sg = document.getElementById('stats-app');
      if (sg) sg.items = CDN_DATA.stats.items;

      var ph = document.getElementById('panel-hub-app');
      if (ph) {
        ph.label   = CDN_DATA.panelHub.label;
        ph.buttons = CDN_DATA.panelHub.buttons;
        ph.flow    = CDN_DATA.panelHub.flow;
      }

      /* YryDocLayer · 与 docs/index.html 4 个 doc-layer 同构:layerId / num / titleIcon /
         titlePrefix / titleAccent / titleSuffix / stats / panels / sections */
      var doc = document.getElementById('layer-stories-app');
      if (doc) {
        var L = CDN_DATA.docLayer;
        doc.layerId     = L.layerId;
        doc.num         = L.num;
        doc.titleIcon   = L.titleIcon;
        doc.titlePrefix = L.titlePrefix;
        doc.titleAccent = L.titleAccent;
        doc.titleSuffix = L.titleSuffix;
        doc.stats       = L.stats;
        doc.panels      = L.panels;
        doc.sections    = L.sections;
      }
    }
    applyAll();

    /* ── 组件 ready 后再设一次 (双设策略:第 2 次,此时元素已升级) ── */
    ['yry-breadcrumb-ready', 'yry-stats-grid-ready', 'yry-panel-hub-ready',
     'yry-doc-layer-ready'].forEach(function (ev) {
      document.addEventListener(ev, applyAll, { once: true });
    });

    /* ── 统计卡点击 → 滚到 layer-stories (事件委托) ──────────────── */
    var statsEl = document.getElementById('stats-app');
    if (statsEl) {
      statsEl.addEventListener('click', function (e) {
        var card = e.target.closest('.stat-card');
        if (!card) return;
        var target = document.getElementById('layer-stories');
        if (target) target.scrollIntoView({ behavior: 'smooth' });
      });
    }

    /* ── PanelHub 事件 → URL 跳转 (一次性绑定,事件冒泡到自定义元素根) ── */
    var panelEl = document.getElementById('panel-hub-app');
    if (panelEl) {
      panelEl.addEventListener('panel-hub-select', function (e) {
        var url = CDN_DATA.panelHub.urls[e.detail.panel];
        if (!url) return;
        if (/^https?:/i.test(url)) window.open(url, '_blank', 'noopener,noreferrer');
        else window.location.href = url;
      });
    }

    /* ── Back to top (保留原逻辑) ───────────────────────────────── */
    {
      var btn = document.getElementById('backTop');
      if (btn) {
        var toggle = function () { btn.classList.toggle('visible', window.scrollY > 400); };
        window.addEventListener('scroll', toggle, { passive: true });
        btn.addEventListener('click', function () { window.scrollTo({ top: 0, behavior: 'smooth' }); });
        toggle();
      }
    }
  </script>
</body>
</html>
