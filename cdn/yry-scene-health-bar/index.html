<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YrySceneHealthBar · Demo & Template</title>
<link rel="stylesheet" href="../shared\/index\.css">
<link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="demo.css">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
<h1>YrySceneHealthBar</h1>
<p class="demo-hint">场景健康进度条 — Vue 3 prop: <code>segments</code> (JSON 数组)</p>

<div class="demo-section"><div id="demo-1"></div></div>
<div class="demo-section"><div id="demo-2"></div></div>

<script type="text/x-template" id="yry-scene-health-bar-tpl">
  <div class="hb-wrap">
    <div class="hb-outer">
      <div v-for="(seg, i) in parsedSegments" :key="i" :class="'hb-seg ' + seg.cls" :style="{ width: seg.pct + '%' }"></div>
    </div>
  </div>
</script>

<script src="index.js"></script>
<script>
function mountAll() {
  if (!window.YrySceneHealthBar) return;
  Vue.createApp(window.YrySceneHealthBar, {
    segments: '[{"pct":75,"cls":"strength"},{"pct":25,"cls":"gap"}]'
  }).mount('#demo-1');
  Vue.createApp(window.YrySceneHealthBar, {
    segments: '[{"pct":40,"cls":"p"},{"pct":35,"cls":"f"},{"pct":25,"cls":"s"}]'
  }).mount('#demo-2');
}
if (window.YrySceneHealthBar) mountAll();
else document.addEventListener('yry-scene-health-bar-ready', mountAll, { once: true });
</script>
</body>
</html>
