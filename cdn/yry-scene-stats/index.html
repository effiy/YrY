   三文件: index.html (模板+Demo) · index.js (逻辑) · index.css (样式)

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YrySceneStats · Demo & Template</title>
<link rel="stylesheet" href="../shared\/index\.css">
<link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="demo.css">
<script src="../shared/vue.global.prod.js"></script>
</head>
<body>
<h1>YrySceneStats</h1>
<p class="demo-hint">场景统计卡组 — Vue 3 prop: <code>items</code> (JSON 数组)</p>

<div class="demo-section"><div id="demo-1"></div></div>

<script type="text/x-template" id="yry-scene-stats-tpl">
  <div v-for="(item, i) in parsedItems" :key="i" class="ss-stat">
    <div :class="'ss-val ' + (item.color || 't')">{{ item.value }}</div>
    <div class="ss-lbl">{{ item.label }}</div>
  </div>
</script>

<script src="index.js"></script>
<script>
function mountAll() {
  if (!window.YrySceneStats) return;
  Vue.createApp(window.YrySceneStats, {
    items: '[{"value":"5","label":"总断言","color":"t"},{"value":"3","label":"通过","color":"p"},{"value":"1","label":"失败","color":"f"},{"value":"1","label":"跳过","color":"s"}]'
  }).mount('#demo-1');
}
if (window.YrySceneStats) mountAll();
else document.addEventListener('yry-scene-stats-ready', mountAll, { once: true });
</script>
</body>
</html>
