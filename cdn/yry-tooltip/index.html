<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YryTooltip · Demo & Template</title>
  <link rel="stylesheet" href="../shared\/index\.css">
  <link rel="stylesheet" href="../theme\/index\.css">
  <link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="../yry-inline-helpers/index.css">
<link rel="stylesheet" href="demo.css">
</head>
<body>
  <h1><span class="accent">💬</span> YryTooltip · 悬停提示组件</h1>
  <p class="demo-hint">
    自定义元素 <code>&lt;yry-tooltip&gt;</code> — 悬停/聚焦显示提示文本。
    通过 <code>position</code> 属性控制方向（top/bottom/left/right），<code>text</code> 属性设置内容。
    也支持 Light DOM 作为复杂提示内容。适用于图标说明、缩写解释、快捷提示。
  </p>

  <div class="demo-section">
    <h3>悬停下方元素查看提示</h3>

    <yry-tooltip text="运行全量架构合规检查" position="top">
      <span class="demo-target">📐 Top</span>
    </yry-tooltip>

    <yry-tooltip text="生成健康报告并推送通知" position="bottom">
      <span class="demo-target">🩺 Bottom</span>
    </yry-tooltip>

    <yry-tooltip text="查看组件使用文档" position="left">
      <span class="demo-target">📖 Left</span>
    </yry-tooltip>

    <yry-tooltip text="复制到剪贴板" position="right">
      <span class="demo-target">📋 Right</span>
    </yry-tooltip>

    <yry-tooltip position="bottom">
      <span class="demo-target">🛠 Rich</span>
      <div slot="content" class="yry-cd-35">
        <strong class="yry-cd-36">高级用法</strong><br>
        支持 <code class="yry-cd-38">富文本</code> 内容
      </div>
    </yry-tooltip>
  </div>

  <script src="index.js"></script>
  <div class="demo-footer">💬 YryTooltip v1.0.0 · <a href="../index.html">CDN 首页</a></div>
</body>
</html>
