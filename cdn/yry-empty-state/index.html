<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YryEmptyState · Demo & Template</title>
  <link rel="stylesheet" href="../shared\/index\.css">
  <link rel="stylesheet" href="../theme\/index\.css">
  <link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="demo.css">
</head>
<body>
  <h1><span class="accent">📭</span> YryEmptyState · 空状态组件</h1>
  <p class="demo-hint">
    自定义元素 <code>&lt;yry-empty-state&gt;</code> — 无数据/无结果占位。
    支持 <code>icon</code>、<code>title</code>、<code>description</code> 属性和插槽 <code>slot="action"</code> 操作按钮。
    适用于搜索无结果、列表为空、暂无内容等场景。
  </p>

  <div class="demo-section">
    <h3>Demo — 多种空状态</h3>

    <yry-empty-state icon="🔍" title="未找到匹配结果" description="尝试使用其他关键词搜索，或检查筛选条件。">
      <button slot="action" class="demo-btn" onclick="this.closest('yry-empty-state').setAttribute('title','已重置')">清除筛选</button>
    </yry-empty-state>

    <yry-empty-state icon="📋" title="暂无检查项" description="当前场景没有待执行的验证步骤。运行 /rui init 生成初始清单。"></yry-empty-state>

    <yry-empty-state icon="📦" title="组件库为空" description="还没有创建任何可复用组件。"></yry-empty-state>
  </div>

  <script src="index.js"></script>
  <div class="demo-footer">📭 YryEmptyState v1.0.0 · <a href="../index.html">CDN 首页</a></div>
</body>
</html>
