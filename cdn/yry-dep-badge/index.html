<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YryDepBadge · Demo & Template</title>
<link rel="stylesheet" href="../shared\/index\.css">
<link rel="stylesheet" href="../theme\/index\.css">
<link rel="stylesheet" href="index.css">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
  body { background: var(--yry-bg, #0a0a0a); color: var(--yry-text, #f5f5f5); font-family: var(--yry-font-sans); padding: 32px 24px 60px; max-width: 900px; margin: 0 auto; line-height: 1.55; }
  h1 { font-size: 1.25rem; margin: 0 0 4px; }
  h1 .accent { color: var(--yry-accent, #ffc107); }
  .demo-hint { font-size: .78rem; color: var(--yry-text3, #888); margin: 0 0 20px; }
  .demo-hint code { background: rgba(255,255,255,.06); padding: 1px 6px; border-radius: 3px; font-family: monospace; font-size: .72rem; color: #e0af68; }
  hr { border: none; border-top: 1px solid rgba(255,255,255,.08); margin: 28px 0 24px; }
  .row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin: 8px 0; padding: 8px 12px; background: rgba(255,255,255,.02); border-radius: 6px; }
</style>
</head>
<body>

<h1><span class="accent">🔗</span> YryDepBadge · 依赖页跳转徽章</h1>
<p class="demo-hint">依赖页跳转徽章 — 7 种类型颜色,带 → 箭头提示可跳转。Vue 3 组件: <code>href</code> · <code>label</code> · <code>type</code> · <code>target</code></p>

<h3>Demo 1 — 各种类型</h3>
<div class="row" id="r1"></div>

<h3 style="margin-top: 16px">Demo 2 — 完整步骤内用法</h3>
<div class="row" id="r2"></div>

<hr>
<p class="demo-hint">💡 <strong>type 颜色:</strong> <code>doc (cyan)</code> · <code>rule (purple)</code> · <code>test (green)</code> · <code>cmd (yellow)</code> · <code>arc (orange)</code> · <code>skill (lime)</code> · <code>warn (red)</code></p>

<script type="text/x-template" id="yry-dep-badge-tpl">
  <a :href="href" :class="'dep-badge type-' + type" :target="target || undefined">{{ label }}</a>
</script>

<script src="../shared/vue-ce-loader.js"></script>
  <script src="index.js"></script>
<script>
function mountAll() {
  if (!window.YryDepBadge) return;
  var samples = [
    { href: '架构图.html', label: '📐 架构图', type: 'arc' },
    { href: '知识图谱.html', label: '🔗 知识图谱', type: 'doc' },
    { href: '测试面板.html', label: '🧪 测试面板', type: 'test' },
    { href: '审查.html', label: '📝 审查', type: 'doc' },
    { href: '演示.html', label: '💡 演示', type: 'skill' },
    { href: 'risk.html', label: '⚠️ 高风险', type: 'warn' }
  ];
  var r1 = document.getElementById('r1');
  samples.forEach(function (b) {
    var div = document.createElement('div'); r1.appendChild(div);
    Vue.createApp(window.YryDepBadge, b).mount(div);
  });
  var stepSamples = [
    { href: '架构图.html', label: '架构图', type: 'arc' },
    { href: '测试面板.html', label: 'TC-O 路径', type: 'test' },
    { href: 'risk.html', label: '高风险', type: 'warn' }
  ];
  var r2 = document.getElementById('r2');
  stepSamples.forEach(function (b) {
    var div = document.createElement('div'); r2.appendChild(div);
    Vue.createApp(window.YryDepBadge, b).mount(div);
  });
}
if (window.YryDepBadge) mountAll();
else document.addEventListener('yry-dep-badge-ready', mountAll, { once: true });
</script>
</body>
</html>
