<!DOCTYPE html>
<!--
  ═══════════════════════════════════════════════════════════════════════════
  YryLayerInfoPanel · 模板源 + Demo 预览页
  ═══════════════════════════════════════════════════════════════════════════
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YryLayerInfoPanel · Demo & Template</title>
  <link rel="stylesheet" href="../shared.css">
  <link rel="stylesheet" href="../theme.css">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="../yry-inline-helpers.css">
  <style>
    body {
      background: var(--yry-bg, #0a0a0a);
      color: var(--yry-text, #f5f5f5);
      font-family: var(--yry-font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif);
      padding: 32px 24px 60px;
      max-width: 920px; margin: 0 auto;
      line-height: 1.55;
    }
    h1 { font-size: 1.25rem; margin: 0 0 4px; color: var(--yry-text, #f5f5f5); }
    h1 .accent { color: var(--yry-accent, #ffc107); }
    .demo-hint { font-size: .78rem; color: var(--yry-text3, #888); margin: 0 0 20px; line-height: 1.6; }
    .demo-hint code { background: rgba(255,255,255,.06); padding: 1px 6px; border-radius: 3px; font-family: ui-monospace, monospace; font-size: .72rem; color: #e0af68; }
  </style>
</head>
<body>
  <h1><span class="accent">&#128279;</span> YryLayerInfoPanel · 层级详情弹出面板</h1>
  <p class="demo-hint">
    自定义元素 <code>&lt;yry-layer-info-panel&gt;</code> — 加载后注入面板 HTML。<br>
    需配合 <code>layer-info.js</code> 实现完整交互。
  </p>

  <yry-layer-info-panel></yry-layer-info-panel>

  <!-- ════════════════════════════════════════════════════════════════════
       TEMPLATE SOURCE OF TRUTH · YryLayerInfoPanel 的 template (Vue 3 完整模板)
       由 index.js 通过 fetch + DOMParser 解析后注册为自定义元素
       ════════════════════════════════════════════════════════════════════ -->
  <script type="text/x-template" id="yry-layer-info-panel-tpl">
    <div class="layer-info-overlay yry-layer-info-overlay" :class="{ open: openState }" id="layerInfoOverlay" @click.self="onOverlayClick"></div>
    <div class="yry-layer-info-panel layer-info-panel" :class="{ open: openState }" id="layerInfoPanel">
      <div class="panel-header yry-panel-header">
        <span class="panel-title" id="layerInfoTitle" v-html="currentTitle"></span>
        <button @click.stop="close" class="panel-close-btn" title="关闭" aria-label="关闭">✕</button>
      </div>
      <div class="panel-body yry-panel-body" id="layerInfoBody" v-html="currentContent"></div>
    </div>
  </script>

  <script src="index.js"></script>

  <div class="demo-footer" style="margin-top:28px;text-align:center;font-size:.72rem;color:var(--yry-text3,#888)">
    &#128279; YryLayerInfoPanel v1.0.0 · <a href="../index.html" style="color:var(--yry-accent,#ffc107);text-decoration:none">CDN 首页</a>
  </div>

  <script src="../yry-back-top/index.js"></script>
</body>
</html>
