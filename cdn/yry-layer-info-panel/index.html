<!DOCTYPE html>
<!--
  ═══════════════════════════════════════════════════════════════════════════
  YryLayerInfoPanel · 模板源 + Demo 预览页
  ═══════════════════════════════════════════════════════════════════════════
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YryLayerInfoPanel · Demo & Template</title>
  <link rel="stylesheet" href="../shared\/index\.css">
  <link rel="stylesheet" href="../theme\/index\.css">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="../yry\-inline\-helpers\/index\.css">
<link rel="stylesheet" href="../yry-inline-helpers/index.css">
<link rel="stylesheet" href="demo.css">
</head>
<body>
  <h1><span class="accent">&#128279;</span> YryLayerInfoPanel · 层级详情弹出面板</h1>
  <p class="demo-hint">
    自定义元素 <code>&lt;yry-layer-info-panel&gt;</code> — 加载后注入面板 HTML。<br>
    需配合 <code>layer-info.js</code> 实现完整交互。
  </p>

  <yry-layer-info-panel></yry-layer-info-panel>

  <!-- ════════════════════════════════════════════════════════════════════
       TEMPLATE SOURCE OF TRUTH · YryLayerInfoPanel 的 template (Vue 3 完整模板)
       由 index.js 通过 fetch + DOMParser 解析后注册为自定义元素
       ════════════════════════════════════════════════════════════════════ -->
  <script type="text/x-template" id="yry-layer-info-panel-tpl">
    <div class="layer-info-overlay yry-layer-info-overlay" :class="{ open: openState }" id="layerInfoOverlay" @click.self="onOverlayClick"></div>
    <div class="yry-layer-info-panel layer-info-panel" :class="{ open: openState }" id="layerInfoPanel">
      <div class="panel-header yry-panel-header">
        <span class="panel-title" id="layerInfoTitle" v-html="currentTitle"></span>
        <button @click.stop="close" class="panel-close-btn" title="关闭" aria-label="关闭">✕</button>
      </div>
      <div class="panel-body yry-panel-body" id="layerInfoBody" v-html="currentContent"></div>
    </div>
  </script>

  <script src="index.js"></script>

  <div class="demo-footer" yry-cd-5">
    &#128279; YryLayerInfoPanel v1.0.0 · <a href="../index.html" class="yry-cd-20">CDN 首页</a>
  </div>

  <script src="../yry-back-top/index.js"></script>
</body>
</html>
