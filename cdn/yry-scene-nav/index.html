<!DOCTYPE html>
<!--
  ═══════════════════════════════════════════════════════════════════════════
  YrySceneNav · 模板源 + Demo 预览页

  本文件有 2 个用途:
    1) **模板源** — index.js 通过 fetch 拉取本文件,提取 <script type="text/x-template"
       id="yry-scene-nav-tpl"> 内容作为 Vue 组件的 template。
    2) **Demo 预览** — 直接用浏览器打开本文件,即可看到 YrySceneNav 的实际渲染效果。

  加载链: ../shared.css → ../theme.css → index.css → Vue 3 → index.js
  ═══════════════════════════════════════════════════════════════════════════
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YrySceneNav · Demo & Template</title>
  <link rel="stylesheet" href="../shared.css">
  <link rel="stylesheet" href="../theme.css">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="../yry-inline-helpers.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    body {
      background: var(--yry-bg, #0a0a0a);
      color: var(--yry-text, #f5f5f5);
      font-family: var(--yry-font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif);
      padding: 32px 24px 60px;
      max-width: 720px; margin: 0 auto;
      line-height: 1.55;
    }
    h1 { font-size: 1.25rem; margin: 0 0 4px; color: var(--yry-text, #f5f5f5); }
    h1 .accent { color: var(--yry-accent, #ffc107); }
    .demo-hint {
      font-size: .78rem; color: var(--yry-text3, #888); margin: 0 0 20px; line-height: 1.6;
    }
    .demo-hint code {
      background: rgba(255,255,255,.06); padding: 1px 6px; border-radius: 3px;
      font-family: ui-monospace, monospace; font-size: .72rem; color: #e0af68;
    }
    hr {
      border: none; border-top: 1px solid rgba(255,255,255,.08); margin: 28px 0 24px;
    }
    .demo-section {
      margin: 20px 0;
      background: var(--yry-bg-flat, rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px; padding: 20px 22px;
    }
    .demo-section h3 { font-size: .82rem; font-weight: 600; margin: 0 0 12px; color: var(--yry-text2, #d4d4d4); }
    .demo-footer {
      margin-top: 28px; text-align: center; font-size: .72rem; color: var(--yry-text3, #888);
    }
    .demo-footer a { color: var(--yry-accent, #ffc107); text-decoration: none; }
  </style>
</head>
<body>

  <h1><span class="accent">&#128300;</span> YrySceneNav · Vue 3 场景层级导航</h1>
  <p class="demo-hint">
    场景层级的 pill 风格面包屑导航。<br>
    模板源见下方 <code>&lt;script type="text/x-template" id="yry-scene-nav-tpl"&gt;</code> 块。
  </p>

  <div class="demo-section">
    <h3>Demo 1 — 浅层级 (2 级)</h3>
    <div id="demo-1"></div>
  </div>

  <div class="demo-section">
    <h3>Demo 2 — 深层级 (4 级)</h3>
    <div id="demo-2"></div>
  </div>

  <div class="demo-section">
    <h3>Demo 3 — 中间 active + 自定义 class (场景页导航 · 与 scene-2 静态结构一致)</h3>
    <div id="demo-3"></div>
  </div>

  <hr>
  <p class="demo-hint">
    &#128071; 以下 <code>&lt;script type="text/x-template"&gt;</code> 即为组件的 <strong>template 源</strong>
  </p>

  <!-- ════════════════════════════════════════════════════════════════════
       TEMPLATE SOURCE OF TRUTH · YrySceneNav 的 template
       ════════════════════════════════════════════════════════════════════ -->
  <script type="text/x-template" id="yry-scene-nav-tpl">
    <nav class="scene-nav">
      <template v-for="(item, i) in items" :key="i">
        <span v-if="i > 0" class="scene-nav-sep" aria-hidden="true">{{ separator }}</span>
        <a v-if="item.href" :href="item.href" :class="[item.class, item.active ? 'active' : null]" :aria-current="item.active ? 'page' : null">{{ item.label }}</a>
        <span v-else :class="[item.class, 'active']" :aria-current="'page'">{{ item.label }}</span>
      </template>
    </nav>
  </script>

  <script src="index.js"></script>

  <script>
    function mountDemo(id, items, opts) {
      if (!window.Vue || !window.YrySceneNav) return;
      Vue.createApp(window.YrySceneNav, Object.assign({ items: items }, opts || {})).mount('#' + id);
    }
    function mountAll() {
      mountDemo('demo-1', [
        { label: '任务故事', href: '../README.md' },
        { label: '场景 1 · 模板架构' }
      ], { separator: '/' });
      mountDemo('demo-2', [
        { label: 'YryBreadcrumb', href: '../../../index.html', icon: '📄' },
        { label: '任务故事', href: '../README.md' },
        { label: '场景 1 · 需求与设计' },
        { label: '计划清单' }
      ], { separator: '/' });
      mountDemo('demo-3', [
        { label: '场景 1 · 模板架构',     href: '#' },
        { label: '场景 2 · 清单交互',     href: '#', active: true },
        { label: '场景 3 · 验证报告',     href: '#' },
        { label: '场景 4 · 批量生成',     href: '#' },
        { label: '场景说明',              href: '#', class: 'story' }
      ]);
    }
    if (window.YrySceneNav) mountAll();
    else document.addEventListener('yry-scene-nav-ready', mountAll, { once: true });
  </script>

  <div class="demo-footer">
    &#128300; YrySceneNav v1.0.0 · <a href="../index.html">CDN 首页</a>
  </div>
</body>
</html>
