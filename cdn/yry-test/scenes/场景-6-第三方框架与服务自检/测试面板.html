      <h2><span class="yry-dot"></span>§1 测试设计 — 正常路径用例</h2>
      <div class="placeholder">数据待填充 — 运行 /rui code 生成</div>
    </div>
  </div>
  <div data-panel="results">
    <div class="yry-section">
      <h2><span class="yry-dot"></span>§3 测试报告</h2>
      <div class="placeholder">数据待填充 — 运行 /rui code 生成</div>

  </div>
  <div data-panel="gates">

      <h2><span class="yry-dot"></span>Gate 门禁矩阵</h2>

      <div class="placeholder">数据待填充 — 运行 /rui code 生成</div>
    </div>
  </div>
