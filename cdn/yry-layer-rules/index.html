<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>YryLayerRules · Demo & Template</title>
<link rel="stylesheet" href="../shared\/index\.css">
<link rel="stylesheet" href="../theme\/index\.css">
<link rel="stylesheet" href="index.css">

<body>
<h1><span class="accent">&#9670;</span> YryLayerRules</h1>
<p class="demo-hint">Vue 3 组件 — 包含 Layer R 治理规则的完整 DOM 结构</p>

<div id="demo-1"></div>

<script type="text/x-template" id="yry-layer-rules-tpl">
  <yry-layer id="layer-rules-app" class="yry-cd-57">
    <yry-sub-title id="sub-title-rule-pipeline"></yry-sub-title>
    <yry-card-grid id="rule-pipeline-grid"></yry-card-grid>
    <yry-sub-title id="sub-title-rule-doc"></yry-sub-title>
    <yry-card-grid id="rule-doc-grid"></yry-card-grid>
    <yry-sub-title id="sub-title-rule-security"></yry-sub-title>
    <yry-card-grid id="rule-security-grid"></yry-card-grid>
    <yry-sub-title id="sub-title-rule-selfimprove"></yry-sub-title>
    <yry-card-grid id="rule-selfimprove-grid"></yry-card-grid>
    <yry-sub-title id="sub-title-rule-design"></yry-sub-title>
    <yry-card-grid id="rule-design-grid"></yry-card-grid>
  </yry-layer>
</script>

<script src="../shared/vue-ce-loader.js"></script>


<script src="../yry-layer/index.js"></script>
<script src="../yry-sub-title/index.js"></script>
<script src="../yry-card-grid/index.js"></script>
<script src="index.js"></script>
<script>
function mountAll() {
  if (!window.YryLayerRules) return;
  Vue.createApp(window.YryLayerRules).mount('#demo-1');
}
if (window.YryLayerRules) mountAll();
else document.addEventListener('yry-layer-rules-ready', mountAll, { once: true });
</script>
</body>
