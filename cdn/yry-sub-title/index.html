<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YrySubTitle · Demo & Template</title>
  <link rel="stylesheet" href="../shared\/index\.css">
  <link rel="stylesheet" href="../theme\/index\.css">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="../yry\-inline\-helpers\/index\.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    body {
      background: var(--yry-bg, #0a0a0a);
      color: var(--yry-text, #f5f5f5);
      font-family: var(--yry-font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "PingFang SC", sans-serif);
      padding: 32px 24px 60px;
      max-width: 720px; margin: 0 auto;
      line-height: 1.55;
    }
    h1 { font-size: 1.25rem; margin: 0 0 4px; color: var(--yry-text, #f5f5f5); }
    h1 .accent { color: var(--yry-accent, #ffc107); }
    .demo-hint { font-size: .78rem; color: var(--yry-text3, #888); margin: 0 0 20px; line-height: 1.6; }
    .demo-hint code {
      background: rgba(255,255,255,.06); padding: 1px 6px; border-radius: 3px;
      font-family: ui-monospace, monospace; font-size: .72rem; color: #e0af68;
    }
    hr { border: none; border-top: 1px solid rgba(255,255,255,.08); margin: 28px 0 24px; }
    .demo-section {
      margin: 20px 0;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px;
      padding: 20px 22px;
    }
    .demo-section h3 { font-size: .82rem; font-weight: 600; margin: 0 0 12px; color: var(--yry-text2, #d4d4d4); }
    .demo-footer { margin-top: 28px; text-align: center; font-size: .72rem; color: var(--yry-text3, #888); }
    .demo-footer a { color: var(--yry-accent, #ffc107); text-decoration: none; }
  </style>
</head>
<body>
  <h1><span class="accent">📌</span> YrySubTitle · Vue 3 子区块标题</h1>
  <p class="demo-hint">
    最简单的子区块标题 — icon + 文本 + (可选) count 计数徽标。
  </p>

  <div class="demo-section">
    <h3>Demo 1 — 基础</h3>
    <div id="demo-1"></div>
  </div>

  <div class="demo-section">
    <h3>Demo 2 — 含 count 计数</h3>
    <div id="demo-2"></div>
  </div>

  <hr>
  <p class="demo-hint">👇 以下 <code>&lt;script type="text/x-template"&gt;</code> 即为组件的 <strong>template 源</strong></p>

  <script type="text/x-template" id="yry-sub-title-tpl">
    <div class="sub-title">
      <span v-if="icon" class="accent">{{ icon }}</span>
      <span>{{ text }}</span>
      <span v-if="count" class="sub-title-count">{{ count }}</span>
    </div>
  </script>

  <script src="../shared/vue-ce-loader.js"></script>
  <script src="index.js"></script>

  <script>
    function mountDemo(id, items) {
      if (!window.Vue || !window.YrySubTitle) return;
      const root = document.getElementById(id);
      items.forEach(function (item) {
        const el = document.createElement('div');
        root.appendChild(el);
        Vue.createApp(window.YrySubTitle, item).mount(el);
      });
    }
    function mountAll() {
      mountDemo('demo-1', [
        { icon: '⚡', text: '运行时依赖 (6)' },
        { icon: '🛠', text: '开发依赖 (6)' },
        { icon: '🌐', text: '编排入口 (1)' }
      ]);
      mountDemo('demo-2', [
        { icon: '📋', text: '管线与执行规则', count: '5 项' },
        { icon: '📄', text: '文档规则',         count: '4 项' }
      ]);
    }
    if (window.YrySubTitle) mountAll();
    else document.addEventListener('yry-sub-title-ready', mountAll, { once: true });
  </script>

  <div class="demo-footer">📌 YrySubTitle v1.0.0 · <a href="../index.html">CDN 首页</a></div>
</body>
</html>
