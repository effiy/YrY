   YrY CDN — YryOpBtn · 操作按钮 Vue 3 组件
   三文件: index.html (模板+Demo) · index.js (逻辑) · index.css (样式)
   ═══════════════════════════════════════════════════════════════════════════ -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YryOpBtn · Demo & Template</title>
<link rel="stylesheet" href="../shared\/index\.css">
<link rel="stylesheet" href="../theme\/index\.css">
<link rel="stylesheet" href="index.css">
<script src="../shared/vue.global.prod.js"></script>
<link rel="stylesheet" href="../yry-inline-helpers/index.css">
<link rel="stylesheet" href="demo.css">
</head>
<body>

<h1><span class="accent">🖱</span> YryOpBtn · 操作按钮</h1>
<p class="demo-hint">操作按钮 — Vue 3 组件: <code>label</code> · <code>icon</code> · <code>href</code> · <code>target</code> · <code>tone</code></p>

<h3>Demo 1 — 各种 tone</h3>
<div id="r1"></div>

<h3 class="yry-cd-51">Demo 2 — 表格内用法</h3>
<table class="demo-table">
  <thead><tr><th>文档</th><th>操作</th></tr></thead>
  <tbody>
    <tr><td>📐 架构图.html</td><td id="row1"></td></tr>
    <tr><td>🧪 测试面板.html</td><td id="row2"></td></tr>
  </tbody>
</table>

<hr>
<p class="demo-hint">💡 <strong>tone 颜色:</strong> <code>view (cyan)</code> · <code>run (green)</code> · <code>edit (yellow)</code> · <code>del (red)</code> · <code>warn (orange)</code></p>

<script type="text/x-template" id="yry-op-btn-tpl">
  <component :is="href ? 'a' : 'button'" :href="href || undefined" :target="target || undefined" :class="'op-btn' + (tone ? ' tone-' + tone : '')">
    <span v-if="icon">{{ icon }}</span>{{ label }}
  </component>
</script>

<script src="../shared/vue-ce-loader.js"></script>
  <script src="index.js"></script>
<script>
function mountAll() {
  if (!window.YryOpBtn) return;
  var samples = [
    { label: '查看', icon: '👁', href: '#', tone: 'view' },
    { label: '运行', icon: '▶', href: '#', tone: 'run' },
    { label: '编辑', icon: '✎', href: '#', tone: 'edit' },
    { label: '删除', icon: '🗑', href: '#', tone: 'del' },
    { label: '告警', icon: '⚠', href: '#', tone: 'warn' },
    { label: '普通', icon: '·', href: '#' }
  ];
  var r1 = document.getElementById('r1');
  samples.forEach(function (b) {
    var div = document.createElement('div'); r1.appendChild(div);
    Vue.createApp(window.YryOpBtn, b).mount(div);
  });
  var row1 = document.getElementById('row1');
  [
    { label: '查看', icon: '👁', href: '架构图.html', target: '_blank', tone: 'view' },
    { label: '编辑', icon: '✎', href: '架构图.html', target: '_blank', tone: 'edit' }
  ].forEach(function (b) {
    var span = document.createElement('span'); row1.appendChild(span);
    Vue.createApp(window.YryOpBtn, b).mount(span);
  });
  var row2 = document.getElementById('row2');
  [{ label: '运行', icon: '▶', href: 'tester.mjs', tone: 'run' }].forEach(function (b) {
    var span = document.createElement('span'); row2.appendChild(span);
    Vue.createApp(window.YryOpBtn, b).mount(span);
  });
}
if (window.YryOpBtn) mountAll();
else document.addEventListener('yry-op-btn-ready', mountAll, { once: true });
</script>
</body>
</html>
