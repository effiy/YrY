<!-- ═══════════════════════════════════════════════════════════════════════════
   YryWalkthrough · Vue 3 逐步演示组件

   2 个用途:
     1) 模板源 — index.js 通过 fetch 提取 template 作为 Vue 组件
     2) Demo 预览 — 浏览器直接打开可看实际渲染效果

   加载链: ../shared/index.css → ../theme/index.css → index.css → Vue 3 → index.js
   ═══════════════════════════════════════════════════════════════════════════ -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YryWalkthrough · Demo & Template</title>
  <link rel="stylesheet" href="../shared\/index\.css">
  <link rel="stylesheet" href="../theme\/index\.css">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="../yry\-inline\-helpers\/index\.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    body {
      background: var(--yry-bg, #0a0a0a);
      color: var(--yry-text, #f5f5f5);
      font-family: var(--yry-font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif);
      padding: 32px 24px 60px;
      max-width: 920px; margin: 0 auto;
      line-height: 1.55;
    }
    h1 { font-size: 1.25rem; margin: 0 0 4px; color: var(--yry-text, #f5f5f5); }
    h1 .accent { color: var(--yry-accent, #ffc107); }
    .demo-hint {
      font-size: .78rem; color: var(--yry-text3, #888); margin: 0 0 20px; line-height: 1.6;
    }
    .demo-hint code {
      background: rgba(255,255,255,.06); padding: 1px 6px; border-radius: 3px;
      font-family: ui-monospace, monospace; font-size: .72rem; color: #e0af68;
    }
    hr { border: none; border-top: 1px solid rgba(255,255,255,.08); margin: 28px 0 24px; }
    .demo-section {
      margin: 20px 0;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px; padding: 20px 22px;
    }
    .demo-section h3 { font-size: .82rem; font-weight: 600; margin: 0 0 12px; color: var(--yry-text2, #d4d4d4); }
    .demo-footer {
      margin-top: 28px; text-align: center; font-size: .72rem; color: var(--yry-text3, #888);
    }
    .demo-footer a { color: var(--yry-accent, #ffc107); text-decoration: none; }
  </style>
</head>
<body>
  <h1><span class="accent">&#128640;</span> YryWalkthrough · Vue 3 逐步演示组件</h1>
  <p class="demo-hint">
    渐进式步骤演示,每步含标题、描述、命令、标签、注释、结果。<br>
    模板源见 <code>&lt;script type="text/x-template" id="yry-walkthrough-tpl"&gt;</code>
  </p>

  <div class="demo-section">
    <h3>Demo — 3 步上手流程</h3>
    <div id="demo-1"></div>
  </div>

  <hr>
  <p class="demo-hint">&#128071; 以下为组件的 <strong>template 源</strong></p>

  <!-- ═══════════════════════ TEMPLATE SOURCE OF TRUTH ═══════════════════════ -->
  <script type="text/x-template" id="yry-walkthrough-tpl">
    <div class="walkthrough">
      <div v-for="(step, i) in steps" :key="i" class="step" :data-step="i + 1">
        <div class="suite-body">
          <div class="s-title">
            {{ step.title }}
            <span v-if="step.time" class="s-time">{{ step.time }}</span>
          </div>
          <div v-if="step.desc" class="s-desc">{{ step.desc }}</div>
          <pre v-if="step.cmd">{{ step.cmd }}<span class="cb" :data-cmd="step.copyCmd || step.cmd">&#128203;</span></pre>
          <div v-if="step.tags && step.tags.length" class="s-tags">
            <span v-for="tag in step.tags" :key="tag" :class="['s-tag', tagClass(tag)]">{{ tag }}</span>
          </div>
          <div v-if="step.note" class="s-result-desc">&#128161; 说明: {{ step.note }}</div>
          <div v-if="step.result" class="s-result">
            <span class="r-label">&#9989; 结果:</span> {{ step.result }}
          </div>
        </div>
      </div>
    </div>
  </script>

  <script src="index.js"></script>
  <script>
    function mountDemo(id, steps) {
      if (!window.Vue || !window.YryWalkthrough) return;
      Vue.createApp(window.YryWalkthrough, { steps: steps }).mount('#' + id);
    }
    function mountAll() {
      mountDemo('demo-1', [
        { title: '了解项目全貌', time: '~5 min',
          desc: '阅读 README.md 了解系统全景和领域语言',
          cmd: 'cat README.md CLAUDE.md', copyCmd: 'cat README.md CLAUDE.md',
          tags: ['P0 阻断', '入门', '心智模型'],
          note: 'README 回答"这是什么"，CLAUDE.md 回答"怎么操作"',
          result: 'READEME.md: YrY 全景图 + 20 个术语定义。CLAUDE.md: 3 基础信念 + 4 铁律。'
        },
        { title: '搭建开发环境', time: '~10 min',
          desc: '克隆仓库 → 配置 API_X_TOKEN → 运行 /rui init',
          cmd: 'git clone && export API_X_TOKEN=*** && /rui init',
          tags: ['P0 阻断', '环境'],
          note: '密钥必须通过环境变量传入，禁止硬编码在源码中',
          result: 'API_X_TOKEN 环境变量注入 → /rui init 六阶段全部通过 → verify(PASS)'
        },
        { title: '完成首次修改', time: '~15 min',
          desc: '走完整管线：需求 → doc → code → test → deliver',
          cmd: '/rui 修复文档中的错别字',
          tags: ['P1 推荐', 'T1 变更'],
          note: '首次修改建议走完整管线体验全流程',
          result: 'pm 识别为 T1 → Gate A 通过 → 修改 2 处 → Gate B 1 轮通过 → deliver'
        }
      ]);
    }
    if (window.YryWalkthrough) mountAll();
    else document.addEventListener('yry-walkthrough-ready', mountAll, { once: true });
  </script>

  <div class="demo-footer">&#128640; YryWalkthrough v1.0.0 · <a href="../index.html">CDN 首页</a></div>
</body>
</html>
