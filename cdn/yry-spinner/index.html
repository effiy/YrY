<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YrySpinner · Demo & Template</title>
  <link rel="stylesheet" href="../shared\/index\.css">
  <link rel="stylesheet" href="../theme\/index\.css">
  <link rel="stylesheet" href="index.css">
  <style>
    body {
      background: var(--yry-bg, #0a0a0a);
      color: var(--yry-text, #f5f5f5);
      font-family: var(--yry-font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif);
      padding: 32px 24px 60px;
      max-width: 920px; margin: 0 auto;
      line-height: 1.55;
    }
    h1 { font-size: 1.25rem; margin: 0 0 4px; color: var(--yry-text, #f5f5f5); }
    h1 .accent { color: var(--yry-accent, #ffc107); }
    .demo-hint { font-size: .78rem; color: var(--yry-text3, #888); margin: 0 0 20px; line-height: 1.6; }
    .demo-hint code {
      background: rgba(255,255,255,.06); padding: 1px 6px; border-radius: 3px;
      font-family: ui-monospace, monospace; font-size: .72rem; color: #e0af68;
    }
    .demo-section {
      margin: 20px 0;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px;
      padding: 20px 22px;
      display: flex; gap: 24px; flex-wrap: wrap; align-items: center;
    }
    .demo-section h3 { font-size: .82rem; font-weight: 600; margin: 0 0 12px; color: var(--yry-text2, #d4d4d4); width: 100%; }
    .demo-footer { margin-top: 28px; text-align: center; font-size: .72rem; color: var(--yry-text3, #888); }
    .demo-footer a { color: var(--yry-accent, #ffc107); text-decoration: none; }
  </style>
</head>
<body>
  <h1><span class="accent">⏳</span> YrySpinner · 加载旋转器</h1>
  <p class="demo-hint">
    自定义元素 <code>&lt;yry-spinner&gt;</code> — SVG 旋转加载指示器。
    通过 <code>size</code> 属性控制尺寸（sm/md/lg），<code>color</code> 属性控制颜色。
    适用于按钮加载态、数据加载中、异步操作等待。
  </p>

  <div class="demo-section">
    <h3>尺寸变体</h3>
    <yry-spinner size="sm"></yry-spinner>
    <yry-spinner size="md"></yry-spinner>
    <yry-spinner size="lg"></yry-spinner>
  </div>

  <div class="demo-section">
    <h3>颜色变体</h3>
    <yry-spinner color="var(--yry-accent, #ffc107)"></yry-spinner>
    <yry-spinner color="var(--yry-pass, #22c55e)"></yry-spinner>
    <yry-spinner color="var(--yry-cyan, #22d3ee)"></yry-spinner>
    <yry-spinner color="var(--yry-fail, #ef4444)"></yry-spinner>
  </div>

  <div class="demo-section">
    <h3>带标签</h3>
    <yry-spinner label="加载中..."></yry-spinner>
    <yry-spinner label="正在验证..." color="var(--yry-pass, #22c55e)"></yry-spinner>
  </div>

  <script src="index.js"></script>
  <div class="demo-footer">⏳ YrySpinner v1.0.0 · <a href="../index.html">CDN 首页</a></div>
</body>
</html>
