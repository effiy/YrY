<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YryToast · Demo & Template</title>
  <link rel="stylesheet" href="../shared\/index\.css">
  <link rel="stylesheet" href="../theme\/index\.css">
  <link rel="stylesheet" href="index.css">
  <style>
    body {
      background: var(--yry-bg, #0a0a0a);
      color: var(--yry-text, #f5f5f5);
      font-family: var(--yry-font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif);
      padding: 32px 24px 60px;
      max-width: 920px; margin: 0 auto;
      line-height: 1.55;
    }
    h1 { font-size: 1.25rem; margin: 0 0 4px; color: var(--yry-text, #f5f5f5); }
    h1 .accent { color: var(--yry-accent, #ffc107); }
    .demo-hint { font-size: .78rem; color: var(--yry-text3, #888); margin: 0 0 20px; line-height: 1.6; }
    .demo-hint code {
      background: rgba(255,255,255,.06); padding: 1px 6px; border-radius: 3px;
      font-family: ui-monospace, monospace; font-size: .72rem; color: #e0af68;
    }
    .demo-section {
      margin: 20px 0;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px;
      padding: 20px 22px;
    }
    .demo-section h3 { font-size: .82rem; font-weight: 600; margin: 0 0 12px; color: var(--yry-text2, #d4d4d4); }
    .demo-footer { margin-top: 28px; text-align: center; font-size: .72rem; color: var(--yry-text3, #888); }
    .demo-footer a { color: var(--yry-accent, #ffc107); text-decoration: none; }
    .demo-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .demo-btn {
      background: var(--yry-bg-flat, rgba(42,42,56,1)); color: var(--yry-text2, #d4d4d4);
      border: var(--yry-border, 1px solid rgba(255,255,255,.06));
      border-radius: 20px; padding: 7px 16px; font-size: .76rem; cursor: pointer;
      transition: all .15s; font-family: inherit;
    }
    .demo-btn:hover { border-color: rgba(255,193,7,.3); color: var(--yry-accent, #ffc107); }
  </style>
</head>
<body>
  <h1><span class="accent">🔔</span> YryToast · 消息提示组件</h1>
  <p class="demo-hint">
    自定义元素 <code>&lt;yry-toast&gt;</code> — 页面级消息通知。
    通过 JS API <code>YryToast.show(msg, type, duration)</code> 调用。
    支持 <strong>success / error / warn / info</strong> 四种类型，自动叠加、自动消失。
  </p>

  <div class="demo-section">
    <h3>Demo — 点击按钮触发提示</h3>
    <div class="demo-btns">
      <button class="demo-btn" onclick="YryToast.success('✅ 架构合规检查通过 — 15/15 维度 A 级')">Success</button>
      <button class="demo-btn" onclick="YryToast.error('❌ Gate A 未通过 — 发现 2 处空 catch')">Error</button>
      <button class="demo-btn" onclick="YryToast.warn('⚠️ 2 个模块接近体积上限，建议拆分')">Warning</button>
      <button class="demo-btn" onclick="YryToast.info('ℹ️ 健康报告已生成: docs/健康报告/health-2026-06-19.html')">Info</button>
      <button class="demo-btn" onclick="YryToast.show('📋 自定义消息 · 停留 5 秒', 'default', 5000)">长停留</button>
    </div>
  </div>

  <!-- Toast container (auto-created by JS) -->
  <div id="yry-toast-container"></div>

  <script src="index.js"></script>

  <div class="demo-footer">🔔 YryToast v1.0.0 · <a href="../index.html">CDN 首页</a></div>
</body>
</html>
