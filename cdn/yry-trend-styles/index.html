<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YryTrendStyles · Demo</title>
  <meta name="description" content="YryTrendStyles 趋势报告样式集 Demo">
  <link rel="stylesheet" href="../shared/index.css">
  <link rel="stylesheet" href="../theme/index.css">
  <link rel="stylesheet" href="index.css">
  <style>
    body { background: var(--yry-bg, #0a0a0a); color: var(--yry-text, #f5f5f5); font-family: var(--yry-font-sans, -apple-system, sans-serif); padding: 32px 24px 60px; max-width: 1100px; margin: 0 auto; line-height: 1.7; }
    h1 { font-size: 1.25rem; margin: 0 0 4px; }
    .demo-hint { font-size: .78rem; color: var(--yry-text3, #888); margin: 0 0 20px; }
  </style>
</head>
<body>
<h1>📡 YryTrendStyles · Demo</h1>
<p class="demo-hint">趋势报告样式集 — src-grid · vel-grid · cat-bars · quality-card · trend-sparkline-wrap · health-ref · freshness-dot · momentum-bar 等 9 命名空间。</p>
<div class="src-grid">
  <div class="src-card"><div class="src-icon">🐙</div><div class="src-name">GitHub Trending</div><div class="src-weight">权重 35%</div></div>
  <div class="src-card"><div class="src-icon">📊</div><div class="src-name">OSS Insight</div><div class="src-weight">权重 20%</div></div>
</div>
<div class="vel-grid">
  <div class="vel-item"><div class="vel-num">42</div><div class="vel-lbl">条目数</div></div>
  <div class="vel-item"><div class="vel-num">+8</div><div class="vel-lbl">周变化</div></div>
</div>
</body>
