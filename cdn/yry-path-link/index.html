<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YryPathLink · Demo & Template</title>
<link rel="stylesheet" href="../shared.css">
<link rel="stylesheet" href="../theme.css">
<link rel="stylesheet" href="index.css">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
  body { background: var(--yry-bg, #0a0a0a); color: var(--yry-text, #f5f5f5); font-family: var(--yry-font-sans); padding: 32px 24px 60px; max-width: 900px; margin: 0 auto; line-height: 1.55; }
  h1 { font-size: 1.25rem; margin: 0 0 4px; }
  h1 .accent { color: var(--yry-accent, #ffc107); }
  .demo-hint { font-size: .78rem; color: var(--yry-text3, #888); margin: 0 0 20px; }
  .demo-hint code { background: rgba(255,255,255,.06); padding: 1px 6px; border-radius: 3px; font-family: monospace; font-size: .72rem; color: #e0af68; }
  hr { border: none; border-top: 1px solid rgba(255,255,255,.08); margin: 28px 0 24px; }
</style>
</head>
<body>

<h1><span class="accent">📁</span> YryPathLink · 路径链接</h1>
<p class="demo-hint">路径链接 — 表格内显示短路径,hover 显示完整路径,点击跳转。Vue 3 props: <code>display</code> · <code>full</code> · <code>href</code> · <code>target</code></p>

<div id="row"></div>

<hr>
<p class="demo-hint">💡 <strong>字段:</strong> <code>display</code> 显示文本 · <code>full</code> hover title · <code>href</code> 跳转 · <code>target</code> 链接目标</p>

<script type="text/x-template" id="yry-path-link-tpl">
  <a :href="href" class="path-link" :target="target || undefined" :title="full || undefined">{{ display }}</a>
</script>

<script src="index.js"></script>
<script>
function mountAll() {
  if (!window.YryPathLink) return;
  var samples = [
    { display: 'cdn/shared.css', full: '/Users/ruiyi/Yi/YrY/cdn/shared.css', href: '../../../shared.css' },
    { display: 'cdn/yry-cmd-card/', full: '/Users/ruiyi/Yi/YrY/cdn/yry-cmd-card/index.js', href: '../../../yry-cmd-card/' },
    { display: 'agents/AGENT.md', full: '/Users/ruiyi/Yi/YrY/agents/AGENT.md', href: '../../../../agents/AGENT.md', target: '_blank' }
  ];
  var row = document.getElementById('row');
  samples.forEach(function (l) {
    var div = document.createElement('div');
    div.style.marginBottom = '6px';
    row.appendChild(div);
    Vue.createApp(window.YryPathLink, l).mount(div);
  });
}
if (window.YryPathLink) mountAll();
else document.addEventListener('yry-path-link-ready', mountAll, { once: true });
</script>
</body>
</html>
