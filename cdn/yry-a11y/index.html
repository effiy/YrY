<html lang="zh-CN">

    <pre>&lt;link rel="stylesheet" href="../../../../cdn/yry-a11y/index.css"&gt;</pre>

    <button>另一个按钮</button>

  </main>
  <p class="yry-cd-8">YrY CDN · yry-a11y · 2026</p>
