<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YrySkeletonLoader · Demo & Template</title>
  <link rel="stylesheet" href="../shared\/index\.css">
  <link rel="stylesheet" href="../theme\/index\.css">
  <link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="../yry-inline-helpers/index.css">
<link rel="stylesheet" href="demo.css">
</head>
<body>
  <h1><span class="accent">💀</span> YrySkeletonLoader · 骨架加载组件</h1>
  <p class="demo-hint">
    自定义元素 <code>&lt;yry-skeleton-loader&gt;</code> — 内容加载占位。
    支持 <strong>text / card / list / table</strong> 四种预设变体，以及自定义宽高。
    shimmer 动画指示加载中状态。
  </p>

  <div class="demo-section">
    <h3>Demo — 文本骨架</h3>
    <yry-skeleton-loader variant="text" lines="3"></yry-skeleton-loader>
  </div>

  <div class="demo-section">
    <h3>Demo — 卡片骨架</h3>
    <div class="yry-cd-6">
      <yry-skeleton-loader variant="card"></yry-skeleton-loader>
      <yry-skeleton-loader variant="card"></yry-skeleton-loader>
      <yry-skeleton-loader variant="card"></yry-skeleton-loader>
    </div>
  </div>

  <div class="demo-section">
    <h3>Demo — 列表骨架</h3>
    <yry-skeleton-loader variant="list" lines="4"></yry-skeleton-loader>
  </div>

  <div class="demo-section">
    <h3>Demo — 自定义尺寸</h3>
    <yry-skeleton-loader width="60%" height="24px" class="yry-cd-48"></yry-skeleton-loader>
    <yry-skeleton-loader width="80%" height="16px" class="yry-cd-48"></yry-skeleton-loader>
    <yry-skeleton-loader width="40%" height="16px" class="yry-cd-48"></yry-skeleton-loader>
    <yry-skeleton-loader width="200px" height="200px" radius="12px"></yry-skeleton-loader>
  </div>

  <script src="index.js"></script>
  <div class="demo-footer">💀 YrySkeletonLoader v1.0.0 · <a href="../index.html">CDN 首页</a></div>
</body>
</html>
