<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YryToggle · Demo & Template</title>
  <link rel="stylesheet" href="../shared\/index\.css">
  <link rel="stylesheet" href="../theme\/index\.css">
  <link rel="stylesheet" href="index.css">
  <style>
    body {
      background: var(--yry-bg, #0a0a0a);
      color: var(--yry-text, #f5f5f5);
      font-family: var(--yry-font-sans, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif);
      padding: 32px 24px 60px;
      max-width: 920px; margin: 0 auto; line-height: 1.55;
    }
    h1 { font-size: 1.25rem; margin: 0 0 4px; color: var(--yry-text, #f5f5f5); }
    h1 .accent { color: var(--yry-accent, #ffc107); }
    .demo-hint { font-size: .78rem; color: var(--yry-text3, #888); margin: 0 0 20px; line-height: 1.6; }
    .demo-hint code { background: rgba(255,255,255,.06); padding: 1px 6px; border-radius: 3px; font-family: ui-monospace, monospace; font-size: .72rem; color: #e0af68; }
    .demo-section { margin: 20px 0; background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06); border-radius: 10px; padding: 20px 22px; }
    .demo-section h3 { font-size: .82rem; font-weight: 600; margin: 0 0 12px; color: var(--yry-text2, #d4d4d4); }
    .demo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-size: .78rem; color: var(--yry-text2, #d4d4d4); }
    .demo-footer { margin-top: 28px; text-align: center; font-size: .72rem; color: var(--yry-text3, #888); }
    .demo-footer a { color: var(--yry-accent, #ffc107); text-decoration: none; }
  </style>
</head>
<body>
  <h1><span class="accent">🔘</span> YryToggle · 开关组件</h1>
  <p class="demo-hint">
    自定义元素 <code>&lt;yry-toggle&gt;</code> — 纯 CSS 开关。
    通过 <code>checked</code> 属性控制状态，<code>disabled</code> 禁用。
    触发 <code>yry-change</code> 自定义事件，支持 <code>label</code> 属性添加文本。
  </p>

  <div class="demo-section">
    <h3>Demo — 设置面板</h3>
    <div class="demo-row"><yry-toggle id="t1" checked></yry-toggle> 启用自动健康检查</div>
    <div class="demo-row"><yry-toggle id="t2" checked></yry-toggle> 推送企微通知</div>
    <div class="demo-row"><yry-toggle id="t3"></yry-toggle> 开发者模式</div>
    <div class="demo-row"><yry-toggle id="t4" checked disabled></yry-toggle> 已锁定（禁用）</div>
    <div class="demo-row"><yry-toggle id="t5" disabled></yry-toggle> 不可用（禁用）</div>
  </div>

  <div class="demo-section">
    <h3>Demo — 带标签</h3>
    <yry-toggle label="深色模式" checked></yry-toggle>
    <yry-toggle label="紧凑布局" style="margin-left:24px"></yry-toggle>
  </div>

  <script src="index.js"></script>
  <script>
    ['t1','t2','t3'].forEach(function(id) {
      document.getElementById(id).addEventListener('yry-change', function(e) {
        console.log('Toggle ' + id + ':', e.detail.checked);
      });
    });
  </script>
  <div class="demo-footer">🔘 YryToggle v1.0.0 · <a href="../index.html">CDN 首页</a></div>
</body>
</html>
