<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YryToggle · Demo & Template</title>
  <link rel="stylesheet" href="../shared\/index\.css">
  <link rel="stylesheet" href="../theme\/index\.css">
  <link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="../yry-inline-helpers/index.css">
<link rel="stylesheet" href="demo.css">
</head>
<body>
  <h1><span class="accent">🔘</span> YryToggle · 开关组件</h1>
  <p class="demo-hint">
    自定义元素 <code>&lt;yry-toggle&gt;</code> — 纯 CSS 开关。
    通过 <code>checked</code> 属性控制状态，<code>disabled</code> 禁用。
    触发 <code>yry-change</code> 自定义事件，支持 <code>label</code> 属性添加文本。
  </p>

  <div class="demo-section">
    <h3>Demo — 设置面板</h3>
    <div class="demo-row"><yry-toggle id="t1" checked></yry-toggle> 启用自动健康检查</div>
    <div class="demo-row"><yry-toggle id="t2" checked></yry-toggle> 推送企微通知</div>
    <div class="demo-row"><yry-toggle id="t3"></yry-toggle> 开发者模式</div>
    <div class="demo-row"><yry-toggle id="t4" checked disabled></yry-toggle> 已锁定（禁用）</div>
    <div class="demo-row"><yry-toggle id="t5" disabled></yry-toggle> 不可用（禁用）</div>
  </div>

  <div class="demo-section">
    <h3>Demo — 带标签</h3>
    <yry-toggle label="深色模式" checked></yry-toggle>
    <yry-toggle label="紧凑布局" class="yry-cd-50"></yry-toggle>
  </div>

  <script src="index.js"></script>
  <script>
    ['t1','t2','t3'].forEach(function(id) {
      document.getElementById(id).addEventListener('yry-change', function(e) {
        console.log('Toggle ' + id + ':', e.detail.checked);
      });
    });
  </script>
  <div class="demo-footer">🔘 YryToggle v1.0.0 · <a href="../index.html">CDN 首页</a></div>
</body>
</html>
