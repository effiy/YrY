<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YrySceneTabs · Demo & Template</title>
<link rel="stylesheet" href="../shared.css">
<link rel="stylesheet" href="index.css">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
  body { background: var(--yry-bg, #0e0f1a); color: var(--yry-text, #f5f5f5); padding: 32px 24px; max-width: 700px; margin: 0 auto; font-family: var(--yry-font-sans); }
  h1 { font-size: 1.1rem; }
  .demo-hint { font-size: .74rem; color: var(--yry-text3, #888); margin: 0 0 20px; }
  .demo-panel { padding: 16px; background: rgba(255,255,255,.03); border-radius: 8px; font-size: .82rem; }
</style>
</head>
<body>
<h1>YrySceneTabs</h1>
<p class="demo-hint">Vue 3 组件: <code>tabs</code> (JSON) · 点击切换面板</p>

<div id="demo-1"></div>

<script type="text/x-template" id="yry-scene-tabs-tpl">
  <div>
    <div class="st-bar">
      <span v-for="(t, i) in parsedTabs" :key="i" :class="'st-tab' + (activeIdx === i ? ' on' : '')" @click="activeIdx = i">{{ t.label }}</span>
    </div>
    <div class="st-panels">
      <div v-for="(t, i) in parsedTabs" :key="i" :class="'st-panel' + (activeIdx === i ? ' on' : '')">
        <slot :name="t.id"></slot>
      </div>
    </div>
  </div>
</script>

<script src="index.js"></script>
<script>
function mountAll() {
  if (!window.YrySceneTabs) return;
  var app = Vue.createApp(window.YrySceneTabs, {
    tabs: '[{"id":"overview","label":"📊 总览"},{"id":"good","label":"✅ 好案例"},{"id":"bad","label":"⚠️ 需改进"}]'
  });
  app.mount('#demo-1');
}
if (window.YrySceneTabs) mountAll();
else document.addEventListener('yry-scene-tabs-ready', mountAll, { once: true });
</script>
</body>
</html>
