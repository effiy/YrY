<div class="card">
  <h2>index.js · 核心逻辑 (92 行)</h2>
  <pre><code>/* ═══ YryProgressBar · Vue 3 进度条组件 ═══ */
(function () {
  'use strict';

  // ── 组件注册 ──────────────────────────────────────
  if (!window.YrYVueCE || typeof window.YrYVueCE.define !== 'function') {
    console.warn('[YryProgressBar] shared/vue-ce-loader.js 未加载,组件已跳过注册');
    return;
  }

  window.YrYVueCE.define({
    componentName: 'YryProgressBar',           // PascalCase → 'yry-progress-bar'
    templateId: 'yry-progress-bar-tpl',        // index.html 中模板 id
    buildComponent: function (templateHTML) {
      return {
        name: 'YryProgressBar',
        props: {
          done:  { type: Number, default: 0 },
          total: { type: Number, default: 0 },
          label: { type: String, default: '进度' }
        },
        data: function () {
          return {
            _ticking: false,                    // RAF 防重入标记
            _onScroll: null,                    // scroll handler 引用 (清理用)
            _scrollMode: false,                 // 自动追踪模式标记
            _val: { done: 0, total: 0 }         // 滚动模式内部状态
          };
        },
        computed: {
          pct: function () {
            var d = this._scrollMode ? this._val.done : this.done;
            var t = this._scrollMode ? this._val.total : this.total;
            return t > 0 ? Math.round((d / t) * 100) : 0;
          }
        },
        methods: {
          _updateScroll: function () {
            var docH = document.documentElement.scrollHeight - window.innerHeight;
            this._val = {
              done: Math.round(window.scrollY),
              total: Math.max(1, Math.round(docH))
            };
            this._ticking = false;
          }
        },
        mounted: function () {
          var el = this.$el;
          // 判定: 有 done 或 total 属性 → 显式模式，否则 → 滚动追踪
          if (el.hasAttribute('done') || el.hasAttribute('total')) return;
          this._scrollMode = true;
          var self = this;
          this._onScroll = function () {
            if (!self._ticking) {
              self._ticking = true;
              requestAnimationFrame(function () { self._updateScroll(); });
            }
          };
          window.addEventListener('scroll', this._onScroll, { passive: true });
          window.addEventListener('resize', this._onScroll, { passive: true });
          this.$nextTick(function () { self._updateScroll(); });
        },
        beforeUnmount: function () {
          if (this._onScroll) {
            window.removeEventListener('scroll', this._onScroll);
            window.removeEventListener('resize', this._onScroll);
            this._onScroll = null;
          }
        },
        template: templateHTML
      };
    }
  });
})();</code></pre>

<div class="card">
  <h2>index.css · 样式架构 (110 行)</h2>
  <pre><code>/* ═══ 层叠结构 ═══ */
:root {
  --yry-progress-bar-height: 21px;   /* 主机总高度 · 下游引用 */
}

yry-progress-bar {                   /* 主机: sticky 吸顶 + 玻璃背景 */
  display: block;
  position: sticky; top: 0; z-index: 100;
  padding: 6px 0 8px;
  background: linear-gradient(180deg,
    rgba(22,22,32,.96) 0%, rgba(22,22,32,.78) 100%);
  backdrop-filter: blur(14px) saturate(160%);
  border-bottom: 1px solid rgba(255,255,255,.08);
}

.pb-track {                          /* 轨道: 6px 高 · 暗底 */
  height: 6px; border-radius: 999px;
  background: rgba(255,255,255,.06);
  overflow: hidden;
}

.pb-fill {                           /* 填充: 青紫渐变 · 发光 · 过渡 */
  height: 100%; border-radius: 999px;
  background: linear-gradient(90deg,
    var(--yry-cyan) 0%, var(--yry-violet) 100%);
  box-shadow: 0 0 8px rgba(34,211,238,.45),
              0 0 18px rgba(167,139,250,.22);
  transition: width 0.5s cubic-bezier(.22,.61,.36,1);
}

.pb-fill.is-done {                   /* 完成态: 绿青渐变 */
  background: linear-gradient(90deg,
    var(--yry-pass) 0%, var(--yry-cyan) 100%);
}

.pb-fill.is-empty { box-shadow: none; }  /* 空态: 无发光 */

.pb-shine {                          /* 扫光带: 2.6s 动画 */
  width: 45%;
  background: linear-gradient(90deg,
    transparent 0%, rgba(255,255,255,.38) 50%, transparent 100%);
  animation: pb-shine 2.6s ease-in-out infinite;
}

@keyframes pb-shine {
  0%   { transform: translateX(-100%); }
  55%  { transform: translateX(220%); }
  100% { transform: translateX(220%); }
}

@media (prefers-reduced-motion: reduce) {
  .pb-fill  { transition: none; }
  .pb-shine { animation: none; opacity: 0; }
}</code></pre>
