<!-- ═══════════════════════════════════════════════════════════════════════════
   YrY CDN — YryProgressBar · 进度条 Vue 3 组件模板
   本文件即组件模板源 — index.js 通过 vue-ce-loader 拉取此文件,提取模板后注册 CE
   ═══════════════════════════════════════════════════════════════════════════ -->
<script type="text/x-template" id="yry-progress-bar-tpl">
  <div class="pb-wrap"
       role="progressbar"
       :aria-label="label || '进度'"
       :aria-valuenow="pct" aria-valuemin="0" aria-valuemax="100">
    <div class="pb-track">
      <div class="pb-fill"
           :class="{ 'is-done': pct >= 100, 'is-empty': pct <= 0 }"
           :style="{ width: pct + '%' }">
        <div class="pb-shine"></div>
      </div>
    </div>
  </div>
</script>
