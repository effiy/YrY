   YrY CDN — YryProgressBar · 进度条 Vue 3 组件
   三文件: index.html (模板+Demo) · index.js (逻辑) · index.css (样式)
   ═══════════════════════════════════════════════════════════════════════════ -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YryProgressBar · Demo & Template</title>
<link rel="stylesheet" href="../shared.css">
<link rel="stylesheet" href="index.css">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
  body { background: var(--yry-bg, #0e0f1a); color: var(--yry-text, #f5f5f5); padding: 32px 24px; max-width: 600px; margin: 0 auto; font-family: var(--yry-font-sans); }
  h1 { font-size: 1.1rem; margin: 0 0 4px; }
  .demo-hint { font-size: .74rem; color: var(--yry-text3, #888); margin: 0 0 20px; }
  .demo-section { margin: 16px 0; padding: 16px; background: rgba(255,255,255,.03); border-radius: 8px; }
  .demo-section h3 { font-size: .78rem; margin: 0 0 10px; color: var(--yry-text2); }
</style>
</head>
<body>
<h1>YryProgressBar</h1>
<p class="demo-hint">进度条组件 — done / total / label</p>

<div class="demo-section">
  <h3>Demo 1 — 3/8 步骤</h3>
  <div id="demo-1"></div>
</div>

<div class="demo-section">
  <h3>Demo 2 — 50% 进度</h3>
  <div id="demo-2"></div>
</div>

<!-- ════════════════ TEMPLATE SOURCE ════════════════ -->
<script type="text/x-template" id="yry-progress-bar-tpl">
  <div class="pb-wrap">
    <div class="pb-label">
      <span>{{ label }}</span>
      <span>{{ done }}/{{ total }} 步骤完成</span>
    </div>
    <div class="pb-bar">
      <div class="pb-fill" :style="{ width: pct + '%' }"></div>
    </div>
  </div>
</script>

<script src="index.js"></script>
<script>
function mountAll() {
  if (!window.YryProgressBar) return;
  Vue.createApp(window.YryProgressBar, { done: 3, total: 8, label: '总体进度' }).mount('#demo-1');
  Vue.createApp(window.YryProgressBar, { done: 5, total: 10, label: '构建进度' }).mount('#demo-2');
}
if (window.YryProgressBar) mountAll();
else document.addEventListener('yry-progress-bar-ready', mountAll, { once: true });
</script>
</body>
</html>
