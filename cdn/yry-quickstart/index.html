<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YryQuickstart · Demo & Template</title>
<link rel="stylesheet" href="../shared\/index\.css">
<link rel="stylesheet" href="../theme\/index\.css">
<link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="demo.css">
<script src="../shared/vue.global.prod.js"></script>
</head>
<body>

<h1><span class="accent">🚀</span> YryQuickstart · 快速开始块</h1>
<p class="demo-hint">快速开始块 — Vue 3 props: <code>tip</code> · <code>cmd</code> (支持复制按钮)</p>

<div id="demo-1"></div>

<script type="text/x-template" id="yry-quickstart-tpl">
  <div class="qs-wrapper">
    <div v-if="tip" class="qs-tip" v-html="tip"></div>
    <div v-if="cmd" class="qs-code">
      <pre><code>{{ cmd }}</code></pre>
      <button class="qs-copy" :class="{ copied: copied }" @click.stop="doCopy" title="复制命令">{{ copied ? '✅ 已复制' : '📋 复制' }}</button>
    </div>
  </div>
</script>

<script src="index.js"></script>
<script>
function mountAll() {
  if (!window.YryQuickstart) return;
  Vue.createApp(window.YryQuickstart, {
    tip: '复制整段 → 进入 <code>~/repos</code> → 终端粘贴。',
    cmd: 'git clone git@github.com:yry-org/story-task-panel.git\ncd story-task-panel && bash setup.sh'
  }).mount('#demo-1');
}
if (window.YryQuickstart) mountAll();
else document.addEventListener('yry-quickstart-ready', mountAll, { once: true });
</script>
</body>
</html>
