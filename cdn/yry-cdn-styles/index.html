<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YryCdnStyles · Demo</title>
  <meta name="description" content="YryCdnStyles CDN 首页样式集 Demo">
  <link rel="stylesheet" href="../shared/index.css">
  <link rel="stylesheet" href="../theme/index.css">
  <link rel="stylesheet" href="index.css">
  <style>
    body { background: var(--yry-bg, #0a0a0a); color: var(--yry-text, #f5f5f5); font-family: var(--yry-font-sans, -apple-system, sans-serif); padding: 32px 24px 60px; max-width: 1100px; margin: 0 auto; line-height: 1.7; }
    h1 { font-size: 1.25rem; margin: 0 0 4px; }
    .demo-hint { font-size: .78rem; color: var(--yry-text3, #888); margin: 0 0 20px; }
  </style>
</head>
<body>
<h1>🌐 YryCdnStyles · Demo</h1>
<p class="demo-hint">CDN 首页样式集 — card-grid 覆盖 · score-methodology · score-report 命名空间。</p>
<div class="score-methodology">
  <div class="score-methodology-title">📊 CDN 评分体系</div>
  <div class="score-methodology-desc">六维加权健康评估模型</div>
  <div class="sm-cards">
    <div class="sm-card">
      <div class="sm-card-header">
        <span class="sm-card-title">🧩 CQI · 组件质量指数</span>
        <span class="sm-card-grade grade-A">92/A</span>
      </div>
      <div class="sm-card-desc">62 组件四维加权评估</div>
    </div>
  </div>
</div>
<div class="score-report">
  <div class="score-report-inner">
    <div class="sr-header"><span class="sr-title">📋 实时评分报告</span></div>
    <div class="sr-grid">
      <div class="sr-cell"><div class="sr-cell-label">综合评分</div><div class="sr-cell-value">92</div></div>
    </div>
  </div>
</div>
</body>
</html>
