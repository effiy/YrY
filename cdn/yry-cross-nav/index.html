<!DOCTYPE html>
<!--
  ═══════════════════════════════════════════════════════════════════════════
  YryCrossNav · 模板源 + Demo 预览页

  本文件有 2 个用途:
    1) **模板源** — index.js 通过 fetch 拉取本文件,提取 <script type="text/x-template"
       id="yry-cross-nav-tpl"> 内容作为 Vue 组件的 template。
    2) **Demo 预览** — 直接用浏览器打开本文件,即可看到 YryCrossNav 的实际渲染效果。

  加载链: ../shared/index.css → ../theme/index.css → index.css → Vue 3 → index.js
  ═══════════════════════════════════════════════════════════════════════════
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YryCrossNav · Demo & Template</title>
  <link rel="stylesheet" href="../shared\/index\.css">
  <link rel="stylesheet" href="../theme\/index\.css">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="../yry\-inline\-helpers\/index\.css">
<link rel="stylesheet" href="demo.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>

  <h1><span class="accent">&#128279;</span> YryCrossNav · Vue 3 交叉导航组件</h1>
  <p class="demo-hint">
    场景页 7 种交付物类型间的快速跳转导航。<br>
    模板源见下方 <code>&lt;script type="text/x-template" id="yry-cross-nav-tpl"&gt;</code> 块。
  </p>

  <div class="demo-section">
    <h3>Demo 1 — 默认 (清单页高亮)</h3>
    <div id="demo-1"></div>
  </div>

  <div class="demo-section">
    <h3>Demo 2 — 架构图页高亮</h3>
    <div id="demo-2"></div>
  </div>

  <hr>
  <p class="demo-hint">
    &#128071; 以下 <code>&lt;script type="text/x-template"&gt;</code> 即为组件的 <strong>template 源</strong>
  </p>

  <!-- ════════════════════════════════════════════════════════════════════
       TEMPLATE SOURCE OF TRUTH · YryCrossNav 的 template
       ════════════════════════════════════════════════════════════════════ -->
  <script type="text/x-template" id="yry-cross-nav-tpl">
    <nav class="cross-nav">
      <template v-for="(page, i) in pages" :key="i">
        <span v-if="i > 0" class="cross-sep" aria-hidden="true">·</span>
        <a v-if="page.id !== active"
           :href="basePath + page.href"
           class="cross-link">
          {{ page.icon }} {{ page.id }}
        </a>
        <span v-else class="cross-link on">
          {{ page.icon }} {{ page.id }}
        </span>
      </template>
    </nav>
  </script>

  <script src="index.js"></script>

  <script>
    function mountDemo(id, active, pages) {
      if (!window.Vue || !window.YryCrossNav) return;
      Vue.createApp(window.YryCrossNav, { basePath: './', active: active, pages: pages }).mount('#' + id);
    }
    function mountAll() {
      var pages = [
        { id: '清单', icon: '📋', href: '计划清单.html' },
        { id: '架构', icon: '📐', href: '架构图.html' },
        { id: '图谱', icon: '🔗', href: '知识图谱.html' },
        { id: '源码', icon: '📄', href: '源码.html' },
        { id: '测试', icon: '🧪', href: '测试面板.html' },
        { id: '演示', icon: '💡', href: '演示.html' },
        { id: '审查', icon: '📝', href: '审查.html' }
      ];
      mountDemo('demo-1', '清单', pages);
      mountDemo('demo-2', '架构', pages);
    }
    if (window.YryCrossNav) mountAll();
    else document.addEventListener('yry-cross-nav-ready', mountAll, { once: true });
  </script>

  <div class="demo-footer">
    &#128279; YryCrossNav v1.0.0 · <a href="../index.html">CDN 首页</a>
  </div>
</body>
</html>
