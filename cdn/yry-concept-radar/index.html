<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YryConceptRadar · Demo & Template</title>
  <link rel="stylesheet" href="../shared\/index\.css">
  <link rel="stylesheet" href="../theme\/index\.css">
  <link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="demo.css">
</head>
<body>
  <h1><span class="accent">🎯</span> YryConceptRadar · 概念雷达图</h1>
  <p class="demo-hint">
    自定义元素 <code>&lt;yry-concept-radar&gt;</code> — SVG 雷达/蜘蛛图。
    从 JSON 数据渲染多维度评分雷达，支持当前值 + 基线对比、hover 提示、响应式缩放。
    适用于技能评估、项目健康度、能力矩阵等场景。
  </p>

  <!-- Demo 1: Skill assessment -->
  <div class="demo-section">
    <h3>Demo — 架构能力雷达 (当前 vs 基线)</h3>
    <script type="application/json" id="radar-demo-1">
    {
      "title": "📐 架构合规维度",
      "dimensions": [
        { "label": "内核体积", "value": 95, "baseline": 80 },
        { "label": "范式合规", "value": 88, "baseline": 70 },
        { "label": "扩展隔离", "value": 82, "baseline": 75 },
        { "label": "文档一致性", "value": 90, "baseline": 65 },
        { "label": "安全面", "value": 78, "baseline": 60 },
        { "label": "测试覆盖", "value": 65, "baseline": 50 },
        { "label": "依赖健康", "value": 72, "baseline": 55 },
        { "label": "代码质量", "value": 85, "baseline": 70 }
      ]
    }
    </script>
    <yry-concept-radar id="radar-demo-1"></yry-concept-radar>
  </div>

  <!-- Demo 2: Simple 5-dim -->
  <div class="demo-section">
    <h3>Demo — 开发者能力矩阵 (5 维度)</h3>
    <script type="application/json" id="radar-demo-2">
    {
      "title": "👤 开发者能力",
      "dimensions": [
        { "label": "规约理解", "value": 90 },
        { "label": "架构设计", "value": 75 },
        { "label": "测试编写", "value": 68 },
        { "label": "安全审计", "value": 82 },
        { "label": "管线编排", "value": 88 }
      ]
    }
    </script>
    <yry-concept-radar id="radar-demo-2"></yry-concept-radar>
  </div>

  <script src="index.js"></script>

  <div class="demo-footer">🎯 YryConceptRadar v1.0.0 · <a href="../index.html">CDN 首页</a></div>
</body>
</html>
