<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YryLayerRefs · Demo & Template</title>
<link rel="stylesheet" href="../shared\/index\.css">
<link rel="stylesheet" href="../theme\/index\.css">
<link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="../yry-layer/index.css">
<link rel="stylesheet" href="../yry-sub-title/index.css">
<link rel="stylesheet" href="../yry-card-grid/index.css">
<link rel="stylesheet" href="../yry-item-card/index.css">
<link rel="stylesheet" href="../yry-tag-chip/index.css">
<link rel="stylesheet" href="../yry\-home\/index\.css">
<link rel="stylesheet" href="demo.css">
<script src="../shared/vue.global.prod.js"></script>
</head>
<body>
<h1><span class="accent">&#9670;</span> YryLayerRefs · Layer 6 复合组件</h1>
<p class="demo-hint">Vue 3 组件 — 包含 Layer 6 参考入口的完整 DOM 结构</p>

<div id="demo-1"></div>

<script type="text/x-template" id="yry-layer-refs-tpl">
  <yry-layer id="layer-refs-app">
    <yry-sub-title id="sub-title-ref-doc"></yry-sub-title>
    <yry-card-grid id="ref-doc-grid"></yry-card-grid>
    <yry-sub-title id="sub-title-ref-monitor"></yry-sub-title>
    <yry-card-grid id="ref-monitor-grid"></yry-card-grid>
  </yry-layer>
</script>

<script src="../shared/vue-ce-loader.js"></script>


<script src="../yry-layer/index.js"></script>
<script src="../yry-sub-title/index.js"></script>
<script src="../yry-card-grid/index.js"></script>
<script src="index.js"></script>
<script>
function mountAll() {
  if (!window.YryLayerRefs) return;
  Vue.createApp(window.YryLayerRefs).mount('#demo-1');
}
if (window.YryLayerRefs) mountAll();
else document.addEventListener('yry-layer-refs-ready', mountAll, { once: true });
</script>
</body>
</html>
