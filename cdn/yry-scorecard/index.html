<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YryScorecard · Demo & Template</title>
<link rel="stylesheet" href="../shared\/index\.css"><link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="demo.css">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
<h1>YryScorecard</h1><p class="demo-hint">Vue 3: <code>columns</code> · <code>rows</code> · <code>total</code> (JSON)</p>
<div id="demo-1"></div>

<script type="text/x-template" id="yry-scorecard-tpl">
  <table class="sc-table">
    <thead><tr><th v-for="(c, i) in parsedColumns" :key="'h'+i">{{ c }}</th></tr></thead>
    <tbody>
      <tr v-for="(row, ri) in parsedRows" :key="'r'+ri">
        <td v-for="(cell, ci) in (row || [])" :key="'c'+ci" :class="cellClass(cell)" v-html="cellText(cell)"></td>
      </tr>
      <tr v-if="parsedTotal.length" class="sc-total-row">
        <td v-for="(cell, ci) in parsedTotal" :key="'tc'+ci" :class="cellClass(cell)" v-html="cellText(cell)"></td>
      </tr>
    </tbody>
  </table>
</script>

<script src="index.js"></script>
<script>
function m(){{if(!window.YryScorecard)return;Vue.createApp(window.YryScorecard,{{
  columns:'["维度","权重","目标","实测","得分","状态"]',
  rows:'[["覆盖度","20%","≥ 95%","100%","100",{{"text":"✓ 优秀","status":"pass"}}],["性能","30%","≤ 2s","1.2s","100",{{"text":"✓ 优秀","status":"pass"}}]]',
  total:'[["合计","","","",{{"text":"97.5"}},{{"text":"✓ 达到发布标准","status":"pass"}}]]'
}}).mount('#demo-1')}}
if(window.YryScorecard)m();else document.addEventListener('yry-scorecard-ready',m,{{once:true}});
</script>
</body>
</html>
