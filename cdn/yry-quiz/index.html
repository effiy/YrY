<!DOCTYPE html>
<!--
  YrY CDN — yry-quiz · 自测答题交互
  依赖: DOM 中需存在 .quiz-card / .quiz-opt / .quiz-feedback / .quiz-score 元素
  加载: <script src="../../../../cdn/yry-quiz/index.js"></script>  (DOMContentLoaded 后自动绑定)
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>YrY yry-quiz · 自测交互</title>
  <link rel="stylesheet" href="../shared/index.css">
  <link rel="stylesheet" href="../theme/index.css">
  <link rel="stylesheet" href="../yry-story-panel/index.css">
<link rel="stylesheet" href="../yry-inline-helpers/index.css">
<link rel="stylesheet" href="demo.css">
</head>
<body>
  <h1>❓ yry-quiz · 自测交互</h1>
  <p>提供自测答题绑定:点击选项 → 标记对错 → 显示反馈。自动监听 .quiz-opt 点击,无需额外 JS。</p>

  <h2>载入</h2>
  <pre>&lt;script src="../../../../cdn/yry-quiz/index.js"&gt;&lt;/script&gt;</pre>

  <h2>演示</h2>
  <div class="quiz-card" data-q="1">
    <h3>1. YrY CDN 是什么?</h3>
    <div class="quiz-opt" data-answer="correct">📦 集中存放共享 CSS / JS / 资源的目录</div>
    <div class="quiz-opt" data-answer="wrong">🛒 商品快递网络</div>
    <div class="quiz-opt" data-answer="wrong">📡 域名系统</div>
    <div class="quiz-feedback">✅ 正确!CDN(Content Delivery Network)在此指 cdn/ 共享资源目录。</div>
  </div>

  <div class="quiz-score">
    得分: <span class="qs-big">0/1</span>
  </div>

  <p class="yry-cd-8">YrY CDN · yry-quiz · 2026</p>

  <script src="index.js"></script>
</body>
</html>
